<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="簽到"/>
  <meta name="theme-color" content="#1A1A1A"/>
  <title>教練簽到系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:#F7F7F7;font-family:'Noto Sans TC',sans-serif}
    input,button{font-family:'Noto Sans TC',sans-serif}
    #root{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const LS_S="coach_students", LS_R="coach_records";
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function getTaiwanTime(){
  return new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).replace(/\//g,"-");
}
const getTotalRemaining=s=>s.contracts.reduce((sum,c)=>sum+Math.max(0,c.total-c.used),0);
const remColor=r=>r<=0?"#9E9E9E":r<=3?"#D32F2F":"#2E7D32";
const remBg=r=>r<=0?"#F5F5F5":r<=3?"#FFEBEE":"#E8F5E9";
const isEng=n=>/^[A-Za-z]/.test(n);

function doExport(students,records){
  const blob=new Blob([JSON.stringify({exportedAt:getTaiwanTime(),students,records},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`簽到備份_${getTaiwanTime().replace(/[: ]/g,"-")}.json`; a.click();
  URL.revokeObjectURL(url);
}

const Pencil=({size=16,color="#AAA"})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>
);
const PeopleIcon=({active})=>(
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?"#1A1A1A":"#CCC"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="9" cy="7" r="3"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
  </svg>
);
const ListIcon=({active})=>(
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?"#1A1A1A":"#CCC"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
    <circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/>
  </svg>
);
const GearIcon=({active})=>(
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?"#1A1A1A":"#CCC"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
);

function Toast({msg,type,onDone}){
  const [vis,setVis]=useState(true);
  useEffect(()=>{const t1=setTimeout(()=>setVis(false),3200);const t2=setTimeout(onDone,3900);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  const bg=type==="ok"?"#2E7D32":type==="warn"?"#E65100":"#C62828";
  return <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"12px 22px",borderRadius:12,fontSize:14,fontWeight:600,zIndex:9999,opacity:vis?1:0,transition:"opacity 0.7s",boxShadow:"0 4px 20px rgba(0,0,0,0.15)",whiteSpace:"nowrap"}}>{msg}</div>;
}
function Modal({title,children,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:8000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:360,boxShadow:"0 16px 48px rgba(0,0,0,0.15)",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:800,color:"#1A1A1A",marginBottom:18}}>{title}</div>
        {children}
      </div>
    </div>
  );
}
function Btn({children,onClick,variant="dark",full=false,style:s={},disabled=false}){
  const v={dark:{background:"#1A1A1A",color:"#fff",padding:"13px 18px"},light:{background:"#F2F2F2",color:"#555",padding:"13px 18px"},red:{background:"#FFEBEE",color:"#D32F2F",padding:"13px 18px"}};
  return <button onClick={disabled?undefined:onClick} onMouseDown={e=>{if(!disabled)e.currentTarget.style.opacity="0.7"}} onMouseUp={e=>{if(!disabled)e.currentTarget.style.opacity="1"}} style={{border:"none",borderRadius:13,fontSize:15,fontWeight:700,cursor:disabled?"not-allowed":"pointer",transition:"opacity 0.15s",width:full?"100%":undefined,opacity:disabled?0.5:1,...v[variant],...s}}>{children}</button>;
}
function Field({label,value,onChange,type="text",placeholder=""}){
  return(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:12,color:"#999",fontWeight:600,marginBottom:5,letterSpacing:0.4}}>{label}</div>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"11px 13px",background:"#F7F7F7",border:"1px solid #EBEBEB",borderRadius:11,fontSize:15,outline:"none",boxSizing:"border-box",color:"#1A1A1A"}}/>
    </div>
  );
}
function PinDot({filled}){return <div style={{width:13,height:13,borderRadius:"50%",background:filled?"#1A1A1A":"transparent",border:"2px solid "+(filled?"#1A1A1A":"#CCC"),transition:"all 0.15s"}}/>;}
function NumPad({onPress}){
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:240}}>
      {keys.map((k,i)=>(
        <button key={i} onClick={()=>k&&onPress(k)} onMouseDown={e=>{if(k)e.currentTarget.style.background="#E8E8E8"}} onMouseUp={e=>{if(k)e.currentTarget.style.background="#F5F5F5"}}
          style={{height:56,borderRadius:13,background:k?"#F5F5F5":"transparent",border:k?"1px solid #E8E8E8":"none",color:"#1A1A1A",fontSize:20,cursor:k?"pointer":"default",fontWeight:600}}>{k}</button>
      ))}
    </div>
  );
}
function BottomTabs({active,onChange}){
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #F0F0F0",display:"flex"}}>
      {[{id:"home",label:"學員管理",Icon:PeopleIcon},{id:"records",label:"簽到紀錄",Icon:ListIcon},{id:"settings",label:"備份設定",Icon:GearIcon}].map(({id,label,Icon})=>(
        <button key={id} onClick={()=>onChange(id)} style={{flex:1,padding:"11px 0 9px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <Icon active={active===id}/>
          <div style={{fontSize:10,fontWeight:active===id?700:400,color:active===id?"#1A1A1A":"#CCC"}}>{label}</div>
        </button>
      ))}
    </div>
  );
}

// ── Coach Home ─────────────────────────────────────────────────────────────────
function CoachHome({students,onSignIn,onEdit,onAdd,onEditSchedule}){
  const [search,setSearch]=useState("");
  const sorted=[...students].filter(s=>s.name.includes(search)).sort((a,b)=>{
    if(a.scheduledToday!==b.scheduledToday) return b.scheduledToday-a.scheduledToday;
    const aE=isEng(a.name),bE=isEng(b.name);
    if(aE!==bE) return aE?-1:1;
    return a.name.localeCompare(b.name,aE?"en":"zh-TW-u-co-stroke");
  });
  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"28px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:11,letterSpacing:2,color:"#CCC",marginBottom:3}}>COACH DASHBOARD</div>
            <div style={{fontSize:24,fontWeight:900,color:"#1A1A1A"}}>學員管理</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onEditSchedule} style={{background:"#F2F2F2",border:"none",color:"#555",padding:"9px 13px",borderRadius:11,fontSize:12,fontWeight:700,cursor:"pointer"}}>今日排課</button>
            <button onClick={onAdd} style={{background:"#1A1A1A",border:"none",color:"#fff",width:38,height:38,borderRadius:12,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          {[{label:"今日排課",val:students.filter(s=>s.scheduledToday).length},{label:"總學員數",val:students.length}].map(({label,val})=>(
            <div key={label} style={{flex:1,background:"#F2F2F2",borderRadius:12,padding:"11px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{val}</div>
              <div style={{fontSize:10,color:"#AAA",marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:"14px 20px 6px"}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#CCC"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋學員…" style={{width:"100%",padding:"11px 14px 11px 38px",background:"#fff",border:"1px solid #EEE",borderRadius:12,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
        </div>
      </div>
      <div style={{padding:"8px 20px 100px"}}>
        {!search&&sorted.some(s=>s.scheduledToday)&&<div style={{fontSize:10,color:"#CCC",letterSpacing:2,marginBottom:8,marginTop:4}}>今日排課</div>}
        {sorted.map((s,i)=>{
          const rem=getTotalRemaining(s),c=remColor(rem),bg=remBg(rem);
          const showSep=!search&&i>0&&!s.scheduledToday&&sorted[i-1]?.scheduledToday;
          return(
            <div key={s.id}>
              {showSep&&<div style={{fontSize:10,color:"#CCC",letterSpacing:2,margin:"14px 0 8px"}}>其他學員</div>}
              <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:15,padding:"13px 15px",marginBottom:8,display:"flex",alignItems:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                <div onClick={()=>onSignIn(s)} style={{display:"flex",alignItems:"center",flex:1,cursor:"pointer",minWidth:0}}>
                  <div style={{width:42,height:42,borderRadius:13,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#666",marginRight:12,flexShrink:0}}>{s.name[0]}</div>
                  <div style={{minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{fontWeight:700,fontSize:15,color:"#1A1A1A"}}>{s.name}</span>
                      {s.pin===null&&<span style={{fontSize:9,background:"#FFF9C4",color:"#F9A825",padding:"2px 6px",borderRadius:8,fontWeight:700}}>未設PIN</span>}
                    </div>
                    <div style={{fontSize:11,color:"#DDD",marginTop:2}}>點擊簽到</div>
                  </div>
                </div>
                <div onClick={()=>onSignIn(s)} style={{background:bg,borderRadius:10,padding:"4px 10px",flexShrink:0,textAlign:"center",cursor:"pointer",marginRight:10}}>
                  <span style={{fontSize:17,fontWeight:900,color:c}}>{rem}</span>
                </div>
                <button onClick={e=>{e.stopPropagation();onEdit(s);}} style={{width:34,height:34,borderRadius:10,background:"#F5F5F5",border:"none",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><Pencil/></button>
              </div>
            </div>
          );
        })}
        {sorted.length===0&&<div style={{textAlign:"center",color:"#CCC",padding:"50px 0"}}>找不到「{search}」</div>}
      </div>
    </div>
  );
}

// ── Coach Detail ───────────────────────────────────────────────────────────────
function CoachDetail({student,records,onBack,onUpdate,onDelete,showToast}){
  const [showAdd,setShowAdd]=useState(false);
  const [showResetPin,setShowResetPin]=useState(false);
  const [showDel,setShowDel]=useState(false);
  const [editName,setEditName]=useState(student.name);
  const [editingName,setEditingName]=useState(false);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({total:"",paidDate:new Date().toISOString().split("T")[0],note:""});
  const idRef=useRef(Date.now());
  const totalRem=getTotalRemaining(student);
  const myRecords=records.filter(r=>String(r.studentId)===String(student.id)).slice(-5).reverse();

  const save=updated=>{onUpdate(updated);showToast("✅ 已儲存");};
  const handleAddContract=()=>{
    if(!form.total||Number(form.total)<1) return;
    const newC={id:idRef.current++,total:Number(form.total),used:0,paidDate:form.paidDate,note:form.note};
    save({...student,contracts:[...student.contracts,newC]});
    setForm({total:"",paidDate:new Date().toISOString().split("T")[0],note:""});
    setShowAdd(false);
  };
  const handleResetPin=()=>{setShowResetPin(false);save({...student,pin:null});};
  const handleDelete=()=>{onDelete(student.id);showToast("已刪除學員","warn");onBack();};

  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0,marginBottom:14}}>← 返回</button>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:16,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,color:"#555"}}>{student.name[0]}</div>
            <div>
              {editingName?(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input value={editName} onChange={e=>setEditName(e.target.value)} style={{fontSize:18,fontWeight:800,border:"none",borderBottom:"2px solid #1A1A1A",outline:"none",padding:"2px 4px",width:120}}/>
                  <button onClick={()=>{setEditingName(false);save({...student,name:editName});}} style={{background:"#1A1A1A",border:"none",color:"#fff",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>✓</button>
                  <button onClick={()=>{setEditName(student.name);setEditingName(false);}} style={{background:"#F2F2F2",border:"none",color:"#888",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{student.name}</div>
                  <button onClick={()=>setEditingName(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center"}}><Pencil/></button>
                </div>
              )}
              <div style={{fontSize:12,color:"#CCC",marginTop:2}}>
                {student.pin?"PIN 已設定":<span style={{color:"#F9A825",fontWeight:600}}>PIN 未設定</span>}
                {student.pin&&<button onClick={()=>setShowResetPin(true)} style={{background:"none",border:"none",color:"#AAA",fontSize:11,cursor:"pointer",marginLeft:6,textDecoration:"underline"}}>重設</button>}
              </div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:24,fontWeight:900,color:remColor(totalRem)}}>{totalRem}</div>
            <div style={{fontSize:11,color:"#CCC"}}>剩餘堂</div>
          </div>
        </div>
      </div>
      <div style={{padding:"18px 20px 100px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600}}>合約記錄</div>
          <button onClick={()=>setShowAdd(true)} style={{background:"#1A1A1A",border:"none",color:"#fff",padding:"6px 14px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 新增合約</button>
        </div>
        {student.contracts.map(c=>{
          const rem=Math.max(0,c.total-c.used);
          const active=student.contracts.find(x=>x.total-x.used>0);
          const isCurrent=active&&c.id===active.id;
          return(
            <div key={c.id} style={{background:"#fff",border:`1px solid ${isCurrent?"#1A1A1A":"#EEE"}`,borderRadius:14,padding:"14px 15px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                    {isCurrent&&<span style={{fontSize:9,background:"#1A1A1A",color:"#fff",padding:"2px 7px",borderRadius:10}}>使用中</span>}
                    {!isCurrent&&rem===0&&<span style={{fontSize:9,background:"#F5F5F5",color:"#AAA",padding:"2px 7px",borderRadius:10}}>已結束</span>}
                    {c.note&&<span style={{fontSize:12,color:"#888"}}>{c.note}</span>}
                  </div>
                  <div style={{fontSize:12,color:"#AAA"}}>繳費日：{c.paidDate}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <span style={{fontSize:20,fontWeight:900,color:remColor(rem)}}>{rem}</span>
                  <span style={{fontSize:12,color:"#CCC"}}>/{c.total}</span>
                  <div style={{fontSize:10,color:"#AAA"}}>已上 {c.used} 堂</div>
                </div>
              </div>
            </div>
          );
        })}
        {myRecords.length>0&&(
          <>
            <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginTop:20,marginBottom:10}}>最近上課紀錄</div>
            {myRecords.map(r=>(
              <div key={r.id} style={{background:"#fff",border:"1px solid #EEE",borderRadius:11,padding:"11px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:"#555"}}>{r.timestamp}</span>
                <span style={{fontSize:12,color:"#D32F2F",fontWeight:700}}>−1 堂</span>
              </div>
            ))}
          </>
        )}
        <div style={{marginTop:24}}><Btn variant="red" full onClick={()=>setShowDel(true)}>刪除此學員</Btn></div>
      </div>
      {showAdd&&(
        <Modal title="新增合約" onClose={()=>setShowAdd(false)}>
          <div style={{fontSize:13,color:"#AAA",marginBottom:16}}>學員：<strong style={{color:"#1A1A1A"}}>{student.name}</strong></div>
          <Field label="合約總堂數" value={form.total} onChange={v=>setForm(f=>({...f,total:v}))} type="number" placeholder="例：10"/>
          <Field label="繳費日期" value={form.paidDate} onChange={v=>setForm(f=>({...f,paidDate:v}))} type="date"/>
          <Field label="備注" value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} placeholder="例：第二期…"/>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <Btn variant="light" style={{flex:1}} onClick={()=>setShowAdd(false)}>取消</Btn>
            <Btn style={{flex:2}} onClick={handleAddContract}>新增合約</Btn>
          </div>
        </Modal>
      )}
      {showResetPin&&(
        <Modal title="重設 PIN 碼" onClose={()=>setShowResetPin(false)}>

// ── PIN Screen ─────────────────────────────────────────────────────────────────
function PinScreen({student,isFirstTime,onSuccess,onBack}){
  const [pin,setPin]=useState("");const [conf,setConf]=useState("");const [step,setStep]=useState(isFirstTime?"set":"verify");const [error,setError]=useState("");const [shake,setShake]=useState(false);
  const doShake=msg=>{setShake(true);setError(msg);setPin("");setConf("");setTimeout(()=>setShake(false),500);};
  const handleKey=k=>{
    const cur=step==="conf"?conf:pin;const set=step==="conf"?setConf:setPin;
    if(k==="⌫"){set(c=>c.slice(0,-1));setError("");return;}
    if(cur.length>=4) return;
    const next=cur+k;set(next);setError("");
    if(next.length===4) setTimeout(()=>{
      if(step==="set"){setStep("conf");setPin(next);}
      else if(step==="conf"){next===pin?onSuccess(pin):doShake("兩次 PIN 不一致，請重設");}
      else{next===student.pin?onSuccess(null):doShake("密碼錯誤，請重試");}
    },150);
  };
  const display=step==="conf"?conf:pin;
  const titles={set:["設定你的 PIN 碼","請輸入 4 位數字"],conf:["再輸入一次確認","請再次輸入"],verify:[`哈囉，${student.name}！`,"請輸入 PIN 碼解鎖"]};
  return(
    <div style={{minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <button onClick={onBack} style={{position:"absolute",top:28,left:20,background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer"}}>← 返回</button>
      <div style={{textAlign:"center",marginBottom:44}}>
        <div style={{width:68,height:68,borderRadius:20,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:700,color:"#555",margin:"0 auto 20px"}}>{student.name[0]}</div>
        {isFirstTime&&<div style={{fontSize:10,color:"#F9A825",letterSpacing:2,fontWeight:700,marginBottom:6}}>首次設定</div>}
        <div style={{fontSize:21,fontWeight:800,color:"#1A1A1A"}}>{titles[step][0]}</div>
        <div style={{fontSize:14,color:"#AAA",marginTop:6}}>{titles[step][1]}</div>
      </div>
      <div style={{display:"flex",gap:16,marginBottom:12,animation:shake?"shake 0.4s ease":"none"}}>
        {[0,1,2,3].map(i=><PinDot key={i} filled={i<display.length}/>)}
      </div>
      <div style={{height:28,display:"flex",alignItems:"center",marginBottom:24}}>
        {error&&<span style={{color:"#D32F2F",fontSize:13,fontWeight:600}}>{error}</span>}
      </div>
      <NumPad onPress={handleKey}/>
    </div>
  );
}

// ── Settings Screen ────────────────────────────────────────────────────────────
function SettingsScreen({students,records,onImport,onBack}){
  const [showImportConfirm,setShowImportConfirm]=useState(false);
  const [pendingData,setPendingData]=useState(null);
  const fileRef=useRef();

  const handleFileChange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.students||!data.records) throw new Error("格式錯誤");
        setPendingData(data);
        setShowImportConfirm(true);
      }catch{alert("檔案格式錯誤，請選擇正確的備份檔案");}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const lsUsed=()=>{
    try{const s=JSON.stringify(localStorage);return(new Blob([s]).size/1024).toFixed(1)+"KB";}catch{return "未知";}
  };

  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"28px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <div style={{fontSize:11,letterSpacing:2,color:"#CCC",marginBottom:3}}>DATA</div>
        <div style={{fontSize:24,fontWeight:900,color:"#1A1A1A"}}>備份設定</div>
      </div>
      <div style={{padding:"20px 20px 100px"}}>

        {/* 資料概況 */}
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:14}}>目前資料</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[{label:"學員",val:students.length},{label:"簽到紀錄",val:records.length},{label:"儲存空間",val:lsUsed()}].map(({label,val})=>(
              <div key={label} style={{background:"#F7F7F7",borderRadius:11,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:900,color:"#1A1A1A"}}>{val}</div>
                <div style={{fontSize:10,color:"#AAA",marginTop:3}}>{label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* 匯出 */}
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:6}}>匯出備份</div>
          <div style={{fontSize:13,color:"#888",marginBottom:14,lineHeight:1.7}}>將所有學員資料與簽到紀錄下載為 <strong>.json</strong> 檔案，儲存到手機或雲端硬碟。</div>
          <Btn full onClick={()=>doExport(students,records)}>⬇ 立即匯出備份</Btn>
        </div>

        {/* 匯入 */}
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:6}}>匯入還原</div>
          <div style={{fontSize:13,color:"#888",marginBottom:14,lineHeight:1.7}}>選擇之前匯出的 <strong>.json</strong> 備份檔案，還原所有資料。<br/><span style={{color:"#D32F2F"}}>注意：會覆蓋目前所有資料。</span></div>
          <input ref={fileRef} type="file" accept=".json" onChange={handleFileChange} style={{display:"none"}}/>
          <Btn full variant="light" onClick={()=>fileRef.current.click()}>⬆ 選擇備份檔案匯入</Btn>
        </div>

        {/* 說明 */}
        <div style={{background:"#E8F5E9",border:"1px solid #C8E6C9",borderRadius:14,padding:"14px 16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#2E7D32",marginBottom:8}}>💡 建議備份方式</div>

          </div>

      </div>

      {showImportConfirm&&pendingData&&(
        <Modal title="確認匯入" onClose={()=>{setShowImportConfirm(false);setPendingData(null);}}>
          <div style={{fontSize:14,color:"#666",marginBottom:8,lineHeight:1.9}}>

          </div>
        </Modal>
      )}
    </div>
  );
}

}

// ── Main App ───────────────────────────────────────────────────────────────────
function App(){
  const [students,setStudents]=useState(()=>lsGet(LS_S,[]));
  const [records,setRecords]=useState(()=>lsGet(LS_R,[]));
  const [screen,setScreen]=useState("home");
  const [tab,setTab]=useState("home");
  const [selected,setSelected]=useState(null);
  const [coachViewing,setCoachViewing]=useState(null);
  const [toast,setToast]=useState(null);
  const go=setScreen;
  const showToast=(msg,type="ok")=>setToast({msg,type});

  const saveStudents=s=>{setStudents(s);lsSet(LS_S,s);};
  const saveRecords=r=>{setRecords(r);lsSet(LS_R,r);};

  const handleUpdateStudent=updated=>{
    const next=students.map(s=>s.id===updated.id?updated:s);
    saveStudents(next); go("home"); setCoachViewing(null);
  };
  const handleDeleteStudent=id=>{
    saveStudents(students.filter(s=>s.id!==id));
  };
  const handlePinSuccess=newPin=>{
    if(newPin){
      const next=students.map(s=>s.id===selected.id?{...s,pin:newPin}:s);
      saveStudents(next);
    }
    go("studentInfo");
  };
  const handleCheckin=()=>{
    const timestamp=getTaiwanTime();
    const nextStudents=students.map(s=>{
      if(s.id!==selected.id) return s;
      let done=false;
      return{...s,contracts:s.contracts.map(c=>{if(!done&&c.total-c.used>0){done=true;return{...c,used:c.used+1};}return c;})};
    });
    const newRecord={id:Date.now(),studentId:selected.id,studentName:selected.name,timestamp};
    const nextRecords=[...records,newRecord];
    saveStudents(nextStudents);
    saveRecords(nextRecords);
    go("success");
  };
  const handleAddStudent=s=>{
    saveStudents([...students,s]);
    showToast("✅ 學員已新增"); go("home");
  };
  const handleSaveSchedule=selIds=>{
    saveStudents(students.map(s=>({...s,scheduledToday:selIds.has(s.id)})));
    showToast("✅ 今日排課已更新"); go("home");
  };
  const handleImport=data=>{
    saveStudents(data.students);
    saveRecords(data.records);
    showToast("✅ 資料已還原");
  };

  const tabChange=t=>{setTab(t);go(t);};
  const currentStudent=selected?students.find(s=>s.id===selected.id):null;
  const coachStudent=coachViewing?students.find(s=>s.id===coachViewing.id):null;
  const showTabs=["home","records","settings"].includes(screen);

  return(
    <div style={{position:"relative"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      {screen==="home"&&<CoachHome students={students} onSignIn={s=>{setSelected(s);go("studentPin");}} onEdit={s=>{setCoachViewing(s);go("coachDetail");}} onAdd={()=>go("addStudent")} onEditSchedule={()=>go("schedule")}/>}
      {screen==="coachDetail"&&coachStudent&&<CoachDetail student={coachStudent} records={records} onBack={()=>{go("home");setCoachViewing(null);}} onUpdate={handleUpdateStudent} onDelete={handleDeleteStudent} showToast={showToast}/>}
      {screen==="schedule"&&<EditSchedule students={students} onSave={handleSaveSchedule} onBack={()=>go("home")}/>}
      {screen==="addStudent"&&<AddStudent onSave={handleAddStudent} onBack={()=>go("home")}/>}
      {screen==="studentPin"&&selected&&<PinScreen student={selected} isFirstTime={selected.pin===null} onSuccess={handlePinSuccess} onBack={()=>{go("home");setSelected(null);}}/>}
      {screen==="studentInfo"&&currentStudent&&<StudentInfo student={currentStudent} records={records} onCheckin={handleCheckin} onBack={()=>go("studentPin")}/>}
      {screen==="success"&&<SuccessScreen studentName={selected?.name} onExport={()=>doExport(students,records)}/>}
      {screen==="records"&&<RecordsScreen records={records} onBack={()=>{go("home");setTab("home");}}/>}
      {screen==="settings"&&<SettingsScreen students={students} records={records} onImport={handleImport} onBack={()=>go("home")}/>}

      {showTabs&&<BottomTabs active={tab} onChange={tabChange}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

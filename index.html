// ══════════════════════════════════════════════════════════════
// Main App
// ══════════════════════════════════════════════════════════════
function App(){
  const [students,setStudents]=useState(()=>lsGet(LS_S,[]));
  const [records,setRecords]=useState(()=>lsGet(LS_R,[]));
  const [syncing,setSyncing]=useState(true);
  const [screen,setScreen]=useState("student");
  const [coachTab,setCoachTab]=useState("coach");
  const [editing,setEditing]=useState(null);
  const [successInfo,setSuccessInfo]=useState({name:"",remaining:0});
  const [toast,setToast]=useState(null);
  const [pendingCheckinStudent,setPendingCheckinStudent]=useState(null);
  const showToast=(msg,type="ok")=>setToast({msg,type});

  useEffect(()=>{
    (async()=>{
      try{const s=await gasGet("getStudents");if(s&&Array.isArray(s)){const injected=s.map(injectSigData);setStudents(injected);lsSet(LS_S,injected);}}catch{}
      setSyncing(false);
      try{
        const r=await gasGet("getRecords");
        if(r&&Array.isArray(r)){
          // GAS 回來的 record 沒有 sigData，從本地 localStorage 補回
          const localRecs=lsGet(LS_R,[]);
          const localMap={};
          localRecs.forEach(rec=>{if(rec.sigData)localMap[rec.timestamp+"|"+rec.studentId]=rec.sigData;});
          const n=r.map(rec=>{
            const normalized={...rec,timestamp:normalizeTimestamp(rec.timestamp)};
            const key=normalized.timestamp+"|"+String(normalized.studentId);
            if(localMap[key])normalized.sigData=localMap[key];
            return normalized;
          });
          setRecords(n);lsSet(LS_R,n);
        }
      }catch{}
    })();
  },[]);

  const setS=next=>{setStudents(next);lsSet(LS_S,next);};
  const setR=next=>{setRecords(next);lsSet(LS_R,next);};

  const handleSignContractFromStudent=(student,contractId,sigData)=>{
    sigSave(contractId,sigData); // 簽名存 localStorage
    const updated={...student,contracts:student.contracts.map(c=>c.id===contractId?{...c,signed:true,sigData,signedAt:getTaiwanTime()}:c)};
    setS(students.map(s=>s.id===student.id?updated:s));
    gasSync({action:"saveStudent",student:updated}); // GAS 不含 sigData
    showToast("✅ 合約簽署完成");
  };

  const handleCheckinDone=(student,checkinSigData)=>{
    const timestamp=getTaiwanTime();
    const nextStudents=students.map(s=>{
      if(s.id!==student.id)return s;
      let done=false;
      return{...s,contracts:s.contracts.map(c=>{if(!done&&c.total>0&&c.total-c.used>0){done=true;return{...c,used:c.used+1};}return c;})};
    });
    const recId=String(Date.now());
    // 簽名直接放進 record 物件，存入 localStorage，不依賴 key 匹配
    const newRec={id:recId,studentId:student.id,studentName:student.name,timestamp,sigData:checkinSigData||null};
    setS(nextStudents);setR([...records,newRec]);
    const upd=nextStudents.find(s=>s.id===student.id);
    setSuccessInfo({name:student.name,remaining:upd?getTotalRemaining(upd):0});
    setScreen("success");
    gasSync({action:"saveStudent",student:upd});
    gasSync({action:"checkin",studentId:student.id,studentName:student.name,timestamp});
  };

  const handleRegisterStudent=s=>{
    persistSigData(s); // 合約簽名存 localStorage
    const next=[...students,s];
    setS(next);gasSync({action:"saveStudent",student:s});
    showToast("✅ 登錄完成");
    // 不在這裡跳回首頁，由 StudentRegister 的 askCheckin 步驟決定
  };
  // 學員完成登錄後選擇立即簽到
  const handleCheckinAfterRegister=s=>{
    setScreen("student");
    // 讓 StudentHome 自動帶入此學員並展開簽到區
    setPendingCheckinStudent(s);
  };
  const handleUpdateStudent=updated=>{
    persistSigData(updated); // 確保 sigData 存到 localStorage
    setS(students.map(s=>s.id===updated.id?updated:s));
    gasSync({action:"saveStudent",student:updated}); // GAS 不含 sigData
    showToast("✅ 已儲存");
  };
  const handleDeleteStudent=id=>{
    setS(students.filter(s=>s.id!==id));
    gasSync({action:"deleteStudent",id});
  };
  const handleAddStudent=s=>{
    persistSigData(s);
    const next=[...students,s];
    setS(next);gasSync({action:"saveStudent",student:s});
    showToast("✅ 學員已新增");setScreen("coach");
  };
  const handleReload=async()=>{
    const [s,r]=await Promise.all([gasGet("getStudents"),gasGet("getRecords")]);
    if(s&&Array.isArray(s)){const injected=s.map(injectSigData);setStudents(injected);lsSet(LS_S,injected);}
    if(r&&Array.isArray(r)){const n=r.map(rec=>({...rec,timestamp:normalizeTimestamp(rec.timestamp)}));setRecords(n);lsSet(LS_R,n);}
  };

  const [coachUnlocked,setCoachUnlocked]=useState(false); // 本次 session 是否已驗證

  // 啟動時從 GAS 拉最新密碼（若 GAS 無密碼則自動寫入預設 0000）
  useEffect(()=>{ fetchCoachPin(); },[]);

  const handleTab=t=>{
    setCoachTab(t);
    if(t==="student"){setScreen("student");setCoachUnlocked(false);}
    else if(t==="coach"){setScreen("coachGate");}
    else if(t==="records"){setScreen("coachGate");}
    else if(t==="settings"){setScreen("coachGate");}
  };

  // 驗證成功後跳到原本要去的 tab
  const handleCoachUnlock=()=>{
    setCoachUnlocked(true);
    const dest=coachTab==="student"?"coach":coachTab;
    setScreen(dest);
  };

  // 教練內部 tab 切換（已驗證後不需再過密碼）
  const handleCoachTab=t=>{
    setCoachTab(t);
    if(t==="student"){setScreen("student");setCoachUnlocked(false);}
    else{setScreen(t);}
  };

  const editingStudent=editing?students.find(s=>s.id===editing.id):null;

  return(
    <div style={{position:"relative"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      {screen==="student"&&<StudentHome students={students} records={records} onCheckinDone={handleCheckinDone} onGoCoach={()=>{setCoachTab("coach");handleTab("coach");}} onRegister={()=>setScreen("register")} syncing={syncing} onSignContract={handleSignContractFromStudent} pendingCheckinStudent={pendingCheckinStudent} onClearPending={()=>setPendingCheckinStudent(null)}/>}
      {screen==="register"&&<StudentRegister onDone={handleRegisterStudent} onBack={()=>setScreen("student")} onCheckinNow={handleCheckinAfterRegister} existingNames={students.map(s=>s.name)} existingStudents={students}/>}
      {screen==="success"&&<SuccessScreen name={successInfo.name} remaining={successInfo.remaining} onDone={()=>setScreen("student")}/>}

      {screen==="coachGate"&&<CoachPinGate onSuccess={handleCoachUnlock} onBack={()=>setScreen("student")}/>}
      {screen==="coach"&&<CoachHome students={students} onEdit={s=>{setEditing(s);setScreen("coachDetail");}} onAdd={()=>setScreen("coachAdd")} onTab={handleCoachTab} syncing={syncing}/>}
      {screen==="coachDetail"&&editingStudent&&<CoachDetail student={editingStudent} records={records} onBack={()=>{setScreen("coach");setEditing(null);}} onUpdate={handleUpdateStudent} onDelete={handleDeleteStudent} showToast={showToast}/>}
      {screen==="coachAdd"&&<CoachAddStudent onSave={handleAddStudent} onBack={()=>setScreen("coach")} existingNames={students.map(s=>s.name)}/>}
      {screen==="records"&&<RecordsScreen records={records} students={students} onTab={handleCoachTab}/>}
      {screen==="settings"&&<SettingsScreen students={students} records={records} onReload={handleReload} showToast={showToast} onTab={handleCoachTab}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <title>教練簽到系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:#F7F7F7;font-family:'Noto Sans TC',sans-serif}
    input,button,canvas,select{font-family:'Noto Sans TC',sans-serif}
    #root{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
    canvas{touch-action:none}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const GAS_URL="https://script.google.com/macros/s/AKfycbz0FM5J2PUxWHtExmXNLLVa07gLjxI3IF7ocjrHXs-25LzSLAxbuZneDRFT5S3pOVC9Vw/exec";
const LS_COACH_PIN="coach_master_pin"; // localStorage 快取 key
function getCoachPinCache(){return localStorage.getItem(LS_COACH_PIN)||null;}
function setCoachPinCache(hashed){localStorage.setItem(LS_COACH_PIN,hashed);}

// 從 GAS 取得教練密碼 hash（快取優先，GAS 為主）
async function fetchCoachPin(){
  try{
    const res=await gasGet("getCoachPin");
    if(res&&res.hash){
      setCoachPinCache(res.hash); // 更新快取
      return res.hash;
    }
  }catch{}
  return getCoachPinCache(); // 網路失敗時用快取
}

// 儲存教練密碼 hash 到 GAS + 快取
async function saveCoachPin(hash){
  setCoachPinCache(hash);
  gasSync({action:"setCoachPin",hash});
}
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const LS_S="coach_students",LS_R="coach_records";
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── sigData 僅存 localStorage，不傳到 GAS ─────────────────────
// key: "sig_<contractId>"  value: base64 dataURL
function sigSave(contractId, dataUrl){
  try{localStorage.setItem("sig_"+contractId, dataUrl);}catch{}
}
function sigLoad(contractId){
  try{return localStorage.getItem("sig_"+contractId)||null;}catch{return null;}
}
function sigDelete(contractId){
  try{localStorage.removeItem("sig_"+contractId);}catch{}
}
// 把 localStorage 的 sigData 注入到 student 物件（從 GAS 讀回後呼叫）
function injectSigData(student){
  return{...student,contracts:student.contracts.map(c=>{
    if(!c.signed)return c;
    const sd=sigLoad(c.id);
    return sd?{...c,sigData:sd}:c;
  })};
}
// 儲存 student 裡所有合約的 sigData 到 localStorage
function persistSigData(student){
  student.contracts.forEach(c=>{
    if(c.signed&&c.sigData)sigSave(c.id,c.sigData);
  });
}

async function gasGet(action){
  if(!GAS_URL)return null;
  try{
    const r=await fetch(GAS_URL+"?action="+action,{method:"GET",redirect:"follow"});
    if(!r.ok)return null;
    return await r.json();
  }catch(e){console.warn("gasGet:",e);return null;}
}
// gasSync 永遠不傳 sigData（base64 太大無法放 URL，Sheet 也不需要儲存）
function gasSync(body){
  if(!GAS_URL)return;
  const clean=stripSigData(body);
  const encoded=encodeURIComponent(JSON.stringify(clean));
  fetch(GAS_URL+"?action=post&payload="+encoded,{method:"GET",mode:"no-cors",redirect:"follow"}).catch(()=>{});
}
function stripSigData(obj){
  if(!obj||typeof obj!=="object")return obj;
  const o={...obj};
  if(o.student){o.student={...o.student};if(o.student.contracts)o.student.contracts=o.student.contracts.map(c=>{const x={...c};delete x.sigData;return x;});}
  return o;
}

function getTaiwanTime(){
  const d=new Date();
  const tw=new Date(d.toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  const pad=n=>String(n).padStart(2,"0");
  return `${tw.getFullYear()}/${pad(tw.getMonth()+1)}/${pad(tw.getDate())} ${pad(tw.getHours())}:${pad(tw.getMinutes())}:${pad(tw.getSeconds())}`;
}
function normalizeTimestamp(v){
  if(!v)return"";
  const s=String(v).trim();
  if(/^\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2}$/.test(s))return s;
  const d=new Date(s);
  if(!isNaN(d.getTime())){
    const tw=new Date(d.toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
    const pad=n=>String(n).padStart(2,"0");
    return `${tw.getFullYear()}/${pad(tw.getMonth()+1)}/${pad(tw.getDate())} ${pad(tw.getHours())}:${pad(tw.getMinutes())}:${pad(tw.getSeconds())}`;
  }
  return s;
}

async function hashPin(pin){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("coach_pin_salt_"+pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);
}
const isHashed=v=>v&&/^[0-9a-f]{16}$/.test(v);
async function isPinTaken(pin,students,excludeId=null){
  for(const s of students){
    if(excludeId&&s.id===excludeId)continue;
    if(!s.pin)continue;
    if(await pinMatches(pin,s.pin))return true;
  }
  return false;
}
async function pinMatches(input,stored){
  if(!stored)return false;
  if(isHashed(stored)){const h=await hashPin(input);return h===stored;}
  return input===stored;
}

const getTotalRemaining=s=>s.contracts.reduce((sum,c)=>c.total===-1?sum:sum+Math.max(0,c.total-c.used),0);
const remColor=r=>r<=0?"#9E9E9E":r<=3?"#D32F2F":"#2E7D32";
const remBg=r=>r<=0?"#F5F5F5":r<=3?"#FFEBEE":"#E8F5E9";

// ── 合約 PDF 生成 ─────────────────────────────────────────────
async function generateContractPDF(student, contract, printTime){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const isPaid = contract.paid !== false;
  const sigData = contract.sigData || sigLoad(contract.id);
  const W = 210, ml = 20, mr = 20, cw = W - ml - mr; // 可用寬度 170mm
  let y = 22;

  // ── 載入中文字體（使用內建 helvetica，中文用 unicode fallback）
  // jsPDF 內建不支援中文，改用 canvas 把文字畫成圖片再嵌入
  // 做法：建立離屏 canvas 把每個區塊畫好，轉 PNG 嵌入

  const DPR = 3; // 解析度倍率（越高越清晰）
  const mmToPx = mm => mm * DPR * (96/25.4);

  // 畫單行文字到 canvas，回傳 dataURL
  function textImg(text, {fontSize=14, color='#1A1A1A', fontWeight='normal', width=170, align='left'}={}){
    const pxW = Math.round(mmToPx(width));
    const pxH = Math.round(mmToPx(fontSize * 0.5 + 4));
    const c = document.createElement('canvas');
    c.width = pxW; c.height = pxH;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,pxW,pxH);
    ctx.font = `${fontWeight} ${Math.round(mmToPx(fontSize*0.35))}px 'Noto Sans TC', sans-serif`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'middle';
    if(align==='right') ctx.textAlign='right';
    else if(align==='center') ctx.textAlign='center';
    else ctx.textAlign='left';
    const x = align==='right'?pxW: align==='center'?pxW/2: 0;
    ctx.fillText(text, x, pxH/2);
    return {dataUrl: c.toDataURL('image/png'), wMM: width, hMM: fontSize*0.5+4};
  }

  // 把 dataUrl 圖片加到 PDF
  function addImg(dataUrl, xMM, yMM, wMM, hMM){
    doc.addImage(dataUrl,'PNG', xMM, yMM, wMM, hMM);
  }

  // ── 標題區 ──
  const titleImg = textImg('合約紀錄',{fontSize:20, fontWeight:'900', color:'#1A1A1A', width:80});
  addImg(titleImg.dataUrl, ml, y, titleImg.wMM, titleImg.hMM);
  const subImg = textImg('CONTRACT RECORD',{fontSize:8, color:'#AAAAAA', width:80});
  addImg(subImg.dataUrl, ml, y+titleImg.hMM+0.5, subImg.wMM, subImg.hMM);
  const dtImg = textImg(printTime,{fontSize:8, color:'#AAAAAA', width:60, align:'right'});
  addImg(dtImg.dataUrl, W-mr-60, y+2, 60, dtImg.hMM);
  y += titleImg.hMM + subImg.hMM + 4;
  // 分隔線
  doc.setDrawColor(26,26,26); doc.setLineWidth(0.6);
  doc.line(ml, y, W-mr, y);
  y += 8;

  // ── 資訊表格 ──
  const rows = [
    ['姓名', student.name, '#1A1A1A'],
    ['繳費狀態', isPaid?'已繳費':'未繳費', isPaid?'#1565C0':'#D32F2F'],
    ...(isPaid&&contract.paidDate?[['繳費日期', contract.paidDate, '#1A1A1A']]:[]),
    ...(contract.signedAt?[['簽名時間', contract.signedAt, '#2E7D32']]:[]),
    ...(contract.note?[['備注', contract.note, '#1A1A1A']]:[]),
  ];
  const rowH = 12;
  rows.forEach(([k,v,vc], i)=>{
    // 背景
    if(i%2===0){ doc.setFillColor(250,250,250); }
    else { doc.setFillColor(255,255,255); }
    doc.roundedRect(ml, y, cw, rowH, 0, 0, 'F');
    // 分隔線
    if(i>0){ doc.setDrawColor(240,240,240); doc.setLineWidth(0.3); doc.line(ml, y, ml+cw, y); }
    // 左：key
    const ki = textImg(k, {fontSize:10, color:'#AAAAAA', width:50});
    addImg(ki.dataUrl, ml+4, y+(rowH-ki.hMM)/2, ki.wMM, ki.hMM);
    // 右：value
    const vi = textImg(v, {fontSize:11, fontWeight:'700', color:vc, width:90, align:'right'});
    addImg(vi.dataUrl, ml+cw-90-4, y+(rowH-vi.hMM)/2, vi.wMM, vi.hMM);
    y += rowH;
  });
  // 表格外框
  doc.setDrawColor(232,232,232); doc.setLineWidth(0.4);
  doc.roundedRect(ml, y-rowH*rows.length, cw, rowH*rows.length, 2, 2, 'S');
  y += 10;

  // ── 簽名欄（左右並排）──
  const halfW = (cw-8)/2;
  const cl = textImg('教練簽名',{fontSize:9, color:'#AAAAAA', fontWeight:'700', width:halfW});
  addImg(cl.dataUrl, ml, y, cl.wMM, cl.hMM);
  const sl = textImg('學員確認',{fontSize:9, color:'#AAAAAA', fontWeight:'700', width:halfW});
  addImg(sl.dataUrl, ml+halfW+8, y, sl.wMM, sl.hMM);
  y += cl.hMM + 3;

  // 教練：空白線
  doc.setDrawColor(187,187,187); doc.setLineWidth(0.5);
  doc.line(ml, y+30, ml+halfW, y+30);

  // 學員：等比例縮放，寬不超過 halfW，高不超過 35mm
  if(sigData){
    const tmpImg = new Image();
    await new Promise(res=>{tmpImg.onload=res; tmpImg.src=sigData;});
    const ratio = tmpImg.naturalHeight / tmpImg.naturalWidth;
    const maxW = halfW, maxH = 35;
    let sigW = maxW, sigH = sigW * ratio;
    if(sigH > maxH){ sigH = maxH; sigW = sigH / ratio; }
    doc.addImage(sigData,'PNG', ml+halfW+8, y, sigW, sigH);
    y += Math.max(33, sigH) + 6;
  } else {
    const ns = textImg('尚未簽署',{fontSize:10, color:'#F9A825', fontWeight:'700', width:halfW});
    addImg(ns.dataUrl, ml+halfW+8, y+10, ns.wMM, ns.hMM);
    y += 36;
  }

  // ── 頁尾 ──
  y += 6;
  doc.setDrawColor(238,238,238); doc.setLineWidth(0.3);
  doc.line(ml, y, W-mr, y);
  y += 4;
  const fl = textImg('教練管理系統',{fontSize:8, color:'#CCCCCC', width:60});
  addImg(fl.dataUrl, ml, y, fl.wMM, fl.hMM);
  const fr = textImg(printTime,{fontSize:8, color:'#CCCCCC', width:60, align:'right'});
  addImg(fr.dataUrl, W-mr-60, y, 60, fr.hMM);

  // ── 下載 ──
  const fname = `合約_${student.name}_${printTime.replace(/[/:]/g,'-')}.pdf`;
  doc.save(fname);
}

// ── 合約預覽 Overlay ─────────────────────────────────────────
function ContractPrintOverlay({student,contract,records,onClose}){
  const isPaid=contract.paid!==false;
  const printTime=getTaiwanTime();
  const sigData=contract.sigData||sigLoad(contract.id);
  const [downloading,setDownloading]=useState(false);

  const handleDownload=async()=>{
    setDownloading(true);
    try{ await generateContractPDF(student,contract,printTime); }
    catch(e){ alert('PDF 生成失敗：'+e.message); }
    setDownloading(false);
  };

  const rows=[
    ["姓名", student.name, "#1A1A1A"],
    ["繳費狀態", isPaid?"已繳費":"未繳費", isPaid?"#1565C0":"#D32F2F"],
    ...(isPaid&&contract.paidDate?[["繳費日期", contract.paidDate, "#1A1A1A"]]:[]),
    ...(contract.signedAt?[["簽名時間", contract.signedAt, "#2E7D32"]]:[]),
    ...(contract.note?[["備注", contract.note, "#1A1A1A"]]:[]),
  ];

  return(
    <div style={{position:"fixed",inset:0,zIndex:9998,background:"#F7F7F7",overflowY:"auto",fontFamily:"'Noto Sans TC',sans-serif"}}>

      {/* 頂部工具列 */}
      <div style={{position:"sticky",top:0,background:"#1A1A1A",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:1}}>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>返回
        </button>
        <span style={{color:"#fff",fontWeight:700,fontSize:14}}>合約預覽</span>
        <button onClick={handleDownload} disabled={downloading}
          style={{background:downloading?"#555":"#fff",border:"none",color:"#1A1A1A",fontSize:13,fontWeight:700,cursor:downloading?"not-allowed":"pointer",padding:"7px 16px",borderRadius:8,display:"flex",alignItems:"center",gap:6,opacity:downloading?0.7:1}}>
          {downloading?"生成中…":<>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下載 PDF
          </>}
        </button>
      </div>

      {/* 預覽卡片（A4 比例白底） */}
      <div style={{maxWidth:520,margin:"24px auto",background:"#fff",borderRadius:12,boxShadow:"0 4px 24px rgba(0,0,0,0.10)",padding:"36px 32px 40px"}}>

        {/* 標題 */}
        <div style={{borderBottom:"2.5px solid #1A1A1A",paddingBottom:14,marginBottom:24,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <div style={{fontSize:26,fontWeight:900,color:"#1A1A1A"}}>合約紀錄</div>
            <div style={{fontSize:10,color:"#AAA",letterSpacing:3,marginTop:4}}>CONTRACT RECORD</div>
          </div>
          <div style={{fontSize:11,color:"#AAA"}}>{printTime}</div>
        </div>

        {/* 資訊表格 */}
        <div style={{border:"1px solid #E8E8E8",borderRadius:10,overflow:"hidden",marginBottom:28}}>
          {rows.map(([k,v,c],i)=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"15px 18px",background:i%2===0?"#FAFAFA":"#fff",
              borderBottom:i<rows.length-1?"1px solid #F0F0F0":"none"}}>
              <span style={{fontSize:13,color:"#AAA"}}>{k}</span>
              <span style={{fontSize:14,fontWeight:700,color:c}}>{v}</span>
            </div>
          ))}
        </div>

        {/* 簽名欄 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:16}}>
          <div>
            <div style={{fontSize:11,color:"#AAA",fontWeight:700,marginBottom:10,letterSpacing:1}}>教練簽名</div>
            <div style={{borderBottom:"1.5px solid #CCC",height:60}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:"#AAA",fontWeight:700,marginBottom:10,letterSpacing:1}}>學員確認</div>
            {sigData
              ?<img src={sigData} style={{maxWidth:"100%",maxHeight:60,display:"block"}}/>
              :<div style={{height:60,display:"flex",alignItems:"center",fontSize:12,color:"#F9A825",fontWeight:700}}>尚未簽署</div>
            }
          </div>
        </div>

        {/* 頁尾 */}
        <div style={{borderTop:"1px solid #EEE",paddingTop:10,display:"flex",justifyContent:"space-between",fontSize:10,color:"#CCC"}}>
          <span>教練管理系統</span><span>{printTime}</span>
        </div>
      </div>
    </div>
  );
}
function exportExcel(students,records){
  const maskPin=p=>p?"●●●●":"(未設定)";
  const tbl=(cap,hdrs,rows)=>`<table border="1" style="border-collapse:collapse;margin-bottom:28px"><caption style="font-weight:bold;margin-bottom:4px">${cap}</caption><thead><tr>${hdrs.map(h=>`<th style="background:#1A1A1A;color:#fff;padding:6px 10px">${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td style="padding:5px 10px">${c??""}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  // 合約簽名：嵌入 base64 圖片（如果有 sigData）
  const sigCell=c=>{
    const sd=c.sigData||sigLoad(c.id);
    if(c.signed&&sd)return `<img src="${sd}" style="max-height:50px;max-width:120px;"/>`;
    return c.signed?"已簽（無圖檔）":"未簽";
  };
  const html=`<html><head><meta charset="UTF-8"></head><body>
${tbl("學員資料",["ID","姓名","PIN","合約數","剩餘堂數"],students.map(s=>[s.id,s.name,maskPin(s.pin),s.contracts.length,getTotalRemaining(s)]))}
${tbl("合約紀錄（含簽名）",["學員ID","姓名","總堂數","已用","剩餘","繳費日","備注","簽名"],students.flatMap(s=>s.contracts.map(c=>[s.id,s.name,c.total,c.used,Math.max(0,c.total-c.used),c.paidDate,c.note||"",sigCell(c)])))}
${tbl("簽到紀錄",["學員ID","姓名","時間"],records.map(r=>[r.studentId,r.studentName,r.timestamp]))}
</body></html>`;
  const blob=new Blob(["\ufeff"+html],{type:"application/vnd.ms-excel;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`簽到備份_${getTaiwanTime().replace(/[: /]/g,"-")}.xls`;a.click();URL.revokeObjectURL(url);
}
function exportMonthlyReport(records,students,yearMonth){
  const [y,m]=yearMonth.split("/");
  const filtered=records.filter(r=>r.timestamp&&r.timestamp.startsWith(yearMonth));
  const countMap={};filtered.forEach(r=>{countMap[r.studentName]=(countMap[r.studentName]||0)+1;});
  const tbl=(cap,hdrs,rows)=>`<table border="1" style="border-collapse:collapse;margin-bottom:28px"><caption style="font-weight:bold">${cap}</caption><thead><tr>${hdrs.map(h=>`<th style="background:#1A1A1A;color:#fff;padding:7px 12px">${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(cell=>`<td style="padding:6px 12px">${cell??""}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  const html=`<html><head><meta charset="UTF-8"></head><body><h2>${y}年${m}月報表</h2>
${tbl("出席統計",["學員","出席次數","剩餘堂數"],students.map(s=>[s.name,countMap[s.name]||0,getTotalRemaining(s)]).sort((a,b)=>b[1]-a[1]))}
${tbl("簽到明細",["學員","時間"],filtered.map(r=>[r.studentName,r.timestamp]))}
</body></html>`;
  const blob=new Blob(["﻿"+html],{type:"application/vnd.ms-excel;charset=utf-8"});
  const url=URL.createObjectURL(blob);

// 全螢幕簽名面板
// 流程：開啟 → 簽名 → 有筆跡才能按「確認」→ 框內彈出二次確認 → 確認後關閉並回傳
function SignatureCanvas({onSigned,label="請在此簽名"}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const hasStroke=useRef(false);
  const [signed,setSigned]=useState(false);
  const [open,setOpen]=useState(false);
  const [hasDrawn,setHasDrawn]=useState(false); // 控制確認按鈕是否可按
  const [showConfirm,setShowConfirm]=useState(false); // 框內二次確認

  const initCanvas=()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    const W=window.innerWidth;
    const H=window.innerHeight;
    canvas.width=W*dpr;
    canvas.height=H*dpr;
    canvas.style.width=W+"px";
    canvas.style.height=H+"px";
    const ctx=canvas.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    hasStroke.current=false;
    setHasDrawn(false);
    setShowConfirm(false);
  };

  useEffect(()=>{
    if(open){
      document.body.style.overflow="hidden";
      setTimeout(initCanvas,30);
    }else{
      document.body.style.overflow="";
    }
    return()=>{document.body.style.overflow="";};
  },[open]);

  const getPos=(canvas,e)=>{
    const rect=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-rect.left,y:src.clientY-rect.top};
  };

  const onStart=e=>{
    e.preventDefault();e.stopPropagation();
    if(showConfirm)return; // 二次確認顯示中不允許繼續畫
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    const pos=getPos(canvas,e);
    ctx.beginPath();ctx.moveTo(pos.x,pos.y);
    drawing.current=true;
  };
  const onMove=e=>{
    e.preventDefault();e.stopPropagation();
    if(!drawing.current||showConfirm)return;
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    ctx.lineWidth=4;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#1A1A1A";
    const pos=getPos(canvas,e);
    ctx.lineTo(pos.x,pos.y);ctx.stroke();
    if(!hasStroke.current){hasStroke.current=true;setHasDrawn(true);}
  };
  const onEnd=e=>{e.preventDefault();e.stopPropagation();drawing.current=false;};

  const handleClear=()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
    hasStroke.current=false;
    setHasDrawn(false);
    setShowConfirm(false);
  };

  // 按「確認」→ 在框內彈出二次確認
  const handleConfirmClick=()=>{
    if(!hasStroke.current)return;
    setShowConfirm(true);
  };

  // 二次確認「確定」→ 儲存並關閉
  const handleFinalConfirm=()=>{
    const dataUrl=canvasRef.current.toDataURL("image/png");
    setSigned(true);
    setOpen(false);
    setShowConfirm(false);
    onSigned(dataUrl);
  };

  const handleReopen=()=>{
    setSigned(false);
    onSigned(null);
    setOpen(true);
  };

  return(
    <>
      {/* 觸發按鈕區 */}
      {!signed?(
        <button onClick={()=>setOpen(true)}
          style={{width:"100%",padding:"18px",background:"#F7F7F7",border:"2px dashed #DDD",borderRadius:14,cursor:"pointer",color:"#AAA",fontSize:14,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#CCC" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          點此開啟簽名
        </button>
      ):(
        <div style={{background:"#E8F5E9",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span style={{fontSize:14,color:"#2E7D32",fontWeight:700}}>簽名完成</span>
          </div>
          <button onClick={handleReopen} style={{background:"none",border:"none",color:"#AAA",fontSize:12,cursor:"pointer",padding:"4px 8px"}}>重簽</button>
        </div>
      )}

      {/* 全螢幕簽名 overlay */}
      {open&&(
        <div style={{position:"fixed",inset:0,zIndex:9999,background:"#fff",display:"flex",flexDirection:"column"}}>
          {/* 頂部工具列：取消 / 標題 / 清除 + 確認 */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid #EEE",flexShrink:0,background:"#fff"}}>
            <button onClick={()=>{setOpen(false);setShowConfirm(false);}}
              style={{background:"none",border:"none",color:"#888",fontSize:15,cursor:"pointer",padding:"4px 8px"}}>取消</button>
            <div style={{fontSize:15,fontWeight:700,color:"#1A1A1A"}}>{label}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={handleClear}
                style={{background:"#F5F5F5",border:"none",color:"#666",fontSize:13,fontWeight:600,cursor:"pointer",padding:"7px 14px",borderRadius:9}}>清除</button>
              <button onClick={handleConfirmClick} disabled={!hasDrawn}
                style={{background:hasDrawn?"#1A1A1A":"#E0E0E0",border:"none",color:hasDrawn?"#fff":"#AAA",
                  fontSize:13,fontWeight:700,cursor:hasDrawn?"pointer":"not-allowed",padding:"7px 18px",borderRadius:9,transition:"background 0.2s"}}>確認</button>
            </div>
          </div>

          {/* 簽名畫布 */}
          <div style={{flex:1,position:"relative",overflow:"hidden",background:"#FAFAFA"}}>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:15,color:"#E0E0E0",pointerEvents:"none",userSelect:"none",letterSpacing:2}}>請在此簽名</div>
            <canvas ref={canvasRef}
              style={{position:"absolute",top:0,left:0,touchAction:"none",cursor:"crosshair"}}
              onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
              onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
            />

            {/* 框內二次確認 overlay */}
            {showConfirm&&(
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>
                <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:300,boxShadow:"0 12px 40px rgba(0,0,0,0.2)",textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:800,color:"#1A1A1A",marginBottom:8}}>確認送出簽名？</div>
                  <div style={{fontSize:13,color:"#888",marginBottom:24,lineHeight:1.7}}>確定後將儲存此筆簽名，<br/>無法再修改。</div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setShowConfirm(false)}
                      style={{flex:1,padding:"12px",background:"#F2F2F2",border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:"#555",cursor:"pointer"}}>返回修改</button>
                    <button onClick={handleFinalConfirm}
                      style={{flex:2,padding:"12px",background:"#1A1A1A",border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:"#fff",cursor:"pointer"}}>✓ 確定送出</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={{background:remBg(totalRem),borderRadius:12,padding:"14px 10px",textAlign:"center"}}>

                <div style={{fontSize:11,color:"#AAA",marginTop:3}}>剩餘堂數</div>
              </div>
              <div style={{background:"#F5F5F5",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:900,color:"#1A1A1A"}}>{fresh.contracts.reduce((s,c)=>s+c.used,0)}</div>
                <div style={{fontSize:11,color:"#AAA",marginTop:3}}>已上堂數</div>
              </div>
            </div>
            {totalRem<=3&&totalRem>0&&<div style={{marginTop:10,background:"#FFEBEE",borderRadius:10,padding:"9px 12px",color:"#D32F2F",fontSize:13,fontWeight:600,textAlign:"center"}}>⚠️ 堂數即將用完，請洽教練續課</div>}
            {totalRem<=0&&<div style={{marginTop:10,background:"#F5F5F5",borderRadius:10,padding:"9px 12px",color:"#9E9E9E",fontSize:13,fontWeight:700,textAlign:"center"}}>🚫 堂數已用完，請洽教練續課</div>}

              <div style={{fontSize:11,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:10}}>最近上課紀錄</div>
              {myRecords.map(r=>(<div key={r.id} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:"#555"}}>{r.timestamp}</span><span style={{fontSize:12,color:"#D32F2F",fontWeight:700}}>−1 堂</span></div>))}
            </div>
          )}

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {/* 合約簽署 — 簽完自動送出，不需按送出按鈕 */}
            {pendingContracts.length>0&&(
              activeMode==="contract"?(
                <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:14,padding:"16px"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M3 7h18v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M8 12h8M8 16h5"/></svg>
                      <span style={{fontSize:14,fontWeight:700,color:"#1A1A1A"}}>合約簽署</span>
                    </div>
                    <button onClick={()=>setActiveMode(null)} style={{background:"none",border:"none",color:"#CCC",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
                  </div>
                  {pendingContracts.map(c=>(
                    <div key={c.id} style={{marginBottom:12}}>
                      <div style={{fontSize:12,color:"#888",marginBottom:8}}>合約：{c.paidDate||"—"}（{c.total} 堂）{c.note?" ／ "+c.note:""}</div>
                      {contractSigMap[c.id]
                        ?<div style={{background:"#E8F5E9",borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
                          <span style={{fontSize:13,color:"#2E7D32",fontWeight:700}}>✓ 合約簽署完成</span>
                        </div>
                        :<SignatureCanvas onSigned={sd=>{
                          if(sd){
                            setContractSigMap(m=>({...m,[c.id]:sd}));
                            onSignContract(fresh,c.id,sd); // 自動送出
                          }
                        }} label="合約簽名"/>
                      }
                    </div>
                  ))}
                </div>
              ):(
                <button onClick={()=>setActiveMode("contract")}
                  style={{width:"100%",padding:"14px 18px",background:"#fff",border:"2px solid #FFE082",borderRadius:14,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:11,background:"#FFFDE7",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F9A825" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M3 7h18v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M8 12h8M8 16h5"/></svg>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:"#F57F17"}}>合約簽署</div>
                    <div style={{fontSize:12,color:"#F9A825",marginTop:2}}>有 {pendingContracts.length} 份待簽</div>
                  </div>
                </button>
              )
            )}

            {/* 上課簽到 — 簽完自動確認，不需按確認按鈕 */}
            {totalRem>0&&(
              activeMode==="checkin"?(
                <div style={{background:"#fff",borderRadius:14,padding:"16px",border:"1px solid #EEE"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                      <span style={{fontSize:14,fontWeight:700,color:"#1A1A1A"}}>上課簽到</span>
                    </div>
                    <button onClick={()=>setActiveMode(null)} style={{background:"none",border:"none",color:"#CCC",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
                  </div>
                  <div style={{fontSize:13,color:"#888",marginBottom:12}}>請在下方簽名確認今日上課</div>
                  <SignatureCanvas onSigned={sd=>{
                    setSigData(sd);
                    if(sd){
                      // 簽完自動確認簽到
                      const freshNow=students.find(s=>s.id===matched.id)||matched;
                      onCheckinDone(freshNow,sd);
                      setMatched(null);setPin("");setSigData(null);setContractSigMap({});setActiveMode(null);setError("");
                    }
                  }} label="上課簽到"/>
                </div>
              ):(
                <button onClick={()=>setActiveMode("checkin")}
                  style={{width:"100%",padding:"14px 18px",background:"#fff",border:"2px solid #A5D6A7",borderRadius:14,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:11,background:"#F1F8E9",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#43A047" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:"#2E7D32"}}>上課簽到</div>
                    <div style={{fontSize:12,color:"#66BB6A",marginTop:2}}>點此進行今日簽到</div>
                  </div>
                </button>
              )
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 學員自助登錄（姓名 → PIN → 合約 → 簽名 → 詢問是否簽到）
// ══════════════════════════════════════════════════════════════
function StudentRegister({onDone,onBack,onCheckinNow,existingNames,existingStudents}){
  const [step,setStep]=useState("name"); // name|pin|pinConfirm|contract|sign|askCheckin
  const [name,setName]=useState("");
  const [nameErr,setNameErr]=useState("");
  const [pin,setPin]=useState("");
  const [conf,setConf]=useState("");
  const [pinErr,setPinErr]=useState("");
  const pinRef=useRef("");
  const [total,setTotal]=useState("");
  const [paidDate,setPaidDate]=useState(new Date().toISOString().split("T")[0]);
  const [note,setNote]=useState("");
  const [paid,setPaid]=useState(true);
  const [contractErr,setContractErr]=useState("");
  const [sig,setSig]=useState(null);
  const [sigErr,setSigErr]=useState("");
  const savedStudentRef=useRef(null);

  const goBack=()=>{
    if(step==="name")onBack();
    else if(step==="pin")setStep("name");
    else if(step==="pinConfirm"){setStep("pin");setConf("");setPinErr("");}
    else if(step==="contract"){setStep("pinConfirm");setConf("");setPinErr("");}
    else if(step==="sign"){setStep("contract");setSig(null);setSigErr("");}
    else if(step==="askCheckin")onBack();
  };

  const handleNameNext=()=>{
    if(!name.trim()){setNameErr("請輸入姓名");return;}
    if(existingNames.includes(name.trim())){setNameErr("此姓名已存在");return;}
    setNameErr("");setStep("pin");
  };

  const handlePinKey=async k=>{
    const isCfm=step==="pinConfirm";
    if(k==="⌫"){isCfm?setConf(c=>c.slice(0,-1)):setPin(c=>c.slice(0,-1));setPinErr("");return;}
    const cur=isCfm?conf:pin;
    if(cur.length>=4)return;
    const next=cur+k;
    isCfm?setConf(next):(setPin(next),pinRef.current=next);
    setPinErr("");
    if(next.length===4){
      setTimeout(async()=>{
        if(!isCfm){
          const taken=await isPinTaken(next,existingStudents);
          if(taken){setPinErr("此 PIN 已被使用，請換一組");setPin("");pinRef.current="";return;}
          setStep("pinConfirm");setConf("");
        }else{
          if(next===pinRef.current){setStep("contract");}
          else{setPinErr("兩次 PIN 不一致");setConf("");setPin("");pinRef.current="";setStep("pin");}
        }
      },120);
    }
  };
  const pinDisplay=step==="pinConfirm"?conf:pin;

  const handleContractNext=()=>{
    if(!total||Number(total)<1){setContractErr("請輸入有效堂數");return;}
    setContractErr("");setStep("sign");
  };

  const handleFinish=async()=>{
    if(!sig){setSigErr("請先完成簽名");return;}
    const hashed=await hashPin(pinRef.current);
    const student={
      id:String(Date.now()),name:name.trim(),pin:hashed,
      contracts:[{id:Date.now()+1,total:Number(total),used:0,paidDate:paid?paidDate:null,paid,note,signed:true,sigData:sig,signedAt:getTaiwanTime()}]
    };
    savedStudentRef.current=student;
    onDone(student); // 儲存學員
    setStep("askCheckin"); // 詢問是否簽到
  };

  const stepLabels=["姓名","PIN","合約","簽名"];
  const stepIdx={name:0,pin:1,pinConfirm:1,contract:2,sign:3,askCheckin:3}[step];

  return(
    <div style={{minHeight:"100vh",background:"#fff"}}>
      <div style={{background:"#fff",padding:"20px 20px 0",display:"flex",alignItems:"center",gap:14,borderBottom:"1px solid #F0F0F0",paddingBottom:16}}>
        <button onClick={goBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0}}>← 返回</button>
        <div style={{fontSize:17,fontWeight:800,color:"#1A1A1A"}}>學員首次登錄</div>
      </div>

      {step!=="askCheckin"&&(
        <div style={{display:"flex",padding:"14px 24px 0",gap:6}}>
          {stepLabels.map((label,i)=>(
            <div key={label} style={{flex:1,textAlign:"center"}}>
              <div style={{height:4,borderRadius:2,background:i<=stepIdx?"#1A1A1A":"#EEE",marginBottom:6}}/>
              <div style={{fontSize:10,color:i<=stepIdx?"#1A1A1A":"#CCC",fontWeight:i===stepIdx?700:400}}>{label}</div>
            </div>
          ))}
        </div>
      )}

      {step==="name"&&(
        <div style={{padding:"28px 24px"}}>
          <div style={{fontSize:14,color:"#888",marginBottom:22,lineHeight:1.8}}>請輸入姓名，接著設定 PIN 碼，<br/>並填寫合約完成簽署。</div>
          <Field label="姓名" value={name} onChange={v=>{setName(v);setNameErr("");}} placeholder="請輸入你的姓名"/>
          {nameErr&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#D32F2F",fontWeight:600}}>⚠ {nameErr}</div>}
          <Btn full onClick={handleNameNext}>下一步：設定 PIN</Btn>
        </div>
      )}

      {(step==="pin"||step==="pinConfirm")&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:40}}>
          <div style={{textAlign:"center",marginBottom:36}}>
            <div style={{fontSize:10,color:"#F9A825",letterSpacing:2,fontWeight:700,marginBottom:8}}>學員：{name}</div>
            <div style={{fontSize:24,fontWeight:800,color:"#1A1A1A"}}>{step==="pin"?"設定 PIN 碼":"再輸入一次"}</div>
            <div style={{fontSize:14,color:"#AAA",marginTop:8,maxWidth:260,textAlign:"center"}}>{step==="pin"?"請設定 4 位數字（不可與其他學員重複）":"請再次輸入確認"}</div>
          </div>
          <div style={{display:"flex",gap:22,marginBottom:14}}>
            {[0,1,2,3].map(i=><PinDot key={i} filled={i<pinDisplay.length}/>)}
          </div>
          <div style={{height:32,display:"flex",alignItems:"center",marginBottom:20,padding:"0 20px"}}>
            {pinErr&&<span style={{color:"#D32F2F",fontSize:13,fontWeight:600,textAlign:"center"}}>{pinErr}</span>}
          </div>
          <NumPad onPress={handlePinKey}/>
        </div>
      )}

      {step==="contract"&&(
        <div style={{padding:"28px 24px"}}>
          <div style={{fontSize:14,color:"#888",marginBottom:20,lineHeight:1.8}}>請填寫本次合約內容。</div>
          <Field label="合約總堂數" value={total} onChange={v=>{setTotal(v);setContractErr("");}} type="number" placeholder="例：10"/>
          {/* 繳費狀態切換 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:"#888",marginBottom:8,fontWeight:600}}>繳費狀態</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setPaid(true)}
                style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${paid?"#1565C0":"#EEE"}`,
                  background:paid?"#E3F2FD":"#F9F9F9",color:paid?"#1565C0":"#AAA",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                ✓ 已繳費
              </button>
              <button onClick={()=>setPaid(false)}
                style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${!paid?"#D32F2F":"#EEE"}`,
                  background:!paid?"#FFEBEE":"#F9F9F9",color:!paid?"#D32F2F":"#AAA",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                ✗ 未繳費
              </button>
            </div>
          </div>
          {paid&&<Field label="繳費日期" value={paidDate} onChange={setPaidDate} type="date"/>}
          <Field label="備注（選填）" value={note} onChange={setNote} placeholder="例：週三班…"/>
          {contractErr&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#D32F2F",fontWeight:600}}>⚠ {contractErr}</div>}
          <Btn full onClick={handleContractNext}>下一步：簽署合約</Btn>
        </div>
      )}

      {step==="sign"&&(
        <div style={{padding:"28px 24px"}}>
          <div style={{background:"#F7F7F7",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
            <div style={{fontSize:12,color:"#AAA",marginBottom:6}}>合約摘要</div>
            <div style={{fontSize:15,color:"#1A1A1A",fontWeight:700}}>{name}　{total} 堂</div>
            <div style={{fontSize:13,color:"#888",marginTop:4}}>{paid?`繳費日：${paidDate}`:"尚未繳費"}{note?"　"+note:""}</div>
          </div>
          <div style={{fontSize:14,color:"#555",marginBottom:14}}>請在下方簽名確認合約內容。</div>
          <SignatureCanvas onSigned={setSig} label="合約簽名"/>
          {sigErr&&<div style={{color:"#D32F2F",fontSize:13,marginTop:8,fontWeight:600}}>{sigErr}</div>}
          <Btn full style={{marginTop:16}} disabled={!sig} onClick={handleFinish}>✓ 完成合約簽署</Btn>
        </div>
      )}

      {step==="askCheckin"&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 28px 0"}}>
          <div style={{width:72,height:72,borderRadius:22,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24}}>
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div style={{fontSize:22,fontWeight:900,color:"#1A1A1A",marginBottom:10,textAlign:"center"}}>合約簽署完成！</div>
          <div style={{fontSize:15,color:"#888",marginBottom:40,textAlign:"center",lineHeight:1.9}}>
            <strong style={{color:"#1A1A1A"}}>{name}</strong>，歡迎加入！<br/>今天有要上課嗎？
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:320}}>
            <Btn full onClick={()=>onCheckinNow(savedStudentRef.current)}>✍ 是，現在進行簽到</Btn>
            <Btn full variant="light" onClick={onBack}>不用，先回首頁</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練 PIN 入口（驗證）
// ══════════════════════════════════════════════════════════════
function CoachPinGate({onSuccess,onBack}){
  const [pin,setPin]=useState("");
  const [error,setError]=useState("");
  const [shake,setShake]=useState(false);
  const [loading,setLoading]=useState(false);
  const doShake=msg=>{setShake(true);setError(msg);setPin("");setTimeout(()=>setShake(false),500);};

  const handleKey=async k=>{
    if(loading)return;
    if(k==="⌫"){setPin(c=>c.slice(0,-1));setError("");return;}
    if(pin.length>=4)return;
    const next=pin+k;setPin(next);setError("");
    if(next.length<4)return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,120));
    try{
      const stored=await fetchCoachPin();
      const h=await hashPin(next);
      if(!stored){
        // GAS 尚未設定密碼：預設 0000
        const def=await hashPin("0000");
        if(h===def){onSuccess();}
        else{doShake("密碼錯誤（預設 0000）");}
      } else {
        if(h===stored){onSuccess();}
        else{doShake("密碼錯誤");}
      }
    }catch{
      doShake("網路異常，請重試");
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <button onClick={onBack} style={{position:"absolute",top:28,left:20,background:"none",border:"none",color:"#CCC",fontSize:14,cursor:"pointer"}}>← 返回</button>
      <div style={{textAlign:"center",marginBottom:44}}>
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",margin:"0 auto 20px"}}>
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <div style={{fontSize:24,fontWeight:800,color:"#1A1A1A"}}>教練管理</div>
        <div style={{fontSize:15,color:"#AAA",marginTop:8}}>請輸入管理密碼</div>
      </div>
      <div style={{display:"flex",gap:22,marginBottom:14,animation:shake?"shake 0.4s ease":"none"}}>
        {[0,1,2,3].map(i=><PinDot key={i} filled={i<pin.length}/>)}
      </div>
      <div style={{height:28,display:"flex",alignItems:"center",marginBottom:20}}>
        {error&&<span style={{color:"#D32F2F",fontSize:16,fontWeight:600}}>{error}</span>}
      </div>
      <NumPad onPress={handleKey}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練主頁（無今日排課）
// ══════════════════════════════════════════════════════════════
function CoachHome({students,onEdit,onAdd,onTab,syncing}){
  const [search,setSearch]=useState("");
  const isEng=n=>/^[A-Za-z]/.test(n);
  const sorted=[...students].filter(s=>s.name.includes(search)).sort((a,b)=>{
    const aE=isEng(a.name),bE=isEng(b.name);
    if(aE!==bE)return aE?-1:1;
    return a.name.localeCompare(b.name,aE?"en":"zh-TW-u-co-stroke");
  });
  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>onTab("student")} style={{width:36,height:36,borderRadius:11,background:"#F5F5F5",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:22,fontWeight:900,color:"#1A1A1A"}}>學員管理</div>
              {syncing&&<div style={{width:10,height:10,borderRadius:"50%",border:"2px solid #EEE",borderTop:"2px solid #1A1A1A",animation:"spin 0.8s linear infinite"}}/>}
            </div>
          </div>
        </div>
        <div style={{background:"#F2F2F2",borderRadius:12,padding:"11px 10px",textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{students.length}</div>
          <div style={{fontSize:10,color:"#AAA",marginTop:2}}>總學員數</div>
        </div>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#CCC"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋學員…"
            style={{width:"100%",padding:"11px 14px 11px 38px",background:"#F7F7F7",border:"1px solid #EEE",borderRadius:12,fontSize:14,outline:"none"}}/>
        </div>
      </div>
      <div style={{padding:"12px 20px 100px"}}>
        {sorted.map(s=>{
          const rem=getTotalRemaining(s);
          return(
            <div key={s.id} style={{background:"#fff",border:"1px solid #EEE",borderRadius:15,padding:"13px 15px",marginBottom:8,display:"flex",alignItems:"center"}}>
              <div style={{flex:1,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:42,height:42,borderRadius:13,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#666",flexShrink:0}}>{s.name[0]}</div>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontWeight:700,fontSize:15,color:"#1A1A1A"}}>{s.name}</span>
                    {!s.pin&&<span style={{fontSize:9,background:"#FFF9C4",color:"#F9A825",padding:"2px 6px",borderRadius:8,fontWeight:700}}>未設PIN</span>}
                    {s.contracts.some(c=>c.total===-1)&&<span style={{fontSize:9,background:"#F3E5F5",color:"#7B1FA2",padding:"2px 6px",borderRadius:8,fontWeight:700}}>待設定</span>}
                  </div>
                  <div style={{fontSize:11,color:"#CCC",marginTop:2}}>剩餘 {rem} 堂</div>
                </div>
              </div>
              <div style={{background:remBg(rem),borderRadius:10,padding:"4px 12px",marginRight:10,textAlign:"center"}}>
                <span style={{fontSize:17,fontWeight:900,color:remColor(rem)}}>{rem}</span>
              </div>
              <button onClick={()=>onEdit(s)} style={{width:34,height:34,borderRadius:10,background:"#F5F5F5",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Pencil/></button>
            </div>
          );
        })}
        {sorted.length===0&&<div style={{textAlign:"center",color:"#CCC",padding:"50px 0"}}>{search?`找不到「${search}」`:"尚無學員"}</div>}
      </div>
      <BottomTabs active="coach" onChange={onTab}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練學員詳情
// ══════════════════════════════════════════════════════════════
function CoachDetail({student,records,onBack,onUpdate,onDelete,showToast}){
  const [showAddC,setShowAddC]=useState(false);
  const [showResetPin,setShowResetPin]=useState(false);
  const [showDel,setShowDel]=useState(false);
  const [showContractSig,setShowContractSig]=useState(null);
  const [editName,setEditName]=useState(student.name);
  const [editingName,setEditingName]=useState(false);
  const [contractSigData,setContractSigData]=useState(null);
  const [printContract,setPrintContract]=useState(null);
  const [form,setForm]=useState({total:"",paidDate:new Date().toISOString().split("T")[0],note:"",paid:true});
  // 下拉選單：選中的合約 id
  const [selectedContractId,setSelectedContractId]=useState(null);
  // 下拉選單：選中的上課紀錄 id
  const [selectedRecordId,setSelectedRecordId]=useState(null);
  const idRef=useRef(Date.now());
  const totalRem=getTotalRemaining(student);
  const allMyRecords=records.filter(r=>String(r.studentId)===String(student.id)).reverse();
  const myRecords=allMyRecords.slice(0,5);
  const save=updated=>{onUpdate(updated);};

  const handleAddContract=()=>{
    if(!form.total||Number(form.total)<1)return;
    save({...student,contracts:[...student.contracts,{id:idRef.current++,total:Number(form.total),used:0,paidDate:form.paid?form.paidDate:null,paid:form.paid,note:form.note,signed:false,sigData:null}]});
    setForm({total:"",paidDate:new Date().toISOString().split("T")[0],note:"",paid:true});setShowAddC(false);
  };
  const handleSignContract=(cid,sd)=>{
    const sigToUse=sd||contractSigData;
    if(!sigToUse){showToast("請先簽名","warn");return;}
    sigSave(cid,sigToUse);
    save({...student,contracts:student.contracts.map(c=>c.id===cid?{...c,signed:true,sigData:sigToUse,signedAt:getTaiwanTime()}:c)});
    setShowContractSig(null);setContractSigData(null);
  };

  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0,marginBottom:14}}>← 返回</button>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:16,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,color:"#555"}}>{student.name[0]}</div>
            <div>
              {editingName?(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input value={editName} onChange={e=>setEditName(e.target.value)} style={{fontSize:18,fontWeight:800,border:"none",borderBottom:"2px solid #1A1A1A",outline:"none",padding:"2px 4px",width:120}}/>
                  <button onClick={()=>{setEditingName(false);save({...student,name:editName});}} style={{background:"#1A1A1A",border:"none",color:"#fff",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>✓</button>
                  <button onClick={()=>{setEditName(student.name);setEditingName(false);}} style={{background:"#F2F2F2",border:"none",color:"#888",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{student.name}</div>
                  <button onClick={()=>setEditingName(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Pencil/></button>
                </div>
              )}
              <div style={{fontSize:12,color:"#CCC",marginTop:2}}>
                {student.pin?"PIN 已設定":<span style={{color:"#F9A825",fontWeight:600}}>PIN 未設定</span>}
                {student.pin&&<button onClick={()=>setShowResetPin(true)} style={{background:"none",border:"none",color:"#AAA",fontSize:11,cursor:"pointer",marginLeft:6,textDecoration:"underline"}}>重設</button>}
              </div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:24,fontWeight:900,color:remColor(totalRem)}}>{totalRem}</div>
            <div style={{fontSize:11,color:"#CCC"}}>剩餘堂</div>
          </div>
        </div>
      </div>
      <div style={{padding:"18px 20px 100px"}}>
        {/* ── 合約記錄（下拉選單） ─────────────────── */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600}}>合約記錄</div>
          <button onClick={()=>setShowAddC(true)} style={{background:"#1A1A1A",border:"none",color:"#fff",padding:"6px 14px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 新增合約</button>
        </div>

        {/* 合約列表（卡片式，取代 select） */}
        {student.contracts.length>0&&(
          <div style={{marginBottom:12,display:"flex",flexDirection:"column",gap:8}}>
            {student.contracts.map((c,i)=>{
              const rem=Math.max(0,c.total-c.used);
              const isPending=c.total===-1;
              const isPaid=c.paid!==false;
              const active=student.contracts.find(x=>x.total>0&&x.total-x.used>0);
              const isCurrent=active&&c.id===active.id;
              const isOpen=selectedContractId===c.id;

              return(
                <div key={c.id} style={{background:"#fff",border:`2px solid ${isOpen?"#1A1A1A":isCurrent?"#A5D6A7":"#EEE"}`,borderRadius:14,overflow:"hidden",transition:"border-color 0.15s"}}>
                  {/* 卡片標題列（點擊展開） */}
                  <button onClick={()=>setSelectedContractId(isOpen?null:c.id)}
                    style={{width:"100%",padding:"13px 15px",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
                      {/* 合約編號圓圈 */}
                      <div style={{width:32,height:32,borderRadius:10,background:isCurrent?"#1A1A1A":"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:13,fontWeight:900,color:isCurrent?"#fff":"#888"}}>{i+1}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                          <span style={{fontSize:13,fontWeight:700,color:"#1A1A1A"}}>
                            {isPending?"待設定合約":`${c.paidDate||"未填日期"}`}
                          </span>
                          {isCurrent&&<span style={{fontSize:9,background:"#1A1A1A",color:"#fff",padding:"1px 6px",borderRadius:8,flexShrink:0}}>使用中</span>}
                          {c.signed&&<span style={{fontSize:9,background:"#E8F5E9",color:"#2E7D32",padding:"1px 6px",borderRadius:8,flexShrink:0}}>已簽名</span>}
                          {!c.signed&&!isPending&&<span style={{fontSize:9,background:"#FFF9C4",color:"#F57F17",padding:"1px 6px",borderRadius:8,flexShrink:0}}>未簽名</span>}
                        </div>
                        {!isPending&&(
                          <div style={{fontSize:11,color:"#AAA",marginTop:2}}>
                            {isPaid?"已繳費":"未繳費"} · 剩 {rem}/{c.total} 堂{c.note?" · "+c.note:""}
                          </div>
                        )}
                      </div>
                    </div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCC" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                      style={{transform:isOpen?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s",flexShrink:0,marginLeft:8}}>
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </button>

                  {/* 展開詳情 */}
                  {isOpen&&(
                    <div style={{borderTop:"1px solid #F0F0F0",padding:"14px 15px",background:"#FAFAFA"}}>
                      {/* 繳費狀態切換標籤 */}
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                        <button onClick={()=>{const upd={...c,paid:!isPaid,paidDate:!isPaid?new Date().toISOString().split("T")[0]:null};save({...student,contracts:student.contracts.map(x=>x.id===c.id?upd:x)});}}
                          style={{fontSize:11,padding:"3px 10px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,
                            background:isPaid?"#E3F2FD":"#F5F5F5",color:isPaid?"#1565C0":"#9E9E9E"}}>
                          {isPaid?"✓ 已繳費":"✗ 未繳費"}
                        </button>
                        {c.note&&<span style={{fontSize:12,color:"#888"}}>{c.note}</span>}
                      </div>

                      {/* 堂數統計 */}
                      {!isPending&&(
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                          {[["總堂",c.total,"#1A1A1A"],["已上",c.used,"#555"],["剩餘",rem,rem===0?"#9E9E9E":rem<=3?"#D32F2F":"#2E7D32"]].map(([l,n,cl])=>(
                            <div key={l} style={{background:"#fff",border:"1px solid #EEE",borderRadius:10,padding:"10px 4px",textAlign:"center"}}>
                              <div style={{fontSize:22,fontWeight:900,color:cl}}>{n}</div>
                              <div style={{fontSize:10,color:"#AAA",marginTop:2}}>{l}</div>
                            </div>
                          ))}
                        </div>
                      )}

                      {isPaid&&c.paidDate&&<div style={{fontSize:12,color:"#888",marginBottom:4}}>繳費日：{c.paidDate}</div>}
                      {!isPaid&&<div style={{fontSize:12,color:"#E57373",fontWeight:600,marginBottom:4}}>尚未繳費</div>}
                      {c.signedAt&&<div style={{fontSize:11,color:"#2E7D32",marginBottom:10}}>簽名時間：{c.signedAt}</div>}

                      {/* 簽名圖 */}
                      {c.signed&&c.sigData&&(
                        <div style={{marginBottom:12}}>
                          <div style={{fontSize:11,color:"#AAA",marginBottom:5}}>學員簽名</div>
                          <img src={c.sigData} style={{width:"100%",border:"1px solid #EEE",borderRadius:8,background:"#fff"}}/>
                        </div>
                      )}

                      {/* 操作按鈕 */}
                      {!isPending&&(
                        <div style={{display:"flex",gap:8,marginTop:4}}>
                          <button onClick={()=>setPrintContract(c)}
                            style={{flex:1,padding:"9px",background:"#F5F5F5",border:"none",borderRadius:10,fontSize:12,fontWeight:600,color:"#555",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            列印合約
                          </button>
                          {!c.signed&&(
                            <button onClick={()=>{setShowContractSig(c.id);setContractSigData(null);}}
                              style={{flex:1,padding:"9px",background:"#E8F5E9",border:"none",borderRadius:10,fontSize:12,fontWeight:700,color:"#2E7D32",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                              請學員簽名
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ── 上課紀錄（可展開，含簽名） ─────────────────── */}
        {allMyRecords.length>0&&(
          <div style={{marginTop:20}}>
            <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:8}}>上課紀錄（共 {allMyRecords.length} 堂）</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {allMyRecords.map((r,i)=>{
                const isOpen=selectedRecordId===r.id;
                const checkinSig=r.sigData||null;
                return(
                  <div key={r.id} style={{background:"#fff",border:"1px solid "+(isOpen?"#1A1A1A":"#EEE"),borderRadius:12,overflow:"hidden",transition:"border-color 0.15s"}}>
                    <button onClick={()=>setSelectedRecordId(isOpen?null:r.id)}
                      style={{width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left"}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:"#1A1A1A"}}>{allMyRecords.length-i}. {r.timestamp}</div>
                        {checkinSig&&<div style={{fontSize:10,color:"#2E7D32",marginTop:2}}>✓ 含簽名</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{background:"#FFEBEE",borderRadius:8,padding:"3px 10px",color:"#D32F2F",fontWeight:700,fontSize:12}}>−1堂</div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCC" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                          style={{transform:isOpen?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s"}}>
                          <polyline points="6 9 12 15 18 9"/>
                        </svg>
                      </div>
                    </button>
                    {isOpen&&(
                      <div style={{borderTop:"1px solid #F5F5F5",padding:"12px 14px",background:"#FAFAFA"}}>
                        {checkinSig
                          ?<>
                            <div style={{fontSize:10,color:"#AAA",marginBottom:6}}>上課簽名</div>
                            <img src={checkinSig} style={{maxWidth:"100%",border:"1px solid #EEE",borderRadius:8,background:"#fff",display:"block"}}/>
                          </>
                          :<div style={{fontSize:12,color:"#AAA",fontStyle:"italic"}}>此筆紀錄無簽名檔</div>
                        }
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div style={{marginTop:24}}><Btn variant="red" full onClick={()=>setShowDel(true)}>刪除此學員</Btn></div>
      </div>

      {showAddC&&(<Modal title="新增合約" onClose={()=>setShowAddC(false)}>
        <Field label="合約總堂數" value={form.total} onChange={v=>setForm(f=>({...f,total:v}))} type="number" placeholder="例：10"/>
        {/* 繳費狀態切換 */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"#888",marginBottom:8,fontWeight:600}}>繳費狀態</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setForm(f=>({...f,paid:true}))}
              style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${form.paid?"#1565C0":"#EEE"}`,
                background:form.paid?"#E3F2FD":"#F9F9F9",color:form.paid?"#1565C0":"#AAA",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ✓ 已繳費
            </button>
            <button onClick={()=>setForm(f=>({...f,paid:false}))}
              style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${!form.paid?"#D32F2F":"#EEE"}`,
                background:!form.paid?"#FFEBEE":"#F9F9F9",color:!form.paid?"#D32F2F":"#AAA",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ✗ 未繳費
            </button>
          </div>
        </div>
        {form.paid&&<Field label="繳費日期" value={form.paidDate} onChange={v=>setForm(f=>({...f,paidDate:v}))} type="date"/>}
        <Field label="備注" value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} placeholder="例：第二期…"/>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <Btn variant="light" style={{flex:1}} onClick={()=>setShowAddC(false)}>取消</Btn>
          <Btn style={{flex:2}} onClick={handleAddContract}>新增合約</Btn>
        </div>
      </Modal>)}

      {showContractSig&&(<Modal title="合約簽名" onClose={()=>{setShowContractSig(null);setContractSigData(null);}}>
        <div style={{fontSize:13,color:"#666",marginBottom:14,lineHeight:1.8}}>請學員在下方簽名確認合約。</div>
        <SignatureCanvas onSigned={sd=>{
          setContractSigData(sd);
          if(sd){handleSignContract(showContractSig,sd);}
        }} label="合約簽名"/>
        <div style={{marginTop:10}}>
          <Btn variant="light" style={{width:"100%"}} onClick={()=>{setShowContractSig(null);setContractSigData(null);}}>取消</Btn>
        </div>
      </Modal>)}

      {showResetPin&&(<Modal title="重設 PIN 碼" onClose={()=>setShowResetPin(false)}>
        <div style={{fontSize:14,color:"#666",marginBottom:20,lineHeight:1.9}}>確定重設 <strong>{student.name}</strong> 的 PIN 碼？重設後學員需重新設定。</div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="light" style={{flex:1}} onClick={()=>setShowResetPin(false)}>取消</Btn>
          <Btn style={{flex:1}} onClick={()=>{setShowResetPin(false);save({...student,pin:null});}}>確認重設</Btn>
        </div>
      </Modal>)}

      {showDel&&(<Modal title="確認刪除" onClose={()=>setShowDel(false)}>
        <div style={{fontSize:14,color:"#666",marginBottom:20,lineHeight:1.9}}>確定刪除 <strong>{student.name}</strong>？<br/><span style={{color:"#D32F2F",fontWeight:600}}>此操作無法復原。</span></div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="light" style={{flex:1}} onClick={()=>setShowDel(false)}>取消</Btn>
          <Btn variant="red" style={{flex:1}} onClick={()=>{onDelete(student.id);showToast("已刪除學員","warn");onBack();}}>確認刪除</Btn>
        </div>
      </Modal>)}

      {printContract&&<ContractPrintOverlay student={student} contract={printContract} records={records} onClose={()=>setPrintContract(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練新增學員（PIN 可留空，由學員自行設定）
// ══════════════════════════════════════════════════════════════
function CoachAddStudent({onSave,onBack,existingNames}){
  const [name,setName]=useState("");
  const [total,setTotal]=useState("");
  const [paidDate,setPaidDate]=useState(new Date().toISOString().split("T")[0]);
  const [note,setNote]=useState("");
  const [err,setErr]=useState("");

  const handleSave=()=>{
    const t=name.trim();
    if(!t){setErr("請輸入姓名");return;}
    if(existingNames.includes(t)){setErr("此姓名已存在");return;}
    if(!total||Number(total)<1){setErr("請輸入有效堂數");return;}
    onSave({id:String(Date.now()),name:t,pin:null,contracts:[{id:Date.now()+1,total:Number(total),used:0,paidDate,note,signed:false,sigData:null}]});
  };

  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0,marginBottom:14}}>← 返回</button>
        <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>新增學員</div>
      </div>
      <div style={{padding:"20px 20px 100px"}}>
        <Field label="學員姓名" value={name} onChange={v=>{setName(v);setErr("");}} placeholder="請輸入姓名"/>
        <Field label="合約總堂數" value={total} onChange={v=>{setTotal(v);setErr("");}} type="number" placeholder="例：10"/>
        <Field label="繳費日期" value={paidDate} onChange={setPaidDate} type="date"/>
        <Field label="備注" value={note} onChange={setNote} placeholder="例：膝蓋注意…"/>
        <div style={{background:"#F7F7F7",border:"1px solid #EEE",borderRadius:11,padding:"11px 14px",marginBottom:16,fontSize:13,color:"#AAA",lineHeight:1.7}}>
          📌 PIN 碼由學員自行在登錄頁設定，或之後由教練在學員詳情頁補設。
        </div>
        {err&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#D32F2F",fontWeight:600}}>⚠ {err}</div>}
        <Btn full onClick={handleSave}>新增學員</Btn>
      </div>
    </div>
  );
}

// 簽到紀錄（篩選月份 & 學員，無簽名圖片）

  const [selMonth,setSelMonth]=useState(months[0]||defaultMonth);

  // 修改管理密碼
  const [changingPin,setChangingPin]=useState(false); // 顯示修改密碼 modal
  const [cpStep,setCpStep]=useState("current"); // "current" | "new" | "confirm"
  const [cpPin,setCpPin]=useState("");
  const [cpFirst,setCpFirst]=useState("");
  const [cpError,setCpError]=useState("");
  const [cpShake,setCpShake]=useState(false);
  const cpDoShake=msg=>{setCpShake(true);setCpError(msg);setCpPin("");setTimeout(()=>setCpShake(false),500);};
  const cpReset=()=>{setCpStep("current");setCpPin("");setCpFirst("");setCpError("");};

  const [cpSaving,setCpSaving]=useState(false);
  const handleCpKey=async k=>{
    if(k==="⌫"){setCpPin(c=>c.slice(0,-1));setCpError("");return;}
    if(cpPin.length>=4)return;
    const next=cpPin+k;setCpPin(next);setCpError("");
    if(next.length<4)return;
    await new Promise(r=>setTimeout(r,120));
    if(cpStep==="current"){
      const h=await hashPin(next);
      const stored=await fetchCoachPin();
      if(h===stored){setCpStep("new");setCpPin("");setCpError("");}
      else{cpDoShake("密碼錯誤");}
    } else if(cpStep==="new"){
      setCpFirst(next);setCpPin("");setCpError("");setCpStep("confirm");
    } else if(cpStep==="confirm"){
      if(next===cpFirst){
        setCpSaving(true);
        const h=await hashPin(next);
        await saveCoachPin(h);
        setCpSaving(false);
        setChangingPin(false);cpReset();showToast("✅ 管理密碼已更新");
      } else {setCpFirst("");setCpStep("new");cpDoShake("兩次輸入不一致，請重新輸入新密碼");}
    }
  };

  const cpTitle=cpStep==="current"?"輸入現有密碼":cpStep==="new"?"輸入新密碼":"確認新密碼";
  const cpSub=cpStep==="current"?"請輸入目前的管理密碼":cpStep==="new"?"請設定新的 4 位數密碼":"請再輸入一次新密碼";

            <div style={{fontSize:13,color:"#AAA",marginBottom:20}}>{cpSub}</div>
            <div style={{display:"flex",gap:18,justifyContent:"center",marginBottom:10,animation:cpShake?"shake 0.4s ease":"none"}}>
              {[0,1,2,3].map(i=><PinDot key={i} filled={i<cpPin.length}/>)}
            </div>
            <div style={{height:24,marginBottom:8}}>
              {cpSaving?<span style={{color:"#888",fontSize:14}}>儲存中…</span>:cpError&&<span style={{color:"#D32F2F",fontSize:14,fontWeight:600}}>{cpError}</span>}
            </div>
            <NumPad onPress={handleCpKey}/>
          </div>
        </Modal>
      )}
      <div style={{padding:"20px 20px 100px"}}>
        <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:10}}>報表匯出</div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <div style={{fontSize:13,fontWeight:700,color:"#1A1A1A"}}>每月上課報表</div>
          </div>
          <select value={selMonth} onChange={e=>setSelMonth(e.target.value)}
            style={{width:"100%",padding:"10px 12px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:14,outline:"none",color:"#555",marginBottom:12}}>
            {months.length===0&&<option value={defaultMonth}>{defaultMonth}</option>}

          <Btn full variant="light" onClick={()=>{if(!selMonth){showToast("請選擇月份","warn");return;}exportMonthlyReport(records,students,selMonth);showToast("✅ 月報表已下載");}}>

        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>

          </Btn>
        </div>
        <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:10}}>資料備份</div>
        <div style={{background:"#F7F7F7",border:"1px solid #E8E8E8",borderRadius:14,padding:"14px 16px",marginBottom:12}}>

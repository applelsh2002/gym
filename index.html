const GAS_URL="https://script.google.com/macros/s/AKfycbz0FM5J2PUxWHtExmXNLLVa07gLjxI3IF7ocjrHXs-25LzSLAxbuZneDRFT5S3pOVC9Vw/exec";
const LS_COACH_PIN="coach_master_pin";
function getCoachPinCache(){return localStorage.getItem(LS_COACH_PIN)||null;}
function setCoachPinCache(hashed){localStorage.setItem(LS_COACH_PIN,hashed);}

async function fetchCoachPin(){
  try{
    const res=await gasGet("getCoachPin");
    if(res&&res.hash){setCoachPinCache(res.hash);return res.hash;}
    const def=await hashPin("0000");
    setCoachPinCache(def);gasSync({action:"setCoachPin",hash:def});return def;
  }catch{
    const cached=getCoachPinCache();
    if(cached)return cached;
    const def=await hashPin("0000");setCoachPinCache(def);return def;
  }
}
async function saveCoachPin(hash){setCoachPinCache(hash);gasSync({action:"setCoachPin",hash});}
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── sigData 僅存 localStorage ──────────────────────────────────
function sigSave(contractId,dataUrl){try{localStorage.setItem("sig_"+contractId,dataUrl);}catch{}}
function sigLoad(contractId){try{return localStorage.getItem("sig_"+contractId)||null;}catch{return null;}}
function sigDelete(contractId){try{localStorage.removeItem("sig_"+contractId);}catch{}}
function injectSigData(student){
  return{...student,contracts:student.contracts.map(c=>{
    if(!c.signed)return c;
    const sd=sigLoad(c.id);
    return sd?{...c,sigData:sd}:c;
  })};
}
function persistSigData(student){
  student.contracts.forEach(c=>{if(c.signed&&c.sigData)sigSave(c.id,c.sigData);});
}

async function gasGet(action){
  if(!GAS_URL)return null;
  try{
    const r=await fetch(GAS_URL+"?action="+action,{method:"GET",redirect:"follow"});
    if(!r.ok)return null;return await r.json();
  }catch(e){console.warn("gasGet:",e);return null;}
}
function gasSync(body){
  if(!GAS_URL)return;
  const clean=stripSigData(body);
  const encoded=encodeURIComponent(JSON.stringify(clean));
  fetch(GAS_URL+"?action=post&payload="+encoded,{method:"GET",mode:"no-cors",redirect:"follow"}).catch(()=>{});
}
function stripSigData(obj){
  if(!obj||typeof obj!=="object")return obj;
  const o={...obj};
  if(o.student){o.student={...o.student};if(o.student.contracts)o.student.contracts=o.student.contracts.map(c=>{const x={...c};delete x.sigData;return x;});}
  return o;
}

function getTaiwanTime(){
  const d=new Date();
  const tw=new Date(d.toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  const pad=n=>String(n).padStart(2,"0");
  return `${tw.getFullYear()}/${pad(tw.getMonth()+1)}/${pad(tw.getDate())} ${pad(tw.getHours())}:${pad(tw.getMinutes())}:${pad(tw.getSeconds())}`;
}
function getTaiwanDate(){
  const d=new Date();
  const tw=new Date(d.toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  const pad=n=>String(n).padStart(2,"0");
  return `${tw.getFullYear()}/${pad(tw.getMonth()+1)}/${pad(tw.getDate())}`;
}
function normalizeTimestamp(v){
  if(!v)return"";
  const s=String(v).trim();
  if(/^\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2}$/.test(s))return s;
  const d=new Date(s);
  if(!isNaN(d.getTime())){
    const tw=new Date(d.toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
    const pad=n=>String(n).padStart(2,"0");
    return `${tw.getFullYear()}/${pad(tw.getMonth()+1)}/${pad(tw.getDate())} ${pad(tw.getHours())}:${pad(tw.getMinutes())}:${pad(tw.getSeconds())}`;
  }
  return s;
}

async function hashPin(pin){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("coach_pin_salt_"+pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);
}
const isHashed=v=>v&&/^[0-9a-f]{16}$/.test(v);
async function isPinTaken(pin,students,excludeId=null){
  for(const s of students){
    if(excludeId&&s.id===excludeId)continue;
    if(!s.pin)continue;
    if(await pinMatches(pin,s.pin))return true;
  }
  return false;
}
async function pinMatches(input,stored){
  if(!stored)return false;
  if(isHashed(stored)){const h=await hashPin(input);return h===stored;}
  return input===stored;
}

const getTotalRemaining=s=>s.contracts.reduce((sum,c)=>c.total===-1?sum:sum+Math.max(0,c.total-c.used),0);
const remColor=r=>r<=0?"#9E9E9E":r<=3?"#D32F2F":"#2E7D32";
const remBg=r=>r<=0?"#F5F5F5":r<=3?"#FFEBEE":"#E8F5E9";

// 從 workouts 取得某學員某動作的最近一次紀錄
function getLastWorkout(workouts,studentId,exerciseId){
  const mine=workouts.filter(w=>String(w.studentId)===String(studentId)&&String(w.exerciseId)===String(exerciseId));
  if(!mine.length)return null;
  // 依日期排序，取最新一天的所有組
  const dates=[...new Set(mine.map(w=>w.date))].sort().reverse();
  const lastDate=dates[0];
  return mine.filter(w=>w.date===lastDate);
}

// 取某學員某動作的所有歷史紀錄（依日期分組）
function getWorkoutHistory(workouts,studentId,exerciseId){
  const mine=workouts.filter(w=>String(w.studentId)===String(studentId)&&String(w.exerciseId)===String(exerciseId));
  const dateMap={};
  mine.forEach(w=>{if(!dateMap[w.date])dateMap[w.date]=[];dateMap[w.date].push(w);});
  return Object.entries(dateMap).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,sets])=>({date,sets}));
}

// 取某學員最近上課的所有動作（上次課表）
function getLastSessionWorkouts(workouts,studentId){
  const mine=workouts.filter(w=>String(w.studentId)===String(studentId));
  if(!mine.length)return null;
  const dates=[...new Set(mine.map(w=>w.date))].sort().reverse();
  const lastDate=dates[0];
  const sets=mine.filter(w=>w.date===lastDate);
  // 按 exerciseId 分組
  const exMap={};
  sets.forEach(w=>{if(!exMap[w.exerciseId])exMap[w.exerciseId]=[];exMap[w.exerciseId].push(w);});
  return{date:lastDate,exercises:exMap};
}

// GAS 同步訓練紀錄（append 模式，一次傳一批 sets）
function gasSyncWorkouts(sets){

  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PDF 生成（原有，不變）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function generateContractPDF(student,contract,printTime){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const isPaid=contract.paid!==false;
  const sigData=contract.sigData||sigLoad(contract.id);
  const W=210,ml=20,mr=20,cw=W-ml-mr;
  let y=22;
  const DPR=3;
  const mmToPx=mm=>mm*DPR*(96/25.4);
  function textImg(text,{fontSize=14,color='#1A1A1A',fontWeight='normal',width=170,align='left'}={}){
    const pxW=Math.round(mmToPx(width));
    const pxH=Math.round(mmToPx(fontSize*0.5+4));
    const c=document.createElement('canvas');
    c.width=pxW;c.height=pxH;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,pxW,pxH);
    ctx.font=`${fontWeight} ${Math.round(mmToPx(fontSize*0.35))}px 'Noto Sans TC',sans-serif`;
    ctx.fillStyle=color;ctx.textBaseline='middle';
    if(align==='right')ctx.textAlign='right';
    else if(align==='center')ctx.textAlign='center';
    else ctx.textAlign='left';
    const x=align==='right'?pxW:align==='center'?pxW/2:0;
    ctx.fillText(text,x,pxH/2);
    return{dataUrl:c.toDataURL('image/png'),wMM:width,hMM:fontSize*0.5+4};
  }
  function addImg(dataUrl,xMM,yMM,wMM,hMM){doc.addImage(dataUrl,'PNG',xMM,yMM,wMM,hMM);}
  const titleImg=textImg('合約紀錄',{fontSize:20,fontWeight:'900',color:'#1A1A1A',width:80});
  addImg(titleImg.dataUrl,ml,y,titleImg.wMM,titleImg.hMM);
  const subImg=textImg('CONTRACT RECORD',{fontSize:8,color:'#AAAAAA',width:80});
  addImg(subImg.dataUrl,ml,y+titleImg.hMM+0.5,subImg.wMM,subImg.hMM);
  const dtImg=textImg(printTime,{fontSize:8,color:'#AAAAAA',width:60,align:'right'});
  addImg(dtImg.dataUrl,W-mr-60,y+2,60,dtImg.hMM);
  y+=titleImg.hMM+subImg.hMM+4;
  doc.setDrawColor(26,26,26);doc.setLineWidth(0.6);doc.line(ml,y,W-mr,y);y+=8;
  const rows=[['姓名',student.name,'#1A1A1A'],['繳費狀態',isPaid?'已繳費':'未繳費',isPaid?'#1565C0':'#D32F2F'],
    ...(isPaid&&contract.paidDate?[['繳費日期',contract.paidDate,'#1A1A1A']]:[]),
    ...(contract.signedAt?[['簽名時間',contract.signedAt,'#2E7D32']]:[]),
    ...(contract.note?[['備注',contract.note,'#1A1A1A']]:[])];
  const rowH=12;
  rows.forEach(([k,v,vc],i)=>{
    if(i%2===0){doc.setFillColor(250,250,250);}else{doc.setFillColor(255,255,255);}
    doc.roundedRect(ml,y,cw,rowH,0,0,'F');
    if(i>0){doc.setDrawColor(240,240,240);doc.setLineWidth(0.3);doc.line(ml,y,ml+cw,y);}
    const ki=textImg(k,{fontSize:10,color:'#AAAAAA',width:50});addImg(ki.dataUrl,ml+4,y+(rowH-ki.hMM)/2,ki.wMM,ki.hMM);
    const vi=textImg(v,{fontSize:11,fontWeight:'700',color:vc,width:90,align:'right'});addImg(vi.dataUrl,ml+cw-90-4,y+(rowH-vi.hMM)/2,vi.wMM,vi.hMM);
    y+=rowH;
  });
  doc.setDrawColor(232,232,232);doc.setLineWidth(0.4);doc.roundedRect(ml,y-rowH*rows.length,cw,rowH*rows.length,2,2,'S');y+=10;
  const halfW=(cw-8)/2;
  const cl=textImg('教練簽名',{fontSize:9,color:'#AAAAAA',fontWeight:'700',width:halfW});addImg(cl.dataUrl,ml,y,cl.wMM,cl.hMM);
  const sl=textImg('學員確認',{fontSize:9,color:'#AAAAAA',fontWeight:'700',width:halfW});addImg(sl.dataUrl,ml+halfW+8,y,sl.wMM,sl.hMM);
  y+=cl.hMM+3;
  doc.setDrawColor(187,187,187);doc.setLineWidth(0.5);doc.line(ml,y+30,ml+halfW,y+30);
  if(sigData){
    const tmpImg=new Image();
    await new Promise(res=>{tmpImg.onload=res;tmpImg.src=sigData;});
    const ratio=tmpImg.naturalHeight/tmpImg.naturalWidth;
    const maxW=halfW,maxH=35;
    let sigW=maxW,sigH=sigW*ratio;
    if(sigH>maxH){sigH=maxH;sigW=sigH/ratio;}
    doc.addImage(sigData,'PNG',ml+halfW+8,y,sigW,sigH);
    y+=Math.max(33,sigH)+6;
  }else{
    const ns=textImg('尚未簽署',{fontSize:10,color:'#F9A825',fontWeight:'700',width:halfW});
    addImg(ns.dataUrl,ml+halfW+8,y+10,ns.wMM,ns.hMM);y+=36;
  }
  y+=6;doc.setDrawColor(238,238,238);doc.setLineWidth(0.3);doc.line(ml,y,W-mr,y);y+=4;
  const fl=textImg('教練管理系統',{fontSize:8,color:'#CCCCCC',width:60});addImg(fl.dataUrl,ml,y,fl.wMM,fl.hMM);
  const fr=textImg(printTime,{fontSize:8,color:'#CCCCCC',width:60,align:'right'});addImg(fr.dataUrl,W-mr-60,y,60,fr.hMM);
  const fname=`合約_${student.name}_${printTime.replace(/[/:]/g,'-')}.pdf`;
  doc.save(fname);
}

    setDownloading(true);
    try{await generateContractPDF(student,contract,printTime);}
    catch(e){alert('PDF 生成失敗：'+e.message);}
    setDownloading(false);
  };
  const rows=[["姓名",student.name,"#1A1A1A"],["繳費狀態",isPaid?"已繳費":"未繳費",isPaid?"#1565C0":"#D32F2F"],
    ...(isPaid&&contract.paidDate?[["繳費日期",contract.paidDate,"#1A1A1A"]]:[]),
    ...(contract.signedAt?[["簽名時間",contract.signedAt,"#2E7D32"]]:[]),
    ...(contract.note?[["備注",contract.note,"#1A1A1A"]]:[])];
  return(
    <div style={{position:"fixed",inset:0,zIndex:9998,background:"#F7F7F7",overflowY:"auto",fontFamily:"'Noto Sans TC',sans-serif"}}>
      <div style={{position:"sticky",top:0,background:"#1A1A1A",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:1}}>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>返回
        </button>
        <span style={{color:"#fff",fontWeight:700,fontSize:14}}>合約預覽</span>
        <button onClick={handleDownload} disabled={downloading}
          style={{background:downloading?"#555":"#fff",border:"none",color:"#1A1A1A",fontSize:13,fontWeight:700,cursor:downloading?"not-allowed":"pointer",padding:"7px 16px",borderRadius:8,display:"flex",alignItems:"center",gap:6,opacity:downloading?0.7:1}}>
          {downloading?"生成中…":<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下載 PDF</>}
        </button>
      </div>
      <div style={{maxWidth:520,margin:"24px auto",background:"#fff",borderRadius:12,boxShadow:"0 4px 24px rgba(0,0,0,0.10)",padding:"36px 32px 40px"}}>
        <div style={{borderBottom:"2.5px solid #1A1A1A",paddingBottom:14,marginBottom:24,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div><div style={{fontSize:26,fontWeight:900,color:"#1A1A1A"}}>合約紀錄</div><div style={{fontSize:10,color:"#AAA",letterSpacing:3,marginTop:4}}>CONTRACT RECORD</div></div>
          <div style={{fontSize:11,color:"#AAA"}}>{printTime}</div>
        </div>
        <div style={{border:"1px solid #E8E8E8",borderRadius:10,overflow:"hidden",marginBottom:28}}>
          {rows.map(([k,v,c],i)=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"15px 18px",background:i%2===0?"#FAFAFA":"#fff",borderBottom:i<rows.length-1?"1px solid #F0F0F0":"none"}}>
              <span style={{fontSize:13,color:"#AAA"}}>{k}</span>
              <span style={{fontSize:14,fontWeight:700,color:c}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:16}}>
          <div><div style={{fontSize:11,color:"#AAA",fontWeight:700,marginBottom:10,letterSpacing:1}}>教練簽名</div><div style={{borderBottom:"1.5px solid #CCC",height:60}}/></div>
          <div><div style={{fontSize:11,color:"#AAA",fontWeight:700,marginBottom:10,letterSpacing:1}}>學員確認</div>
            {sigData?<img src={sigData} style={{maxWidth:"100%",maxHeight:60,display:"block"}}/>:<div style={{height:60,display:"flex",alignItems:"center",fontSize:12,color:"#F9A825",fontWeight:700}}>尚未簽署</div>}
          </div>
        </div>
        <div style={{borderTop:"1px solid #EEE",paddingTop:10,display:"flex",justifyContent:"space-between",fontSize:10,color:"#CCC"}}>
          <span>教練管理系統</span><span>{printTime}</span>
        </div>
      </div>
    </div>
  );
}

function exportExcel(students,records){
  const maskPin=p=>p?"●●●●":"(未設定)";
  const tbl=(cap,hdrs,rows)=>`<table border="1" style="border-collapse:collapse;margin-bottom:28px"><caption style="font-weight:bold;margin-bottom:4px">${cap}</caption><thead><tr>${hdrs.map(h=>`<th style="background:#1A1A1A;color:#fff;padding:6px 10px">${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td style="padding:5px 10px">${c??""}</td>`).join("")}</tr>`).join("")}</tbody></table>`;

function SignatureCanvas({onSigned,label="請在此簽名"}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const hasStroke=useRef(false);
  const [signed,setSigned]=useState(false);
  const [open,setOpen]=useState(false);
  const [hasDrawn,setHasDrawn]=useState(false);
  const [showConfirm,setShowConfirm]=useState(false);
  const initCanvas=()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const dpr=window.devicePixelRatio||1;const W=window.innerWidth;const H=window.innerHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";
    const ctx=canvas.getContext("2d");ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
    hasStroke.current=false;setHasDrawn(false);setShowConfirm(false);
  };
  useEffect(()=>{
    if(open){document.body.style.overflow="hidden";setTimeout(initCanvas,30);}
    else{document.body.style.overflow="";}
    return()=>{document.body.style.overflow="";};
  },[open]);
  const getPos=(canvas,e)=>{const rect=canvas.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:src.clientX-rect.left,y:src.clientY-rect.top};};
  const onStart=e=>{e.preventDefault();e.stopPropagation();if(showConfirm)return;const canvas=canvasRef.current;const ctx=canvas.getContext("2d");const pos=getPos(canvas,e);ctx.beginPath();ctx.moveTo(pos.x,pos.y);drawing.current=true;};
  const onMove=e=>{e.preventDefault();e.stopPropagation();if(!drawing.current||showConfirm)return;const canvas=canvasRef.current;const ctx=canvas.getContext("2d");ctx.lineWidth=4;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#1A1A1A";const pos=getPos(canvas,e);ctx.lineTo(pos.x,pos.y);ctx.stroke();if(!hasStroke.current){hasStroke.current=true;setHasDrawn(true);}};
  const onEnd=e=>{e.preventDefault();e.stopPropagation();drawing.current=false;};
  const handleClear=()=>{const canvas=canvasRef.current;if(!canvas)return;const dpr=window.devicePixelRatio||1;const ctx=canvas.getContext("2d");ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);hasStroke.current=false;setHasDrawn(false);setShowConfirm(false);};
  const handleConfirmClick=()=>{if(!hasStroke.current)return;setShowConfirm(true);};
  const handleFinalConfirm=()=>{const dataUrl=canvasRef.current.toDataURL("image/png");setSigned(true);setOpen(false);setShowConfirm(false);onSigned(dataUrl);};
  const handleReopen=()=>{setSigned(false);onSigned(null);setOpen(true);};
  return(
    <>
      {!signed?(
        <button onClick={()=>setOpen(true)} style={{width:"100%",padding:"18px",background:"#F7F7F7",border:"2px dashed #DDD",borderRadius:14,cursor:"pointer",color:"#AAA",fontSize:14,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#CCC" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>點此開啟簽名
        </button>
      ):(
        <div style={{background:"#E8F5E9",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span style={{fontSize:14,color:"#2E7D32",fontWeight:700}}>簽名完成</span>
          </div>
          <button onClick={handleReopen} style={{background:"none",border:"none",color:"#AAA",fontSize:12,cursor:"pointer",padding:"4px 8px"}}>重簽</button>
        </div>
      )}
      {open&&(
        <div style={{position:"fixed",inset:0,zIndex:9999,background:"#fff",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid #EEE",flexShrink:0,background:"#fff"}}>
            <button onClick={()=>{setOpen(false);setShowConfirm(false);}} style={{background:"none",border:"none",color:"#888",fontSize:15,cursor:"pointer",padding:"4px 8px"}}>取消</button>
            <div style={{fontSize:15,fontWeight:700,color:"#1A1A1A"}}>{label}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={handleClear} style={{background:"#F5F5F5",border:"none",color:"#666",fontSize:13,fontWeight:600,cursor:"pointer",padding:"7px 14px",borderRadius:9}}>清除</button>
              <button onClick={handleConfirmClick} disabled={!hasDrawn} style={{background:hasDrawn?"#1A1A1A":"#E0E0E0",border:"none",color:hasDrawn?"#fff":"#AAA",fontSize:13,fontWeight:700,cursor:hasDrawn?"pointer":"not-allowed",padding:"7px 18px",borderRadius:9,transition:"background 0.2s"}}>確認</button>
            </div>
          </div>
          <div style={{flex:1,position:"relative",overflow:"hidden",background:"#FAFAFA"}}>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:15,color:"#E0E0E0",pointerEvents:"none",userSelect:"none",letterSpacing:2}}>請在此簽名</div>
            <canvas ref={canvasRef} style={{position:"absolute",top:0,left:0,touchAction:"none",cursor:"crosshair"}}
              onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
              onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}/>
            {showConfirm&&(
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>
                <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:300,boxShadow:"0 12px 40px rgba(0,0,0,0.2)",textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:800,color:"#1A1A1A",marginBottom:8}}>確認送出簽名？</div>
                  <div style={{fontSize:13,color:"#888",marginBottom:24,lineHeight:1.7}}>確定後將儲存此筆簽名，<br/>無法再修改。</div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setShowConfirm(false)} style={{flex:1,padding:"12px",background:"#F2F2F2",border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:"#555",cursor:"pointer"}}>返回修改</button>
                    <button onClick={handleFinalConfirm} style={{flex:2,padding:"12px",background:"#1A1A1A",border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:"#fff",cursor:"pointer"}}>✓ 確定送出</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// 學員登錄（含 PIN 設定 + 合約簽名）
// ══════════════════════════════════════════════════════════════
function StudentRegister({onDone,onBack,onCheckinNow,existingNames,existingStudents}){
  const [step,setStep]=useState("name");
  const [name,setName]=useState("");
  const [nameErr,setNameErr]=useState("");
  const [pin,setPin]=useState("");
  const [pinConfirm,setPinConfirm]=useState("");
  const [pinDisplay,setPinDisplay]=useState("");
  const [pinErr,setPinErr]=useState("");
  const [pinStep,setPinStep]=useState("pin");
  const [total,setTotal]=useState("");
  const [paidDate,setPaidDate]=useState(new Date().toISOString().split("T")[0]);
  const [note,setNote]=useState("");
  const [paid,setPaid]=useState(true);
  const [contractErr,setContractErr]=useState("");
  const [sig,setSig]=useState(null);
  const [sigErr,setSigErr]=useState("");
  const savedStudentRef=useRef(null);

  const handleNameNext=()=>{
    const t=name.trim();
    if(!t){setNameErr("請輸入姓名");return;}
    if(existingNames.includes(t)){setNameErr("此姓名已存在");return;}
    setNameErr("");setStep("pin");
  };
  const handlePinKey=async k=>{
    if(k==="⌫"){
      if(pinStep==="pin"){setPinDisplay(c=>c.slice(0,-1));setPin(c=>c.slice(0,-1));}
      else{setPinDisplay(c=>c.slice(0,-1));setPinConfirm(c=>c.slice(0,-1));}
      setPinErr("");return;
    }
    if(pinDisplay.length>=4)return;
    const next=pinDisplay+k;setPinDisplay(next);
    if(pinStep==="pin"){const p=pin+k;setPin(p);if(next.length===4){await new Promise(r=>setTimeout(r,80));
      const taken=await isPinTaken(p,existingStudents);
      if(taken){setPinErr("此 PIN 碼已被使用，請換一組");setPinDisplay("");setPin("");return;}
      setPinStep("confirm");setPinDisplay("");}}
    else{const p=pinConfirm+k;setPinConfirm(p);if(next.length===4){await new Promise(r=>setTimeout(r,80));
      if(p!==pin){setPinErr("兩次輸入不同，請重新設定");setPinStep("pin");setPinDisplay("");setPin("");setPinConfirm("");return;}
      setPinErr("");setStep("contract");}}
  };
  const handleContractNext=()=>{
    if(!total||Number(total)<1){setContractErr("請輸入有效堂數");return;}
    setContractErr("");setStep("sign");
  };
  const handleFinish=async()=>{
    if(!sig){setSigErr("請先完成簽名");return;}
    const hashed=await hashPin(pin);
    const contractId=Date.now()+1;
    sigSave(contractId,sig);
    const s={id:String(Date.now()),name:name.trim(),pin:hashed,scheduledToday:false,
      contracts:[{id:contractId,total:Number(total),used:0,paidDate:paid?paidDate:null,paid,note,signed:true,sigData:sig,signedAt:getTaiwanTime()}]};
    savedStudentRef.current=s;
    onDone(s);setStep("askCheckin");
  };

  return(
    <div style={{minHeight:"100vh",background:"#fff"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE",display:"flex",alignItems:"center",gap:16}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0}}>← 返回</button>
        <div style={{fontSize:18,fontWeight:800,color:"#1A1A1A"}}>新學員登錄</div>
      </div>

      {step==="name"&&(
        <div style={{padding:"28px 24px"}}>
          <Field label="學員姓名" value={name} onChange={v=>{setName(v);setNameErr("");}} placeholder="請輸入全名"/>
          {nameErr&&<div style={{color:"#D32F2F",fontSize:13,fontWeight:600,marginBottom:10}}>{nameErr}</div>}
          <Btn full onClick={handleNameNext}>下一步</Btn>
        </div>
      )}

      {step==="pin"&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:40}}>
          <div style={{textAlign:"center",marginBottom:30}}>
            <div style={{fontSize:24,fontWeight:800,color:"#1A1A1A"}}>{pinStep==="pin"?"設定 PIN 碼":"再輸入一次"}</div>
            <div style={{fontSize:14,color:"#AAA",marginTop:8,maxWidth:260,textAlign:"center"}}>{pinStep==="pin"?"請設定 4 位數字（不可與其他學員重複）":"請再次輸入確認"}</div>
          </div>
          <div style={{display:"flex",gap:22,marginBottom:14}}>
            {[0,1,2,3].map(i=><PinDot key={i} filled={i<pinDisplay.length}/>)}
          </div>
          <div style={{height:32,display:"flex",alignItems:"center",marginBottom:20,padding:"0 20px"}}>
            {pinErr&&<span style={{color:"#D32F2F",fontSize:13,fontWeight:600,textAlign:"center"}}>{pinErr}</span>}
          </div>
          <NumPad onPress={handlePinKey}/>
        </div>
      )}

      {step==="contract"&&(
        <div style={{padding:"28px 24px"}}>
          <div style={{fontSize:14,color:"#888",marginBottom:20,lineHeight:1.8}}>請填寫本次合約內容。</div>
          <Field label="合約總堂數" value={total} onChange={v=>{setTotal(v);setContractErr("");}} type="number" placeholder="例：10"/>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:"#888",marginBottom:8,fontWeight:600}}>繳費狀態</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setPaid(true)} style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${paid?"#1565C0":"#EEE"}`,background:paid?"#E3F2FD":"#F9F9F9",color:paid?"#1565C0":"#AAA",fontWeight:700,fontSize:13,cursor:"pointer"}}>✓ 已繳費</button>
              <button onClick={()=>setPaid(false)} style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${!paid?"#D32F2F":"#EEE"}`,background:!paid?"#FFEBEE":"#F9F9F9",color:!paid?"#D32F2F":"#AAA",fontWeight:700,fontSize:13,cursor:"pointer"}}>✗ 未繳費</button>
            </div>
          </div>
          {paid&&<Field label="繳費日期" value={paidDate} onChange={setPaidDate} type="date"/>}
          <Field label="備注（選填）" value={note} onChange={setNote} placeholder="例：週三班…"/>
          {contractErr&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#D32F2F",fontWeight:600}}>⚠ {contractErr}</div>}
          <Btn full onClick={handleContractNext}>下一步：簽署合約</Btn>
        </div>
      )}

      {step==="sign"&&(
        <div style={{padding:"28px 24px"}}>
          <div style={{background:"#F7F7F7",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
            <div style={{fontSize:12,color:"#AAA",marginBottom:6}}>合約摘要</div>
            <div style={{fontSize:15,color:"#1A1A1A",fontWeight:700}}>{name}　{total} 堂</div>
            <div style={{fontSize:13,color:"#888",marginTop:4}}>{paid?`繳費日：${paidDate}`:"尚未繳費"}{note?"　"+note:""}</div>
          </div>
          <div style={{fontSize:14,color:"#555",marginBottom:14}}>請在下方簽名確認合約內容。</div>
          <SignatureCanvas onSigned={setSig} label="合約簽名"/>
          {sigErr&&<div style={{color:"#D32F2F",fontSize:13,marginTop:8,fontWeight:600}}>{sigErr}</div>}
          <Btn full style={{marginTop:16}} disabled={!sig} onClick={handleFinish}>✓ 完成合約簽署</Btn>
        </div>
      )}

      {step==="askCheckin"&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 28px 0"}}>
          <div style={{width:72,height:72,borderRadius:22,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24}}>
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div style={{fontSize:22,fontWeight:900,color:"#1A1A1A",marginBottom:10,textAlign:"center"}}>合約簽署完成！</div>
          <div style={{fontSize:15,color:"#888",marginBottom:40,textAlign:"center",lineHeight:1.9}}>
            <strong style={{color:"#1A1A1A"}}>{name}</strong>，歡迎加入！<br/>今天有要上課嗎？
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:320}}>
            <Btn full onClick={()=>onCheckinNow(savedStudentRef.current)}>✍ 是，現在進行簽到</Btn>
            <Btn full variant="light" onClick={onBack}>不用，先回首頁</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練 PIN 入口
// ══════════════════════════════════════════════════════════════
function CoachPinGate({onSuccess,onBack}){
  const [pin,setPin]=useState("");
  const [error,setError]=useState("");
  const [shake,setShake]=useState(false);
  const [loading,setLoading]=useState(false);
  const pinHashRef=useRef(getCoachPinCache());
  const doShake=msg=>{setShake(true);setError(msg);setPin("");setTimeout(()=>setShake(false),500);};
  useEffect(()=>{fetchCoachPin().then(h=>{pinHashRef.current=h;});},[]);
  const handleKey=async k=>{
    if(k==="⌫"){setPin(c=>c.slice(0,-1));setError("");return;}
    if(pin.length>=4)return;
    const next=pin+k;setPin(next);setError("");
    if(next.length<4)return;
    await new Promise(r=>setTimeout(r,80));
    const h=await hashPin(next);
    const stored=pinHashRef.current;
    if(stored){if(h===stored){onSuccess();}else{doShake("密碼錯誤");}}
    else{setLoading(true);try{const fresh=await fetchCoachPin();pinHashRef.current=fresh;if(h===fresh){onSuccess();}else{doShake("密碼錯誤");}}catch{doShake("網路異常，請重試");}setLoading(false);}
  };
  return(
    <div style={{minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <button onClick={onBack} style={{position:"absolute",top:28,left:20,background:"none",border:"none",color:"#CCC",fontSize:14,cursor:"pointer"}}>← 返回</button>
      <div style={{textAlign:"center",marginBottom:44}}>
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",margin:"0 auto 20px"}}>
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <div style={{fontSize:24,fontWeight:800,color:"#1A1A1A"}}>教練管理</div>
        <div style={{fontSize:15,color:"#AAA",marginTop:8}}>請輸入管理密碼</div>
      </div>
      <div style={{display:"flex",gap:22,marginBottom:14,animation:shake?"shake 0.4s ease":"none"}}>
        {[0,1,2,3].map(i=><PinDot key={i} filled={i<pin.length}/>)}
      </div>
      <div style={{height:28,display:"flex",alignItems:"center",marginBottom:20}}>
        {error&&<span style={{color:"#D32F2F",fontSize:16,fontWeight:600}}>{error}</span>}
      </div>
      <NumPad onPress={handleKey}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練主頁

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div style={{background:"#F2F2F2",borderRadius:12,padding:"11px 10px",textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{students.length}</div>

          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋學員…"
            style={{width:"100%",padding:"11px 14px 11px 38px",background:"#F7F7F7",border:"1px solid #EEE",borderRadius:12,fontSize:14,outline:"none"}}/>
        </div>
      </div>
      <div style={{padding:"12px 20px 100px"}}>
        {sorted.map(s=>{
          const rem=getTotalRemaining(s);
          return(
            <div key={s.id} style={{background:"#fff",border:"1px solid #EEE",borderRadius:15,padding:"13px 15px",marginBottom:8,display:"flex",alignItems:"center"}}>
              <div style={{flex:1,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:42,height:42,borderRadius:13,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#666",flexShrink:0}}>{s.name[0]}</div>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>

                    {!s.pin&&<span style={{fontSize:9,background:"#FFF9C4",color:"#F9A825",padding:"2px 6px",borderRadius:8,fontWeight:700}}>未設PIN</span>}

                  <div style={{fontSize:11,color:"#CCC",marginTop:2}}>剩餘 {rem} 堂</div>
                </div>
              </div>
              <div style={{background:remBg(rem),borderRadius:10,padding:"4px 12px",marginRight:10,textAlign:"center"}}>
                <span style={{fontSize:17,fontWeight:900,color:remColor(rem)}}>{rem}</span>
              </div>
              <button onClick={()=>onEdit(s)} style={{width:34,height:34,borderRadius:10,background:"#F5F5F5",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Pencil/></button>
            </div>
          );
        })}
        {sorted.length===0&&<div style={{textAlign:"center",color:"#CCC",padding:"50px 0"}}>{search?`找不到「${search}」`:"尚無學員"}</div>}
      </div>
      <BottomTabs active="coach" onChange={onTab}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練學員詳情
// ══════════════════════════════════════════════════════════════
function CoachDetail({student,records,onBack,onUpdate,onDelete,showToast}){
  const [showAddC,setShowAddC]=useState(false);
  const [showResetPin,setShowResetPin]=useState(false);
  const [showDel,setShowDel]=useState(false);
  const [showContractSig,setShowContractSig]=useState(null);
  const [editName,setEditName]=useState(student.name);
  const [editingName,setEditingName]=useState(false);
  const [contractSigData,setContractSigData]=useState(null);
  const [printContract,setPrintContract]=useState(null);
  const [form,setForm]=useState({total:"",paidDate:new Date().toISOString().split("T")[0],note:"",paid:true});
  const [selectedContractId,setSelectedContractId]=useState(null);
  const [selectedRecordId,setSelectedRecordId]=useState(null);
  const idRef=useRef(Date.now());
  const totalRem=getTotalRemaining(student);
  const allMyRecords=records.filter(r=>String(r.studentId)===String(student.id)).reverse();
  const myRecords=allMyRecords.slice(0,5);
  const save=updated=>{onUpdate(updated);};

  const handleAddContract=()=>{
    if(!form.total||Number(form.total)<1)return;
    save({...student,contracts:[...student.contracts,{id:idRef.current++,total:Number(form.total),used:0,paidDate:form.paid?form.paidDate:null,paid:form.paid,note:form.note,signed:false,sigData:null}]});
    setForm({total:"",paidDate:new Date().toISOString().split("T")[0],note:"",paid:true});setShowAddC(false);
  };
  const handleSignContract=(cid,sd)=>{
    const sigToUse=sd||contractSigData;
    if(!sigToUse){showToast("請先簽名","warn");return;}
    sigSave(cid,sigToUse);
    save({...student,contracts:student.contracts.map(c=>c.id===cid?{...c,signed:true,sigData:sigToUse,signedAt:getTaiwanTime()}:c)});
    setShowContractSig(null);setContractSigData(null);
  };

    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0,marginBottom:14}}>← 返回</button>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:16,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,color:"#555"}}>{student.name[0]}</div>
            <div>
              {editingName?(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input value={editName} onChange={e=>setEditName(e.target.value)} style={{fontSize:18,fontWeight:800,border:"none",borderBottom:"2px solid #1A1A1A",outline:"none",padding:"2px 4px",width:120}}/>
                  <button onClick={()=>{setEditingName(false);save({...student,name:editName});}} style={{background:"#1A1A1A",border:"none",color:"#fff",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>✓</button>
                  <button onClick={()=>{setEditName(student.name);setEditingName(false);}} style={{background:"#F2F2F2",border:"none",color:"#888",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{student.name}</div>
                  <button onClick={()=>setEditingName(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Pencil/></button>
                </div>
              )}
              <div style={{fontSize:12,color:"#CCC",marginTop:2}}>
                {student.pin?"PIN 已設定":<span style={{color:"#F9A825",fontWeight:600}}>PIN 未設定</span>}

              </div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:24,fontWeight:900,color:remColor(totalRem)}}>{totalRem}</div>
            <div style={{fontSize:11,color:"#CCC"}}>剩餘堂</div>
          </div>
        </div>
      </div>
      <div style={{padding:"18px 20px 100px"}}>
        {/* 合約記錄 */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600}}>合約記錄</div>

      </Modal>)}

      {showResetPin&&(<Modal title="重設 PIN 碼" onClose={()=>setShowResetPin(false)}>
        <div style={{fontSize:14,color:"#666",marginBottom:20,lineHeight:1.9}}>確定重設 <strong>{student.name}</strong> 的 PIN 碼？重設後學員需重新設定。</div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="light" style={{flex:1}} onClick={()=>setShowResetPin(false)}>取消</Btn>
          <Btn style={{flex:1}} onClick={()=>{setShowResetPin(false);save({...student,pin:null});}}>確認重設</Btn>
        </div>
      </Modal>)}

      {showDel&&(<Modal title="確認刪除" onClose={()=>setShowDel(false)}>
        <div style={{fontSize:14,color:"#666",marginBottom:20,lineHeight:1.9}}>確定刪除 <strong>{student.name}</strong>？<br/><span style={{color:"#D32F2F",fontWeight:600}}>此操作無法復原。</span></div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="light" style={{flex:1}} onClick={()=>setShowDel(false)}>取消</Btn>
          <Btn variant="red" style={{flex:1}} onClick={()=>{onDelete(student.id);showToast("已刪除學員","warn");onBack();}}>確認刪除</Btn>
        </div>
      </Modal>)}

      {printContract&&<ContractPrintOverlay student={student} contract={printContract} records={records} onClose={()=>setPrintContract(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 教練新增學員
// ══════════════════════════════════════════════════════════════
function CoachAddStudent({onSave,onBack,existingNames}){
  const [name,setName]=useState("");
  const [total,setTotal]=useState("");
  const [paidDate,setPaidDate]=useState(new Date().toISOString().split("T")[0]);
  const [note,setNote]=useState("");
  const [err,setErr]=useState("");
  const handleSave=()=>{
    const t=name.trim();
    if(!t){setErr("請輸入姓名");return;}
    if(existingNames.includes(t)){setErr("此姓名已存在");return;}
    if(!total||Number(total)<1){setErr("請輸入有效堂數");return;}
    onSave({id:String(Date.now()),name:t,pin:null,contracts:[{id:Date.now()+1,total:Number(total),used:0,paidDate,note,signed:false,sigData:null}]});
  };
  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0,marginBottom:14}}>← 返回</button>
        <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>新增學員</div>
      </div>
      <div style={{padding:"20px 20px 100px"}}>
        <Field label="學員姓名" value={name} onChange={v=>{setName(v);setErr("");}} placeholder="請輸入姓名"/>
        <Field label="合約總堂數" value={total} onChange={v=>{setTotal(v);setErr("");}} type="number" placeholder="例：10"/>
        <Field label="繳費日期" value={paidDate} onChange={setPaidDate} type="date"/>
        <Field label="備注" value={note} onChange={setNote} placeholder="例：膝蓋注意…"/>
        <div style={{background:"#F7F7F7",border:"1px solid #EEE",borderRadius:11,padding:"11px 14px",marginBottom:16,fontSize:13,color:"#AAA",lineHeight:1.7}}>📌 PIN 碼由學員自行在登錄頁設定，或之後由教練在學員詳情頁補設。</div>
        {err&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#D32F2F",fontWeight:600}}>⚠ {err}</div>}
        <Btn full onClick={handleSave}>新增學員</Btn>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 簽到紀錄
// ══════════════════════════════════════════════════════════════
function RecordsScreen({records,students,onTab}){
  const [filterMonth,setFilterMonth]=useState("");
  const [filterName,setFilterName]=useState("");
  const months=[...new Set(records.map(r=>r.timestamp?r.timestamp.slice(0,7):"").filter(Boolean))].sort().reverse();
  const nameList=[...new Set(records.map(r=>r.studentName).filter(Boolean))].sort();
  const filtered=[...records].filter(r=>{
    if(filterMonth&&(!r.timestamp||!r.timestamp.startsWith(filterMonth)))return false;
    if(filterName&&r.studentName!==filterName)return false;
    return true;
  }).reverse();
  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"28px 20px 14px",borderBottom:"1px solid #EEE"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style={{fontSize:18,fontWeight:900,color:"#1A1A1A",flex:1}}>簽到紀錄</div>
          <div style={{fontSize:12,color:"#AAA"}}>{filtered.length} 筆</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{flex:1,minWidth:120,padding:"9px 10px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:13,outline:"none",color:filterMonth?"#1A1A1A":"#AAA"}}>
            <option value="">全部月份</option>
            {months.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <select value={filterName} onChange={e=>setFilterName(e.target.value)} style={{flex:1,minWidth:100,padding:"9px 10px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:13,outline:"none",color:filterName?"#1A1A1A":"#AAA"}}>
            <option value="">全部學員</option>
            {nameList.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          {(filterMonth||filterName)&&(
            <button onClick={()=>{setFilterMonth("");setFilterName("");}} style={{padding:"9px 12px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:12,color:"#888",cursor:"pointer",whiteSpace:"nowrap"}}>清除篩選</button>
          )}
        </div>
      </div>
      <div style={{padding:"14px 20px 100px"}}>
        {filtered.map(r=>(
          <div key={r.id} style={{background:"#fff",border:"1px solid #EEE",borderRadius:13,padding:"13px 15px",marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14,color:"#1A1A1A"}}>{r.studentName}</div>
              <div style={{fontSize:12,color:"#AAA",marginTop:2}}>{r.timestamp}</div>
            </div>
            <div style={{background:"#FFEBEE",borderRadius:8,padding:"4px 10px",color:"#D32F2F",fontWeight:700,fontSize:13}}>−1 堂</div>
          </div>
        ))}
        {filtered.length===0&&<div style={{textAlign:"center",color:"#CCC",padding:"50px 0"}}>無符合記錄</div>}
      </div>
      <BottomTabs active="records" onChange={onTab}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ★ 訓練記錄主畫面
// ══════════════════════════════════════════════════════════════
function WorkoutScreen({students,workouts,exercises,templates,categories,onSaveWorkout,onUpdateExercises,onUpdateTemplates,onUpdateCategories,onTab,showToast}){
  const [subView,setSubView]=useState("log"); // "log" | "history" | "exercises" | "templates"
  const [selectedStudent,setSelectedStudent]=useState(null);
  const [showStudentPicker,setShowStudentPicker]=useState(false);
  const [workoutDate,setWorkoutDate]=useState(getTaiwanDate());
  const [sessionSets,setSessionSets]=useState([]); // 本次課程已加的組 [{exerciseId,weight,reps,note}]
  const [showExercisePicker,setShowExercisePicker]=useState(false);
  const [showSetInput,setShowSetInput]=useState(null); // exerciseId | null
  const [setWeight,setSetWeight]=useState("");
  const [setReps,setSetReps]=useState("");
  const [setSets,setSetSets]=useState("1");
  const [setNote,setSetNote]=useState("");
  const [historyStudent,setHistoryStudent]=useState(null);
  const [historyExercise,setHistoryExercise]=useState(null);
  const [exSearch,setExSearch]=useState("");
  const [showLastSession,setShowLastSession]=useState(false);
  const [showTemplateApply,setShowTemplateApply]=useState(false);
  const [showAddExercise,setShowAddExercise]=useState(false);
  const [newExName,setNewExName]=useState("");
  const [newExCat,setNewExCat]=useState("其他");
  const [showAddTemplate,setShowAddTemplate]=useState(false);
  const [newTplName,setNewTplName]=useState("");
  const [newTplItems,setNewTplItems]=useState([]);
  const [showCatManager,setShowCatManager]=useState(false);
  const [newCatName,setNewCatName]=useState("");
  const [newExCatCustom,setNewExCatCustom]=useState(false); // 是否切換到自訂輸入 // [{exerciseId}]

  const exMap=useMemo(()=>{const m={};exercises.forEach(e=>{m[e.id]=e;});return m;},[exercises]);

  // 本次課程中，已有哪些動作
  const sessionExercises=useMemo(()=>{
    const ids=[...new Set(sessionSets.map(s=>s.exerciseId))];
    return ids.map(id=>({exercise:exMap[id]||{id,name:"未知"},sets:sessionSets.filter(s=>s.exerciseId===id)}));
  },[sessionSets,exMap]);

  // 上次課表
  const lastSession=selectedStudent?getLastSessionWorkouts(workouts,selectedStudent.id):null;

  // 加入組數
  const handleAddSet=(exerciseId)=>{
    const w=parseFloat(setWeight);const r=parseInt(setReps);const n=Math.max(1,parseInt(setSets)||1);
    if(isNaN(w)||isNaN(r)||r<1){showToast("請輸入有效重量與次數","warn");return;}
    const newSets=Array.from({length:n},(_,i)=>({id:String(Date.now()+i+Math.random()),exerciseId,weight:w,reps:r,note:setNote.trim(),date:workoutDate,studentId:selectedStudent?.id||""}));
    setSessionSets(prev=>[...prev,...newSets]);
    setSetWeight("");setSetReps("");setSetSets("1");setSetNote("");
    setShowSetInput(null);
    showToast(n>1?`✅ 已加入 ${n} 組`:"✅ 已加入");
  };

  // 帶入上次同動作紀錄
  const handleCopyLast=(exerciseId)=>{
    if(!selectedStudent)return;
    const last=getLastWorkout(workouts,selectedStudent.id,exerciseId);
    if(!last||!last.length){showToast("無上次紀錄","warn");return;}
    // 把上次的組全部複製進來
    const copied=last.map(s=>({...s,id:String(Date.now()+Math.random()),date:workoutDate,studentId:selectedStudent.id}));
    setSessionSets(prev=>[...prev,...copied]);
    showToast(`✅ 已帶入 ${last.length} 組`);
  };

  // 儲存本次課程
  const handleSaveSession=()=>{
    if(!selectedStudent){showToast("請先選擇學員","warn");return;}
    if(!sessionSets.length){showToast("尚未加入任何組數","warn");return;}
    const setsWithStudent=sessionSets
      .filter(s=>!s._placeholder)
      .map(s=>({...s,studentId:selectedStudent.id,studentName:selectedStudent.name,date:workoutDate,exerciseName:exMap[s.exerciseId]?.name||""}));
    onSaveWorkout(setsWithStudent);
    setSessionSets([]);
    showToast("✅ 訓練紀錄已儲存");
  };

  // 刪除單組
  const handleDeleteSet=(setId)=>{setSessionSets(prev=>prev.filter(s=>s.id!==setId));};

  // 套用範本
  const handleApplyTemplate=(tpl)=>{
    if(!selectedStudent){showToast("請先選擇學員","warn");return;}
    const newSets=[];
    tpl.items.forEach(item=>{
      const last=getLastWorkout(workouts,selectedStudent.id,item.exerciseId);
      if(last&&last.length){
        last.forEach(s=>newSets.push({...s,id:String(Date.now()+Math.random()),date:workoutDate,studentId:selectedStudent.id}));
      } else {
        newSets.push({id:String(Date.now()+Math.random()),exerciseId:item.exerciseId,weight:0,reps:0,note:"",date:workoutDate,studentId:selectedStudent.id});
      }
    });
    setSessionSets(prev=>[...prev,...newSets]);
    setShowTemplateApply(false);
    showToast(`✅ 已套用「${tpl.name}」`);
  };

  // 釘選 / 取消釘選動作
  const handleTogglePin=(exId)=>{
    const next=exercises.map(e=>e.id===exId?{...e,pinned:!e.pinned}:e);
    onUpdateExercises(next);
  };
  // 刪除動作
  const handleDeleteExercise=(exId)=>{
    onUpdateExercises(exercises.filter(e=>e.id!==exId));
  };

  // 顯示的動作（釘選在前）
  const filteredExercises=exercises.filter(e=>!exSearch||e.name.includes(exSearch)||e.category.includes(exSearch));
  const pinnedEx=filteredExercises.filter(e=>e.pinned);
  const unpinnedEx=filteredExercises.filter(e=>!e.pinned);

  // 渲染
  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      {/* 頂部 */}
      <div style={{background:"#fff",padding:"20px 20px 0",borderBottom:"1px solid #EEE"}}>
        <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A",marginBottom:14}}>訓練記錄</div>
        {/* sub tab */}
        <div style={{display:"flex",gap:0,overflowX:"auto"}}>
          {[{id:"log",label:"記錄課程"},{id:"history",label:"歷史查詢"},{id:"exercises",label:"動作庫"},{id:"templates",label:"課表範本"}].map(t=>(
            <button key={t.id} onClick={()=>setSubView(t.id)} style={{padding:"10px 14px",background:"none",border:"none",borderBottom:subView===t.id?"2.5px solid #1A1A1A":"2.5px solid transparent",fontSize:13,fontWeight:subView===t.id?700:400,color:subView===t.id?"#1A1A1A":"#AAA",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 20px 100px"}}>

        {/* ── 記錄課程 ── */}
        {subView==="log"&&(
          <>
            {/* 學員選擇 */}
            <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:12,border:"1px solid #EEE"}}>
              <div style={{fontSize:11,color:"#AAA",fontWeight:600,marginBottom:8}}>學員</div>
              {selectedStudent?(
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:12,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#555"}}>{selectedStudent.name[0]}</div>
                    <div>
                      <div style={{fontWeight:700,fontSize:15,color:"#1A1A1A"}}>{selectedStudent.name}</div>
                      {lastSession&&<div style={{fontSize:11,color:"#AAA",marginTop:1}}>上次：{lastSession.date}</div>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {lastSession&&(
                      <button onClick={()=>setShowLastSession(true)} style={{padding:"6px 12px",background:"#E3F2FD",border:"none",borderRadius:9,fontSize:12,fontWeight:700,color:"#1565C0",cursor:"pointer"}}>上次課表</button>
                    )}
                    <button onClick={()=>setShowStudentPicker(true)} style={{padding:"6px 12px",background:"#F5F5F5",border:"none",borderRadius:9,fontSize:12,color:"#666",cursor:"pointer"}}>換學員</button>
                  </div>
                </div>
              ):(
                <button onClick={()=>setShowStudentPicker(true)} style={{width:"100%",padding:"12px",background:"#F7F7F7",border:"2px dashed #DDD",borderRadius:12,fontSize:14,color:"#AAA",cursor:"pointer",fontWeight:600}}>＋ 選擇學員</button>
              )}
            </div>

            {/* 日期 */}
            <div style={{background:"#fff",borderRadius:14,padding:"12px 16px",marginBottom:12,border:"1px solid #EEE",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:13,color:"#555",fontWeight:600}}>📅 訓練日期</div>
              <input type="date" value={workoutDate.replace(/\//g,"-")} onChange={e=>setWorkoutDate(e.target.value.replace(/-/g,"/"))}
                style={{border:"none",background:"none",fontSize:13,color:"#1A1A1A",fontWeight:700,outline:"none",cursor:"pointer"}}/>
            </div>

            {/* 快捷按鈕列 */}
            {selectedStudent&&(
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <button onClick={()=>setShowTemplateApply(true)} style={{flex:1,padding:"10px",background:"#fff",border:"1px solid #EEE",borderRadius:12,fontSize:12,fontWeight:700,color:"#555",cursor:"pointer"}}>
                  📋 套用課表範本
                </button>
              </div>
            )}

            {/* 本次課程 */}
            {sessionExercises.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:"#AAA",fontWeight:600,letterSpacing:1,marginBottom:8}}>本次課程</div>
                {sessionExercises.map(({exercise,sets})=>(
                  <div key={exercise.id} style={{background:"#fff",borderRadius:14,border:"1px solid #EEE",marginBottom:8,overflow:"hidden"}}>
                    <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #F5F5F5"}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:14,color:"#1A1A1A"}}>{exercise.name}</div>
                        <div style={{fontSize:11,color:"#AAA",marginTop:1}}>{exercise.category}</div>
                      </div>
                      <button onClick={()=>{setShowSetInput(exercise.id);setSetWeight("");setSetReps("");setSetSets("1");setSetNote("");}}
                        style={{padding:"6px 12px",background:"#1A1A1A",border:"none",borderRadius:8,fontSize:12,fontWeight:700,color:"#fff",cursor:"pointer"}}>＋ 加組</button>
                    </div>
                    {/* 組列表 */}
                    <div style={{padding:"8px 14px"}}>
                      {sets.map((s,i)=>(
                        <div key={s.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:i<sets.length-1?"1px solid #F8F8F8":"none"}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <div style={{width:22,height:22,borderRadius:6,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#888"}}>{i+1}</div>
                            <div>
                              <span style={{fontSize:14,fontWeight:700,color:"#1A1A1A"}}>{s.weight} kg</span>
                              <span style={{fontSize:13,color:"#888",marginLeft:6}}>× {s.reps} 下</span>
                              {s.note&&<span style={{fontSize:11,color:"#AAA",marginLeft:6}}>{s.note}</span>}
                            </div>
                          </div>
                          <button onClick={()=>handleDeleteSet(s.id)} style={{background:"none",border:"none",color:"#DDD",cursor:"pointer",fontSize:16,padding:"4px",lineHeight:1}}>✕</button>
                        </div>
                      ))}
                    </div>
                    {/* 上次紀錄小提示 */}
                    {selectedStudent&&(()=>{
                      const last=getLastWorkout(workouts,selectedStudent.id,exercise.id);
                      if(!last)return null;
                      const lastDate=last[0]?.date;
                      return(
                        <div style={{padding:"8px 14px",borderTop:"1px solid #F5F5F5",background:"#FAFAFA",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div style={{fontSize:11,color:"#AAA"}}>上次（{lastDate}）：{last.map(s=>`${s.weight}kg×${s.reps}`).join("，")}</div>
                          <button onClick={()=>handleCopyLast(exercise.id)} style={{padding:"3px 10px",background:"#E3F2FD",border:"none",borderRadius:6,fontSize:11,fontWeight:700,color:"#1565C0",cursor:"pointer"}}>帶入</button>
                        </div>
                      );
                    })()}
                  </div>
                ))}
              </div>
            )}

            {/* 加入動作按鈕 */}
            <button onClick={()=>{setShowExercisePicker(true);setExSearch("");}}
              style={{width:"100%",padding:"14px",background:"#fff",border:"2px dashed #DDD",borderRadius:14,fontSize:14,color:"#AAA",cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:12}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CCC" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              新增動作
            </button>

            {/* 儲存按鈕 */}
            {sessionSets.length>0&&(
              <Btn full onClick={handleSaveSession}>💾 儲存本次訓練（{sessionSets.length} 組）</Btn>
            )}
          </>
        )}

        {/* ── 歷史查詢 ── */}
        {subView==="history"&&(
          <>
            <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:12,border:"1px solid #EEE"}}>
              <div style={{fontSize:11,color:"#AAA",fontWeight:600,marginBottom:8}}>選擇學員</div>
              <select value={historyStudent||""} onChange={e=>setHistoryStudent(e.target.value||null)}
                style={{width:"100%",padding:"10px 12px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:14,outline:"none",color:historyStudent?"#1A1A1A":"#AAA"}}>
                <option value="">請選擇學員</option>
                {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            {historyStudent&&(
              <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:12,border:"1px solid #EEE"}}>
                <div style={{fontSize:11,color:"#AAA",fontWeight:600,marginBottom:8}}>選擇動作</div>
                <select value={historyExercise||""} onChange={e=>setHistoryExercise(e.target.value||null)}
                  style={{width:"100%",padding:"10px 12px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:14,outline:"none",color:historyExercise?"#1A1A1A":"#AAA"}}>
                  <option value="">全部動作</option>
                  {exercises.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
                </select>
              </div>
            )}
            {historyStudent&&(()=>{
              const stu=students.find(s=>s.id===historyStudent);
              if(!stu)return null;
              const exIds=historyExercise?[historyExercise]:[...new Set(workouts.filter(w=>w.studentId===historyStudent).map(w=>w.exerciseId))];
              if(!exIds.length)return <div style={{textAlign:"center",color:"#CCC",padding:"40px 0"}}>尚無訓練紀錄</div>;
              return exIds.map(exId=>{
                const hist=getWorkoutHistory(workouts,historyStudent,exId);
                if(!hist.length)return null;
                const ex=exMap[exId]||{name:"未知動作",category:""};
                return(
                  <div key={exId} style={{background:"#fff",borderRadius:14,border:"1px solid #EEE",marginBottom:12,overflow:"hidden"}}>
                    <div style={{padding:"12px 14px",borderBottom:"1px solid #F5F5F5",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:14,color:"#1A1A1A"}}>{ex.name}</div>
                        <div style={{fontSize:11,color:"#AAA"}}>{ex.category}</div>
                      </div>
                      <div style={{fontSize:12,color:"#AAA"}}>{hist.length} 次記錄</div>
                    </div>
                    {hist.map(({date,sets})=>(
                      <div key={date} style={{padding:"10px 14px",borderBottom:"1px solid #F8F8F8"}}>
                        <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>{date}</div>
                        {sets.map((s,i)=>(
                          <div key={s.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0"}}>
                            <div style={{width:20,height:20,borderRadius:6,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#888"}}>{i+1}</div>
                            <span style={{fontSize:14,fontWeight:700,color:"#1A1A1A"}}>{s.weight} kg</span>
                            <span style={{fontSize:13,color:"#888"}}>× {s.reps} 下</span>
                            {s.note&&<span style={{fontSize:11,color:"#AAA"}}>{s.note}</span>}
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                );
              });
            })()}
          </>
        )}

        {/* ── 動作庫 ── */}
        {subView==="exercises"&&(
          <>
            <div style={{position:"relative",marginBottom:12}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#CCC"}}>🔍</span>
              <input value={exSearch} onChange={e=>setExSearch(e.target.value)} placeholder="搜尋動作…"
                style={{width:"100%",padding:"11px 14px 11px 38px",background:"#fff",border:"1px solid #EEE",borderRadius:12,fontSize:14,outline:"none"}}/>
            </div>

            {/* 釘選動作 */}
            {pinnedEx.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:"#F9A825",fontWeight:600,letterSpacing:1,marginBottom:8}}>📌 常用動作</div>
                {pinnedEx.map(ex=>(
                  <ExerciseRow key={ex.id} ex={ex} onTogglePin={handleTogglePin} onDelete={handleDeleteExercise}/>
                ))}
              </div>
            )}

            {/* 所有動作（依動態分類分組） */}
            {categories.map(cat=>{
              const catEx=unpinnedEx.filter(e=>e.category===cat);
              if(!catEx.length)return null;
              return(
                <div key={cat} style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:"#AAA",fontWeight:600,letterSpacing:1,marginBottom:8}}>{cat}</div>
                  {catEx.map(ex=><ExerciseRow key={ex.id} ex={ex} onTogglePin={handleTogglePin} onDelete={handleDeleteExercise}/>)}
                </div>
              );
            })}

            {/* 不在任何已知分類的動作 */}
            {(()=>{
              const extra=unpinnedEx.filter(e=>!categories.includes(e.category));
              if(!extra.length)return null;
              return(
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:"#AAA",fontWeight:600,letterSpacing:1,marginBottom:8}}>其他</div>
                  {extra.map(ex=><ExerciseRow key={ex.id} ex={ex} onTogglePin={handleTogglePin} onDelete={handleDeleteExercise}/>)}
                </div>
              );
            })()}

            <button onClick={()=>{setNewExName("");setNewExCat(categories[0]||"其他");setNewExCatCustom(false);setShowAddExercise(true);}}
              style={{width:"100%",padding:"14px",background:"#fff",border:"2px dashed #DDD",borderRadius:14,fontSize:14,color:"#AAA",cursor:"pointer",fontWeight:600,marginBottom:8}}>
              ＋ 新增自訂動作
            </button>
            <button onClick={()=>{setNewCatName("");setShowCatManager(true);}}
              style={{width:"100%",padding:"11px",background:"#F7F7F7",border:"1px solid #EEE",borderRadius:12,fontSize:13,color:"#888",cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#AAA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>
              管理分類
            </button>
          </>
        )}

        {/* ── 課表範本 ── */}
        {subView==="templates"&&(
          <>
            {templates.map(tpl=>(
              <div key={tpl.id} style={{background:"#fff",borderRadius:14,border:"1px solid #EEE",marginBottom:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{fontWeight:700,fontSize:15,color:"#1A1A1A"}}>{tpl.name}</div>
                  <button onClick={()=>onUpdateTemplates(templates.filter(t=>t.id!==tpl.id))}
                    style={{background:"none",border:"none",color:"#CCC",cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {tpl.items.map(item=>{
                    const ex=exMap[item.exerciseId];

              ＋ 新增課表範本
            </button>
          </>
        )}
      </div>

      {/* ── 選擇學員 BottomSheet ── */}
      {showStudentPicker&&(
        <BottomSheet title="選擇學員" onClose={()=>setShowStudentPicker(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {students.map(s=>(
              <button key={s.id} onClick={()=>{setSelectedStudent(s);setShowStudentPicker(false);setSessionSets([]);}}
                style={{padding:"14px 16px",background:selectedStudent?.id===s.id?"#1A1A1A":"#F7F7F7",borderRadius:12,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
                <div style={{width:38,height:38,borderRadius:11,background:selectedStudent?.id===s.id?"rgba(255,255,255,0.2)":"#EEE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:selectedStudent?.id===s.id?"#fff":"#666",flexShrink:0}}>{s.name[0]}</div>
                <div style={{color:selectedStudent?.id===s.id?"#fff":"#1A1A1A",fontWeight:700,fontSize:15}}>{s.name}</div>
              </button>
            ))}
            {!students.length&&<div style={{textAlign:"center",color:"#CCC",padding:"20px 0"}}>尚無學員</div>}
          </div>
        </BottomSheet>
      )}

      {/* ── 選擇動作 BottomSheet ── */}
      {showExercisePicker&&(
        <BottomSheet title="選擇動作" onClose={()=>setShowExercisePicker(false)}>
          <div style={{position:"relative",marginBottom:12}}>
            <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#CCC"}}>🔍</span>
            <input value={exSearch} onChange={e=>setExSearch(e.target.value)} placeholder="搜尋動作…" autoFocus
              style={{width:"100%",padding:"11px 14px 11px 38px",background:"#F7F7F7",border:"1px solid #EEE",borderRadius:12,fontSize:14,outline:"none"}}/>
          </div>
          {/* 釘選在前 */}
          {pinnedEx.length>0&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"#F9A825",fontWeight:700,letterSpacing:1,marginBottom:6}}>📌 常用</div>
              {pinnedEx.map(ex=>(
                <button key={ex.id} onClick={()=>{setShowExercisePicker(false);setShowSetInput(ex.id);setSetWeight("");setSetReps("");setSetSets("1");setSetNote("");}}
                  style={{width:"100%",padding:"11px 14px",background:"#FFF9C4",borderRadius:10,border:"none",cursor:"pointer",textAlign:"left",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontWeight:700,fontSize:14,color:"#1A1A1A"}}>{ex.name}</span>
                  <span style={{fontSize:11,color:"#AAA"}}>{ex.category}</span>
                </button>
              ))}
            </div>
          )}
          {filteredExercises.filter(e=>!e.pinned).map(ex=>(
            <button key={ex.id} onClick={()=>{setShowExercisePicker(false);setShowSetInput(ex.id);setSetWeight("");setSetReps("");setSetSets("1");setSetNote("");}}
              style={{width:"100%",padding:"11px 14px",background:"#F7F7F7",borderRadius:10,border:"none",cursor:"pointer",textAlign:"left",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontWeight:700,fontSize:14,color:"#1A1A1A"}}>{ex.name}</span>
              <span style={{fontSize:11,color:"#AAA"}}>{ex.category}</span>
            </button>
          ))}
          {filteredExercises.length===0&&<div style={{textAlign:"center",color:"#CCC",padding:"20px 0"}}>找不到動作</div>}
        </BottomSheet>
      )}

      {/* ── 加組 BottomSheet ── */}
      {showSetInput&&(()=>{
        const ex=exMap[showSetInput]||{name:"動作",id:showSetInput};
        const lastSets=selectedStudent?getLastWorkout(workouts,selectedStudent.id,showSetInput):null;
        return(
          <BottomSheet title={`${ex.name} — 加入組數`} onClose={()=>{setShowSetInput(null);}}>
            {/* 上次紀錄 */}
            {lastSets&&lastSets.length>0&&(
              <div style={{background:"#E3F2FD",borderRadius:12,padding:"10px 14px",marginBottom:14}}>
                <div style={{fontSize:11,color:"#1565C0",fontWeight:700,marginBottom:6}}>上次紀錄（{lastSets[0].date}）</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {lastSets.map((s,i)=>(
                    <button key={i} onClick={()=>{setSetWeight(String(s.weight));setSetReps(String(s.reps));}}
                      style={{padding:"6px 12px",background:"#fff",border:"1px solid #BBDEFB",borderRadius:8,fontSize:13,fontWeight:700,color:"#1565C0",cursor:"pointer"}}>
                      {s.weight}kg×{s.reps}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#90CAF9",marginTop:6}}>點擊可快速帶入 →</div>
              </div>
            )}
            {/* 輸入：重量 / 次數 / 組數 三欄 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:"#AAA",fontWeight:600,marginBottom:5,textAlign:"center"}}>重量 (kg)</div>
                <input type="number" value={setWeight} onChange={e=>setSetWeight(e.target.value)} placeholder="0"
                  style={{width:"100%",padding:"14px 4px",background:"#F7F7F7",border:"1px solid #EEE",borderRadius:12,fontSize:20,fontWeight:700,outline:"none",textAlign:"center",color:"#1A1A1A"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:"#AAA",fontWeight:600,marginBottom:5,textAlign:"center"}}>次數 (下)</div>
                <input type="number" value={setReps} onChange={e=>setSetReps(e.target.value)} placeholder="0"
                  style={{width:"100%",padding:"14px 4px",background:"#F7F7F7",border:"1px solid #EEE",borderRadius:12,fontSize:20,fontWeight:700,outline:"none",textAlign:"center",color:"#1A1A1A"}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:"#AAA",fontWeight:600,marginBottom:5,textAlign:"center"}}>組數</div>
                <input type="number" value={setSets} onChange={e=>setSetSets(e.target.value)} placeholder="1" min="1" max="20"
                  style={{width:"100%",padding:"14px 4px",background:"#F7F7F7",border:"2px solid #1A1A1A",borderRadius:12,fontSize:20,fontWeight:700,outline:"none",textAlign:"center",color:"#1A1A1A"}}/>
              </div>
            </div>
            <Field label="備注（選填）" value={setNote} onChange={setSetNote} placeholder="例：自重、保護…"/>
            <Btn full onClick={()=>handleAddSet(showSetInput)}>
              ＋ 加入 {parseInt(setSets)>1?`${setSets} 組`:"此組"}
            </Btn>
            <div style={{marginTop:8}}>
              <Btn full variant="light" onClick={()=>setShowSetInput(null)}>取消</Btn>
            </div>
          </BottomSheet>
        );
      })()}

      {/* ── 上次課表 BottomSheet ── */}
      {showLastSession&&lastSession&&(
        <BottomSheet title={`上次課表（${lastSession.date}）`} onClose={()=>setShowLastSession(false)}>
          {Object.entries(lastSession.exercises).map(([exId,sets])=>{
            const ex=exMap[exId]||{name:"未知動作"};
            return(
              <div key={exId} style={{marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:14,color:"#1A1A1A",marginBottom:6}}>{ex.name}</div>

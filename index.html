<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="簽到"/>
  <meta name="theme-color" content="#1A1A1A"/>
  <title>教練簽到系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:#F7F7F7;font-family:'Noto Sans TC',sans-serif}
    input,button{font-family:'Noto Sans TC',sans-serif}
    #root{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ★ Apps Script 網址 ★
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const GAS_URL="https://script.google.com/macros/s/AKfycbzLLIRSe3egQLxebDDeq1kSLyfzlysgZkimuP7ACCYs2OYZuiiA_7lpfuOBraEWaGD1mw/exec";

const LS_S="coach_students",LS_R="coach_records";
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// GAS 呼叫（全部用 GET，避免 CORS）
async function gasGet(action){
  try{
    const r=await fetch(GAS_URL+"?action="+action,{redirect:"follow"});
    return await r.json();
  }catch{return null;}
}
// 寫入操作：先返回、背景送出，完全不擋 UI
function gasSync(body){
  if(!GAS_URL) return;
  const encoded=encodeURIComponent(JSON.stringify(body));
  fetch(GAS_URL+"?action=post&payload="+encoded,{redirect:"follow"}).catch(()=>{});
}

// ── PIN 雜湊（SHA-256，不可逆）────────────────────────────────
async function hashPin(pin){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("coach_pin_salt_"+pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);
}
// 判斷是否已是 hash（16位hex）
const isHashed=v=>v&&/^[0-9a-f]{16}$/.test(v);

function getTaiwanTime(){
  const d=new Date();
  const tw=new Date(d.toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
  const pad=n=>String(n).padStart(2,"0");
  return `${tw.getFullYear()}/${pad(tw.getMonth()+1)}/${pad(tw.getDate())} ${pad(tw.getHours())}:${pad(tw.getMinutes())}:${pad(tw.getSeconds())}`;
}
const getTotalRemaining=s=>s.contracts.reduce((sum,c)=>sum+Math.max(0,c.total-c.used),0);
const remColor=r=>r<=0?"#9E9E9E":r<=3?"#D32F2F":"#2E7D32";
const remBg=r=>r<=0?"#F5F5F5":r<=3?"#FFEBEE":"#E8F5E9";
const isEng=n=>/^[A-Za-z]/.test(n);

// ── Excel 匯出（唯讀 + PIN 遮罩）────────────────────────────
function exportExcel(students,records){
  const maskPin=p=>p?"●●●●":"(未設定)";
  const rows1=students.map(s=>[s.id,s.name,maskPin(s.pin),s.scheduledToday?"是":"否",s.contracts.length,getTotalRemaining(s)]);
  const rows2=students.flatMap(s=>s.contracts.map(c=>[s.id,s.name,c.id,c.total,c.used,Math.max(0,c.total-c.used),c.paidDate,c.note||""]));
  const rows3=records.map(r=>[r.studentId,r.studentName,r.timestamp]);

  const tbl=(caption,headers,rows)=>`
<table border="1" style="border-collapse:collapse">
  <caption style="font-weight:bold;margin-bottom:4px">${caption}</caption>
  <thead><tr>${headers.map(h=>`<th style="background:#1A1A1A;color:#fff;padding:6px 10px">${h}</th>`).join("")}</tr></thead>
  <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td style="padding:5px 10px">${c}</td>`).join("")}</tr>`).join("")}</tbody>
</table>`;

  const html=`<html><head><meta charset="UTF-8">
<style>body{font-family:sans-serif;padding:20px} table{margin-bottom:30px}</style>
</head><body>
<h2 style="margin-bottom:4px">教練簽到系統－備份資料</h2>
<p style="color:#999;font-size:12px;margin-bottom:20px">匯出時間：${getTaiwanTime()}　｜　此檔案僅供查閱，請勿修改數據以確保紀錄正確性。</p>
${tbl("學員資料",["學員ID","姓名","PIN碼","今日排課","合約數","剩餘總堂數"],rows1)}
${tbl("合約紀錄",["學員ID","學員姓名","合約ID","總堂數","已用","剩餘","繳費日期","備注"],rows2)}
${tbl("簽到紀錄",["學員ID","學員姓名","簽到時間"],rows3)}
</body></html>`;

  const blob=new Blob(["\ufeff"+html],{type:"application/vnd.ms-excel;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`簽到備份_${getTaiwanTime().replace(/[: ]/g,"-")}.xls`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Icons ──────────────────────────────────────────────────────
const Pencil=({size=16,color="#AAA"})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>
);
const PeopleIcon=({active})=>(
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?"#1A1A1A":"#CCC"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="9" cy="7" r="3"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
  </svg>
);
const ListIcon=({active})=>(
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?"#1A1A1A":"#CCC"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
    <circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/>
  </svg>
);
const GearIcon=({active})=>(
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?"#1A1A1A":"#CCC"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
);

// ── UI Atoms ───────────────────────────────────────────────────
function Toast({msg,type,onDone}){
  const [vis,setVis]=useState(true);
  useEffect(()=>{const t1=setTimeout(()=>setVis(false),2800);const t2=setTimeout(onDone,3500);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  const bg=type==="ok"?"#2E7D32":type==="warn"?"#E65100":"#C62828";
  return <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"12px 22px",borderRadius:12,fontSize:14,fontWeight:600,zIndex:9999,opacity:vis?1:0,transition:"opacity 0.6s",boxShadow:"0 4px 20px rgba(0,0,0,0.15)",whiteSpace:"nowrap",pointerEvents:"none"}}>{msg}</div>;
}
function Modal({title,children,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:8000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:360,boxShadow:"0 16px 48px rgba(0,0,0,0.15)",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:800,color:"#1A1A1A",marginBottom:18}}>{title}</div>
        {children}
      </div>
    </div>
  );
}
function Btn({children,onClick,variant="dark",full=false,style:s={},disabled=false}){
  const v={
    dark:{background:"#1A1A1A",color:"#fff",padding:"13px 18px"},
    light:{background:"#F2F2F2",color:"#555",padding:"13px 18px"},
    red:{background:"#FFEBEE",color:"#D32F2F",padding:"13px 18px"},
    green:{background:"#E8F5E9",color:"#2E7D32",padding:"13px 18px"},
  };
  return <button onClick={disabled?undefined:onClick}
    onMouseDown={e=>{if(!disabled)e.currentTarget.style.opacity="0.65"}}
    onMouseUp={e=>{if(!disabled)e.currentTarget.style.opacity="1"}}
    onMouseLeave={e=>{e.currentTarget.style.opacity="1"}}
    style={{border:"none",borderRadius:13,fontSize:15,fontWeight:700,cursor:disabled?"not-allowed":"pointer",transition:"opacity 0.1s",width:full?"100%":undefined,opacity:disabled?0.45:1,...v[variant],...s}}>{children}</button>;
}
function Field({label,value,onChange,type="text",placeholder=""}){
  return(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:12,color:"#999",fontWeight:600,marginBottom:5,letterSpacing:0.4}}>{label}</div>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:"100%",padding:"11px 13px",background:"#F7F7F7",border:"1px solid #EBEBEB",borderRadius:11,fontSize:15,outline:"none",color:"#1A1A1A"}}/>
    </div>
  );
}
function PinDot({filled}){return <div style={{width:13,height:13,borderRadius:"50%",background:filled?"#1A1A1A":"transparent",border:"2px solid "+(filled?"#1A1A1A":"#CCC"),transition:"background 0.1s"}}/>;}
function NumPad({onPress}){
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:240}}>
      {keys.map((k,i)=>(
        <button key={i} onClick={()=>k&&onPress(k)}
          onMouseDown={e=>{if(k)e.currentTarget.style.background="#E0E0E0"}}
          onMouseUp={e=>{if(k)e.currentTarget.style.background="#F5F5F5"}}
          onMouseLeave={e=>{e.currentTarget.style.background=k?"#F5F5F5":"transparent"}}
          style={{height:56,borderRadius:13,background:k?"#F5F5F5":"transparent",border:k?"1px solid #E8E8E8":"none",color:"#1A1A1A",fontSize:20,cursor:k?"pointer":"default",fontWeight:600,transition:"background 0.1s"}}>{k}</button>
      ))}
    </div>
  );
}
function SyncDot({syncing}){
  if(!syncing) return null;
  return <div style={{width:8,height:8,borderRadius:"50%",background:"#FFA000",display:"inline-block",marginLeft:6,verticalAlign:"middle",animation:"spin 1s linear infinite"}}/>;
}
function BottomTabs({active,onChange}){
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #F0F0F0",display:"flex"}}>
      {[{id:"home",label:"學員管理",Icon:PeopleIcon},{id:"records",label:"簽到紀錄",Icon:ListIcon},{id:"settings",label:"備份設定",Icon:GearIcon}].map(({id,label,Icon})=>(
        <button key={id} onClick={()=>onChange(id)} style={{flex:1,padding:"11px 0 9px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <Icon active={active===id}/>
          <div style={{fontSize:10,fontWeight:active===id?700:400,color:active===id?"#1A1A1A":"#CCC"}}>{label}</div>
        </button>
      ))}
    </div>
  );
}

// ── Coach Home ─────────────────────────────────────────────────
function CoachHome({students,onSignIn,onEdit,onAdd,onEditSchedule,syncing}){
  const [search,setSearch]=useState("");
  const sorted=[...students].filter(s=>s.name.includes(search)).sort((a,b)=>{
    if(a.scheduledToday!==b.scheduledToday) return b.scheduledToday-a.scheduledToday;
    const aE=isEng(a.name),bE=isEng(b.name);
    if(aE!==bE) return aE?-1:1;
    return a.name.localeCompare(b.name,aE?"en":"zh-TW-u-co-stroke");
  });
  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"28px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:11,letterSpacing:2,color:"#CCC",marginBottom:3}}>COACH DASHBOARD</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:24,fontWeight:900,color:"#1A1A1A"}}>學員管理</div>
              <SyncDot syncing={syncing}/>
              {!syncing&&<div style={{fontSize:10,background:"#E8F5E9",color:"#2E7D32",padding:"2px 8px",borderRadius:10,fontWeight:700}}>☁ 雲端</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onEditSchedule} style={{background:"#F2F2F2",border:"none",color:"#555",padding:"9px 13px",borderRadius:11,fontSize:12,fontWeight:700,cursor:"pointer"}}>今日排課</button>
            <button onClick={onAdd} style={{background:"#1A1A1A",border:"none",color:"#fff",width:38,height:38,borderRadius:12,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          {[{label:"今日排課",val:students.filter(s=>s.scheduledToday).length},{label:"總學員數",val:students.length}].map(({label,val})=>(
            <div key={label} style={{flex:1,background:"#F2F2F2",borderRadius:12,padding:"11px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{val}</div>
              <div style={{fontSize:10,color:"#AAA",marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:"14px 20px 6px"}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#CCC"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋學員…"
            style={{width:"100%",padding:"11px 14px 11px 38px",background:"#fff",border:"1px solid #EEE",borderRadius:12,fontSize:14,outline:"none"}}/>
        </div>
      </div>
      <div style={{padding:"8px 20px 100px"}}>
        {!search&&sorted.some(s=>s.scheduledToday)&&<div style={{fontSize:10,color:"#CCC",letterSpacing:2,marginBottom:8,marginTop:4}}>今日排課</div>}
        {sorted.map((s,i)=>{
          const rem=getTotalRemaining(s),c=remColor(rem),bg=remBg(rem);
          const showSep=!search&&i>0&&!s.scheduledToday&&sorted[i-1]?.scheduledToday;
          return(
            <div key={s.id}>
              {showSep&&<div style={{fontSize:10,color:"#CCC",letterSpacing:2,margin:"14px 0 8px"}}>其他學員</div>}
              <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:15,padding:"13px 15px",marginBottom:8,display:"flex",alignItems:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                <div onClick={()=>onSignIn(s)} style={{display:"flex",alignItems:"center",flex:1,cursor:"pointer",minWidth:0}}>
                  <div style={{width:42,height:42,borderRadius:13,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#666",marginRight:12,flexShrink:0}}>{s.name[0]}</div>
                  <div style={{minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{fontWeight:700,fontSize:15,color:"#1A1A1A"}}>{s.name}</span>
                      {s.pin===null&&<span style={{fontSize:9,background:"#FFF9C4",color:"#F9A825",padding:"2px 6px",borderRadius:8,fontWeight:700}}>未設PIN</span>}
                    </div>
                    <div style={{fontSize:11,color:"#DDD",marginTop:2}}>點擊簽到</div>
                  </div>
                </div>
                <div onClick={()=>onSignIn(s)} style={{background:bg,borderRadius:10,padding:"4px 10px",flexShrink:0,textAlign:"center",cursor:"pointer",marginRight:10}}>
                  <span style={{fontSize:17,fontWeight:900,color:c}}>{rem}</span>
                </div>
                <button onClick={e=>{e.stopPropagation();onEdit(s);}} style={{width:34,height:34,borderRadius:10,background:"#F5F5F5",border:"none",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><Pencil/></button>
              </div>
            </div>
          );
        })}
        {sorted.length===0&&<div style={{textAlign:"center",color:"#CCC",padding:"50px 0"}}>找不到「{search}」</div>}
      </div>
    </div>
  );
}

// ── Coach Detail ───────────────────────────────────────────────
function CoachDetail({student,records,onBack,onUpdate,onDelete,showToast}){
  const [showAdd,setShowAdd]=useState(false);
  const [showResetPin,setShowResetPin]=useState(false);
  const [showDel,setShowDel]=useState(false);
  const [editName,setEditName]=useState(student.name);
  const [editingName,setEditingName]=useState(false);
  const [form,setForm]=useState({total:"",paidDate:new Date().toISOString().split("T")[0],note:""});
  const idRef=useRef(Date.now());
  const totalRem=getTotalRemaining(student);
  const myRecords=records.filter(r=>String(r.studentId)===String(student.id)).slice(-5).reverse();
  const save=updated=>{onUpdate(updated);showToast("✅ 已儲存");};
  const handleAddContract=()=>{
    if(!form.total||Number(form.total)<1) return;
    save({...student,contracts:[...student.contracts,{id:idRef.current++,total:Number(form.total),used:0,paidDate:form.paidDate,note:form.note}]});
    setForm({total:"",paidDate:new Date().toISOString().split("T")[0],note:""});
    setShowAdd(false);
  };
  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"24px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:0,marginBottom:14}}>← 返回</button>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:16,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,color:"#555"}}>{student.name[0]}</div>
            <div>
              {editingName?(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input value={editName} onChange={e=>setEditName(e.target.value)}
                    style={{fontSize:18,fontWeight:800,border:"none",borderBottom:"2px solid #1A1A1A",outline:"none",padding:"2px 4px",width:120}}/>
                  <button onClick={()=>{setEditingName(false);save({...student,name:editName});}}
                    style={{background:"#1A1A1A",border:"none",color:"#fff",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600}}>✓</button>
                  <button onClick={()=>{setEditName(student.name);setEditingName(false);}}
                    style={{background:"#F2F2F2",border:"none",color:"#888",padding:"4px 10px",borderRadius:8,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A"}}>{student.name}</div>
                  <button onClick={()=>setEditingName(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center"}}><Pencil/></button>
                </div>

function AddStudent({onSave,onBack,existingNames}){
  const [name,setName]=useState("");

  const [note,setNote]=useState("");

  const [err,setErr]=useState("");

  const handleSave=()=>{
    const trimmed=name.trim();
    if(!trimmed){setErr("請輸入姓名");return;}
    if(existingNames.includes(trimmed)){setErr("此姓名已存在，請使用不同名稱");return;}

  );

// ── PIN Screen ─────────────────────────────────────────────────
function PinScreen({student,isFirstTime,onSuccess,onBack}){
  const [pin,setPin]=useState("");
  const [conf,setConf]=useState("");
  const [step,setStep]=useState(isFirstTime?"set":"verify");
  const [error,setError]=useState("");
  const [shake,setShake]=useState(false);
  // 用 ref 避免 closure stale 問題
  const pinRef=useRef("");

  const doShake=msg=>{setShake(true);setError(msg);setPin("");setConf("");pinRef.current="";setTimeout(()=>setShake(false),500);};

  const handleKey=k=>{
    if(k==="⌫"){
      if(step==="conf") setConf(c=>c.slice(0,-1));
      else setPin(c=>c.slice(0,-1));
      setError(""); return;
    }
    const cur=step==="conf"?conf:pin;
    if(cur.length>=4) return;
    const next=cur+k;
    if(step==="conf") setConf(next);
    else{setPin(next);pinRef.current=next;}
    setError("");
    if(next.length===4){
      setTimeout(()=>{
        if(step==="set"){setStep("conf");setConf("");}
        else if(step==="conf"){
          if(next===pinRef.current){
            hashPin(pinRef.current).then(h=>onSuccess(h));
          }else doShake("兩次 PIN 不一致，請重設");
          return;
        }else{
          hashPin(next).then(h=>{
            const stored=student.pin;
            // 支援舊版明文 PIN 與新版 hash 兩種格式
            if(isHashed(stored)?h===stored:next===stored) onSuccess(null);
            else doShake("密碼錯誤，請重試");
          });
          return; // 非同步，不繼續執行
        }
      },120);
    }
  };

  const display=step==="conf"?conf:pin;
  const titles={
    set:["設定你的 PIN 碼","請輸入 4 位數字"],
    conf:["再輸入一次確認","請再次輸入"],
    verify:[`哈囉，${student.name}！`,"請輸入 PIN 碼解鎖"],
  };
  return(
    <div style={{minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <button onClick={onBack} style={{position:"absolute",top:28,left:20,background:"none",border:"none",color:"#AAA",fontSize:14,cursor:"pointer"}}>← 返回</button>
      <div style={{textAlign:"center",marginBottom:44}}>
        <div style={{width:68,height:68,borderRadius:20,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:700,color:"#555",margin:"0 auto 20px"}}>{student.name[0]}</div>
        {isFirstTime&&<div style={{fontSize:10,color:"#F9A825",letterSpacing:2,fontWeight:700,marginBottom:6}}>首次設定</div>}
        <div style={{fontSize:21,fontWeight:800,color:"#1A1A1A"}}>{titles[step][0]}</div>
        <div style={{fontSize:14,color:"#AAA",marginTop:6}}>{titles[step][1]}</div>
      </div>
      <div style={{display:"flex",gap:16,marginBottom:12,animation:shake?"shake 0.4s ease":"none"}}>
        {[0,1,2,3].map(i=><PinDot key={i} filled={i<display.length}/>)}
      </div>
      <div style={{height:26,display:"flex",alignItems:"center",marginBottom:24}}>
        {error&&<span style={{color:"#D32F2F",fontSize:13,fontWeight:600}}>{error}</span>}
      </div>
      <NumPad onPress={handleKey}/>
    </div>
  );
}

            {[{label:"學員",val:students.length},{label:"簽到紀錄",val:records.length}].map(({label,val})=>(
              <div key={label} style={{background:"#F7F7F7",borderRadius:11,padding:"14px 10px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:900,color:"#1A1A1A"}}>{val}</div>
                <div style={{fontSize:11,color:"#AAA",marginTop:3}}>{label}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:6}}>匯出 Excel</div>
          <div style={{fontSize:13,color:"#888",marginBottom:14,lineHeight:1.7}}>下載唯讀的 <strong>.xls</strong> 備份，包含學員、合約、簽到紀錄。PIN 碼以 ●●●● 顯示保護隱私。</div>
          <Btn full variant="green" onClick={handleExcel}>📊 下載 Excel 備份</Btn>
        </div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px"}}>
          <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:6}}>雲端操作</div>
          <div style={{fontSize:13,color:"#888",marginBottom:14,lineHeight:1.7}}>若其他裝置更新了資料，點此重新抓取最新版本。</div>
          <Btn full variant="light" disabled={reloading} onClick={handleReload}>
            {reloading?"載入中…":"⬇ 從雲端重新載入"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ── Success Screen ─────────────────────────────────────────────
function SuccessScreen(){
  const [count,setCount]=useState(5);
  useEffect(()=>{
    const t=setInterval(()=>setCount(c=>{if(c<=1){clearInterval(t);}return c-1;}),1000);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style={{marginBottom:20}}>
        <circle cx="32" cy="32" r="28" stroke="#2E7D32" strokeWidth="2.5"/>
        <path d="M20 32l9 9 15-15" stroke="#2E7D32" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <div style={{fontSize:22,fontWeight:900,color:"#1A1A1A"}}>簽到成功！</div>
      <div style={{fontSize:14,color:"#AAA",marginTop:10}}>{count>0?`${count} 秒後返回…`:""}</div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App(){
  const [students,setStudents]=useState(()=>lsGet(LS_S,[]));
  const [records,setRecords]=useState(()=>lsGet(LS_R,[]));
  const [syncing,setSyncing]=useState(true);
  const [screen,setScreen]=useState("home");
  const [tab,setTab]=useState("home");
  const [selected,setSelected]=useState(null);
  const [coachViewing,setCoachViewing]=useState(null);
  const [toast,setToast]=useState(null);
  const go=setScreen;
  const showToast=(msg,type="ok")=>setToast({msg,type});

  // 啟動時背景同步，不擋畫面
  useEffect(()=>{
    (async()=>{
      try{
        const [s,r]=await Promise.all([gasGet("getStudents"),gasGet("getRecords")]);
        if(s&&Array.isArray(s)){setStudents(s);lsSet(LS_S,s);}
        if(r&&Array.isArray(r)){setRecords(r);lsSet(LS_R,r);}
      }catch{}
      setSyncing(false);
    })();
  },[]);

  // 所有寫入：先更新本機狀態，背景同步 GAS（零 lag）
  const setS=next=>{setStudents(next);lsSet(LS_S,next);};
  const setR=next=>{setRecords(next);lsSet(LS_R,next);};

  const handleUpdateStudent=updated=>{
    setS(students.map(s=>s.id===updated.id?updated:s));
    gasSync({action:"saveStudent",student:updated});
    go("home");setCoachViewing(null);
  };
  const handleDeleteStudent=id=>{
    setS(students.filter(s=>s.id!==id));
    gasSync({action:"deleteStudent",id});
  };
  const handlePinSuccess=newPin=>{
    if(newPin){
      const updated={...selected,pin:newPin};
      setS(students.map(s=>s.id===selected.id?updated:s));
      gasSync({action:"saveStudent",student:updated});
    }
    go("studentInfo");
  };
  const handleCheckin=()=>{
    const timestamp=getTaiwanTime();
    const nextStudents=students.map(s=>{
      if(s.id!==selected.id) return s;
      let done=false;
      return{...s,contracts:s.contracts.map(c=>{if(!done&&c.total-c.used>0){done=true;return{...c,used:c.used+1};}return c;})};
    });
    const newRec={id:Date.now(),studentId:selected.id,studentName:selected.name,timestamp};
    setS(nextStudents);
    setR([...records,newRec]);
    go("success");
    const upd=nextStudents.find(s=>s.id===selected.id);
    gasSync({action:"saveStudent",student:upd});
    gasSync({action:"checkin",studentId:selected.id,studentName:selected.name,timestamp});
    setTimeout(()=>{go("home");setSelected(null);showToast(`✅ ${selected.name} 簽到成功！`);},5000);
  };
  const handleAddStudent=s=>{
    setS([...students,s]);
    gasSync({action:"saveStudent",student:s});
    showToast("✅ 學員已新增");go("home");
  };
  const handleSaveSchedule=selIds=>{
    const next=students.map(s=>({...s,scheduledToday:selIds.has(s.id)}));
    setS(next);
    // 排課變動：全量同步
    gasSync({action:"syncAll",students:next});
    showToast("✅ 今日排課已更新");go("home");
  };
  const handleReload=async()=>{
    const [s,r]=await Promise.all([gasGet("getStudents"),gasGet("getRecords")]);
    if(s&&Array.isArray(s)){setStudents(s);lsSet(LS_S,s);}
    if(r&&Array.isArray(r)){setRecords(r);lsSet(LS_R,r);}
  };

  const tabChange=t=>{setTab(t);go(t);};
  const currentStudent=selected?students.find(s=>s.id===selected.id):null;
  const coachStudent=coachViewing?students.find(s=>s.id===coachViewing.id):null;
  const showTabs=["home","records","settings"].includes(screen);

  return(
    <div style={{position:"relative"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      {screen==="home"&&<CoachHome students={students} onSignIn={s=>{setSelected(s);go("studentPin");}} onEdit={s=>{setCoachViewing(s);go("coachDetail");}} onAdd={()=>go("addStudent")} onEditSchedule={()=>go("schedule")} syncing={syncing}/>}
      {screen==="coachDetail"&&coachStudent&&<CoachDetail student={coachStudent} records={records} onBack={()=>{go("home");setCoachViewing(null);}} onUpdate={handleUpdateStudent} onDelete={handleDeleteStudent} showToast={showToast}/>}
      {screen==="schedule"&&<EditSchedule students={students} onSave={handleSaveSchedule} onBack={()=>go("home")}/>}
      {screen==="addStudent"&&<AddStudent onSave={handleAddStudent} onBack={()=>go("home")} existingNames={students.map(s=>s.name)}/>}
      {screen==="studentPin"&&selected&&<PinScreen student={selected} isFirstTime={selected.pin===null} onSuccess={handlePinSuccess} onBack={()=>{go("home");setSelected(null);}}/>}
      {screen==="studentInfo"&&currentStudent&&<StudentInfo student={currentStudent} records={records} onCheckin={handleCheckin} onBack={()=>go("studentPin")}/>}
      {screen==="success"&&<SuccessScreen/>}
      {screen==="records"&&<RecordsScreen records={records} onBack={()=>{go("home");setTab("home");}}/>}
      {screen==="settings"&&<SettingsScreen students={students} records={records} onReload={handleReload} showToast={showToast}/>}
      {showTabs&&<BottomTabs active={tab} onChange={tabChange}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

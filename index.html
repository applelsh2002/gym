                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0",fontSize:13}}>
                    <span style={{color:"#AAA"}}>{i+1}.</span>
                    <span style={{fontWeight:700,color:"#1A1A1A"}}>{s.weight} kg</span>
                    <span style={{color:"#888"}}>× {s.reps} 下</span>
                    {s.note&&<span style={{color:"#AAA"}}>{s.note}</span>}
                  </div>
                ))}
              </div>
            );
          })}
          <Btn full onClick={()=>{
            // 把上次課表全部帶入
            const newSets=[];
            Object.entries(lastSession.exercises).forEach(([exId,sets])=>{
              sets.forEach(s=>newSets.push({...s,id:String(Date.now()+Math.random()),date:workoutDate,studentId:selectedStudent.id}));
            });
            setSessionSets(prev=>[...prev,...newSets]);
            setShowLastSession(false);
            showToast(`✅ 已帶入上次課表`);
          }}>全部帶入本次課程</Btn>
          <div style={{marginTop:8}}><Btn full variant="light" onClick={()=>setShowLastSession(false)}>關閉</Btn></div>
        </BottomSheet>
      )}

      {/* ── 套用範本 BottomSheet ── */}
      {showTemplateApply&&(
        <BottomSheet title="套用課表範本" onClose={()=>setShowTemplateApply(false)}>
          {templates.length===0&&<div style={{textAlign:"center",color:"#CCC",padding:"20px 0"}}>尚無範本，請先在「課表範本」頁新增</div>}
          {templates.map(tpl=>(
            <button key={tpl.id} onClick={()=>handleApplyTemplate(tpl)}
              style={{width:"100%",padding:"14px 16px",background:"#F7F7F7",borderRadius:12,border:"none",cursor:"pointer",textAlign:"left",marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:15,color:"#1A1A1A",marginBottom:6}}>{tpl.name}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {tpl.items.map(item=>{const ex=exMap[item.exerciseId];return ex?<span key={item.exerciseId} style={{background:"#EEE",padding:"2px 8px",borderRadius:6,fontSize:11,color:"#666"}}>{ex.name}</span>:null;})}
              </div>
            </button>
          ))}
        </BottomSheet>
      )}

      {/* ── 新增動作 Modal ── */}
      {showAddExercise&&(
        <Modal title="新增自訂動作" onClose={()=>setShowAddExercise(false)}>
          <Field label="動作名稱" value={newExName} onChange={setNewExName} placeholder="例：保加利亞深蹲"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:"#999",fontWeight:600,marginBottom:5}}>分類</div>
            {!newExCatCustom?(
              <div style={{display:"flex",gap:8}}>
                <select value={newExCat} onChange={e=>setNewExCat(e.target.value)}
                  style={{flex:1,padding:"11px 13px",background:"#F7F7F7",border:"1px solid #EBEBEB",borderRadius:11,fontSize:15,outline:"none",color:"#1A1A1A"}}>
                  {categories.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <button onClick={()=>{setNewExCat("");setNewExCatCustom(true);}}
                  style={{padding:"0 14px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:11,fontSize:12,color:"#888",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>
                  ＋ 新分類
                </button>
              </div>
            ):(
              <div style={{display:"flex",gap:8}}>
                <input value={newExCat} onChange={e=>setNewExCat(e.target.value)} placeholder="輸入新分類名稱" autoFocus
                  style={{flex:1,padding:"11px 13px",background:"#F7F7F7",border:"2px solid #1A1A1A",borderRadius:11,fontSize:15,outline:"none",color:"#1A1A1A"}}/>
                <button onClick={()=>{setNewExCat(categories[0]||"其他");setNewExCatCustom(false);}}
                  style={{padding:"0 14px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:11,fontSize:12,color:"#888",cursor:"pointer"}}>取消</button>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn variant="light" style={{flex:1}} onClick={()=>setShowAddExercise(false)}>取消</Btn>
            <Btn style={{flex:2}} onClick={()=>{
              if(!newExName.trim()){showToast("請輸入動作名稱","warn");return;}
              const cat=newExCat.trim()||"其他";
              const newEx={id:"ex_"+Date.now(),name:newExName.trim(),category:cat,pinned:false};
              // 如果是全新分類，自動加進分類清單（排在「其他」前面）
              if(!categories.includes(cat)&&cat!=="其他"){
                const withoutOther=categories.filter(c=>c!=="其他");
                const hasOther=categories.includes("其他");
                onUpdateCategories([...withoutOther,cat,...(hasOther?["其他"]:[])]);
              }
              onUpdateExercises([...exercises,newEx]);
              setShowAddExercise(false);
              showToast("✅ 動作已新增");
            }}>新增</Btn>
          </div>
        </Modal>
      )}

      {/* ── 分類管理 BottomSheet ── */}
      {showCatManager&&(
        <BottomSheet title="管理分類" onClose={()=>setShowCatManager(false)}>
          <div style={{fontSize:12,color:"#AAA",marginBottom:12,lineHeight:1.7}}>
            刪除分類時，底下的動作會自動移到「其他」。
          </div>
          {/* 新增分類 */}
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input value={newCatName} onChange={e=>setNewCatName(e.target.value)}
              placeholder="輸入新分類名稱"
              onKeyDown={e=>{if(e.key==="Enter"&&newCatName.trim()){
                if(categories.includes(newCatName.trim())){showToast("分類已存在","warn");return;}
                const withoutOther=categories.filter(c=>c!=="其他");
                const hasOther=categories.includes("其他");
                onUpdateCategories([...withoutOther,newCatName.trim(),...(hasOther?["其他"]:[])]);
                setNewCatName("");showToast("✅ 分類已新增");
              }}}
              style={{flex:1,padding:"11px 13px",background:"#F7F7F7",border:"1px solid #EEE",borderRadius:11,fontSize:14,outline:"none"}}/>
            <button onClick={()=>{
              const t=newCatName.trim();
              if(!t){showToast("請輸入分類名稱","warn");return;}
              if(categories.includes(t)){showToast("分類已存在","warn");return;}
              const withoutOther=categories.filter(c=>c!=="其他");
              const hasOther=categories.includes("其他");
              onUpdateCategories([...withoutOther,t,...(hasOther?["其他"]:[])]);
              setNewCatName("");showToast("✅ 分類已新增");
            }} style={{padding:"0 16px",background:"#1A1A1A",border:"none",borderRadius:11,fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer"}}>新增</button>
          </div>
          {/* 現有分類列表 */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {categories.map((cat,idx)=>{
              const count=exercises.filter(e=>e.category===cat).length;
              const isOther=cat==="其他";
              return(
                <div key={cat} style={{background:"#F7F7F7",borderRadius:11,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:14,color:"#1A1A1A"}}>{cat}</span>
                    <span style={{fontSize:11,color:"#AAA",marginLeft:8}}>{count} 個動作</span>
                  </div>
                  {!isOther&&(
                    <CatDeleteBtn cat={cat} count={count} onConfirm={()=>{
                      // 底下動作移到「其他」
                      const movedExercises=exercises.map(e=>e.category===cat?{...e,category:"其他"}:e);
                      onUpdateExercises(movedExercises);
                      // 確保「其他」分類存在
                      const newCats=categories.filter(c=>c!==cat);
                      if(!newCats.includes("其他"))newCats.push("其他");
                      onUpdateCategories(newCats);
                      showToast(`✅ 已刪除「${cat}」`);
                    }}/>
                  )}
                  {isOther&&<span style={{fontSize:11,color:"#CCC"}}>預設</span>}
                </div>
              );
            })}
          </div>
        </BottomSheet>
      )}


      {showAddTemplate&&(
        <Modal title="新增課表範本" onClose={()=>setShowAddTemplate(false)}>
          <Field label="範本名稱" value={newTplName} onChange={setNewTplName} placeholder="例：週三課表"/>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#999",fontWeight:600,marginBottom:8}}>選擇動作</div>
            <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {exercises.map(ex=>{
                const selected=newTplItems.some(i=>i.exerciseId===ex.id);
                return(
                  <button key={ex.id} onClick={()=>setNewTplItems(prev=>selected?prev.filter(i=>i.exerciseId!==ex.id):[...prev,{exerciseId:ex.id}])}
                    style={{padding:"10px 14px",background:selected?"#1A1A1A":"#F7F7F7",borderRadius:10,border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:selected?"#fff":"#1A1A1A",fontWeight:700,fontSize:14}}>{ex.name}</span>
                    <span style={{color:selected?"#AAA":"#CCC",fontSize:11}}>{ex.category}</span>
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{fontSize:12,color:"#AAA",marginBottom:12}}>已選 {newTplItems.length} 個動作</div>
          <div style={{display:"flex",gap:10}}>
            <Btn variant="light" style={{flex:1}} onClick={()=>setShowAddTemplate(false)}>取消</Btn>
            <Btn style={{flex:2}} onClick={()=>{
              if(!newTplName.trim()){showToast("請輸入範本名稱","warn");return;}
              if(!newTplItems.length){showToast("請至少選一個動作","warn");return;}
              const tpl={id:"tpl_"+Date.now(),name:newTplName.trim(),items:newTplItems};
              onUpdateTemplates([...templates,tpl]);
              setShowAddTemplate(false);
              showToast("✅ 範本已儲存");
            }}>儲存範本</Btn>
          </div>
        </Modal>
      )}

      <BottomTabs active="workout" onChange={onTab}/>
    </div>
  );
}

// 動作庫列表項
function ExerciseRow({ex,onTogglePin,onDelete}){
  const [confirmDel,setConfirmDel]=useState(false);
  return(
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #EEE",padding:"12px 14px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontWeight:700,fontSize:14,color:"#1A1A1A"}}>{ex.name}</span>
        <span style={{fontSize:11,color:"#AAA",marginLeft:8}}>{ex.category}</span>
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        <button onClick={()=>onTogglePin(ex.id)} style={{background:ex.pinned?"#FFF9C4":"#F5F5F5",border:"none",borderRadius:8,padding:"5px 10px",fontSize:13,cursor:"pointer",color:ex.pinned?"#F9A825":"#CCC",fontWeight:700}}>
          {ex.pinned?"📌":"☆"}
        </button>
        {confirmDel?(
          <>
            <button onClick={()=>{onDelete(ex.id);setConfirmDel(false);}} style={{background:"#FFEBEE",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer",color:"#D32F2F",fontWeight:700}}>確認</button>
            <button onClick={()=>setConfirmDel(false)} style={{background:"#F5F5F5",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer",color:"#888"}}>取消</button>
          </>
        ):(
          <button onClick={()=>setConfirmDel(true)} style={{background:"#F5F5F5",border:"none",borderRadius:8,padding:"5px 10px",fontSize:13,cursor:"pointer",color:"#CCC",fontWeight:700,lineHeight:1}}>✕</button>
        )}
      </div>
    </div>
  );
}

// 分類刪除按鈕（帶確認）
function CatDeleteBtn({cat,count,onConfirm}){
  const [confirm,setConfirm]=useState(false);
  if(confirm)return(
    <div style={{display:"flex",gap:6,alignItems:"center"}}>
      {count>0&&<span style={{fontSize:11,color:"#E57373"}}>→ 移至「其他」</span>}
      <button onClick={onConfirm} style={{background:"#FFEBEE",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:"#D32F2F",cursor:"pointer"}}>確認刪除</button>
      <button onClick={()=>setConfirm(false)} style={{background:"#F5F5F5",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,color:"#888",cursor:"pointer"}}>取消</button>
    </div>
  );
  return(
    <button onClick={()=>setConfirm(true)} style={{background:"#F5F5F5",border:"none",borderRadius:8,padding:"5px 10px",fontSize:13,color:"#CCC",cursor:"pointer",fontWeight:700,lineHeight:1}}>✕</button>
  );
}
// ══════════════════════════════════════════════════════════════
function SettingsScreen({students,records,onReload,showToast,onTab}){
  const [reloading,setReloading]=useState(false);
  const months=[...new Set(records.map(r=>r.timestamp?r.timestamp.slice(0,7):"").filter(Boolean))].sort().reverse();
  const now=new Date();
  const defaultMonth=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}`;
  const [selMonth,setSelMonth]=useState(months[0]||defaultMonth);
  const [selStudent,setSelStudent]=useState("");
  const [changingPin,setChangingPin]=useState(false);
  const [cpStep,setCpStep]=useState("current");
  const [cpPin,setCpPin]=useState("");
  const [cpFirst,setCpFirst]=useState("");
  const [cpError,setCpError]=useState("");
  const [cpShake,setCpShake]=useState(false);
  const cpDoShake=msg=>{setCpShake(true);setCpError(msg);setCpPin("");setTimeout(()=>setCpShake(false),500);};
  const cpReset=()=>{setCpStep("current");setCpPin("");setCpFirst("");setCpError("");};
  const [cpSaving,setCpSaving]=useState(false);

  const handleCpKey=async k=>{
    if(k==="⌫"){setCpPin(c=>c.slice(0,-1));setCpError("");return;}
    if(cpPin.length>=4)return;
    const next=cpPin+k;setCpPin(next);setCpError("");
    if(next.length<4)return;
    await new Promise(r=>setTimeout(r,120));
    if(cpStep==="current"){
      const h=await hashPin(next);const stored=await fetchCoachPin();
      if(h===stored){setCpStep("new");setCpPin("");setCpError("");}else{cpDoShake("密碼錯誤");}
    }else if(cpStep==="new"){setCpFirst(next);setCpPin("");setCpError("");setCpStep("confirm");}
    else if(cpStep==="confirm"){
      if(next===cpFirst){setCpSaving(true);const h=await hashPin(next);await saveCoachPin(h);setCpSaving(false);setChangingPin(false);cpReset();showToast("✅ 管理密碼已更新");}
      else{setCpFirst("");setCpStep("new");cpDoShake("兩次輸入不一致，請重新輸入新密碼");}
    }
  };
  const cpTitle=cpStep==="current"?"輸入現有密碼":cpStep==="new"?"輸入新密碼":"確認新密碼";
  const cpSub=cpStep==="current"?"請輸入目前的管理密碼":cpStep==="new"?"請設定新的 4 位數密碼":"請再輸入一次新密碼";

  return(
    <div style={{minHeight:"100vh",background:"#F7F7F7"}}>
      <div style={{background:"#fff",padding:"28px 20px 18px",borderBottom:"1px solid #EEE"}}>
        <div style={{fontSize:24,fontWeight:900,color:"#1A1A1A"}}>備份設定</div>
      </div>

      {changingPin&&(
        <Modal title="修改管理密碼" onClose={()=>{setChangingPin(false);cpReset();}}>
          <div style={{textAlign:"center",paddingBottom:8}}>
            <div style={{fontSize:15,fontWeight:700,color:"#1A1A1A",marginBottom:4}}>{cpTitle}</div>
            <div style={{fontSize:13,color:"#AAA",marginBottom:20}}>{cpSub}</div>
            <div style={{display:"flex",gap:18,justifyContent:"center",marginBottom:10,animation:cpShake?"shake 0.4s ease":"none"}}>
              {[0,1,2,3].map(i=><PinDot key={i} filled={i<cpPin.length}/>)}
            </div>
            <div style={{height:24,marginBottom:8}}>
              {cpSaving?<span style={{color:"#888",fontSize:14}}>儲存中…</span>:cpError&&<span style={{color:"#D32F2F",fontSize:14,fontWeight:600}}>{cpError}</span>}
            </div>
            <NumPad onPress={handleCpKey}/>
          </div>
        </Modal>
      )}

      <div style={{padding:"20px 20px 100px"}}>
        <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:10}}>報表匯出</div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <div style={{fontSize:13,fontWeight:700,color:"#1A1A1A"}}>每月上課報表</div>
          </div>
          <select value={selMonth} onChange={e=>setSelMonth(e.target.value)}
            style={{width:"100%",padding:"10px 12px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:14,outline:"none",color:"#555",marginBottom:12}}>
            {months.length===0&&<option value={defaultMonth}>{defaultMonth}</option>}
            {months.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <Btn full variant="light" onClick={()=>{if(!selMonth){showToast("請選擇月份","warn");return;}exportMonthlyReport(records,students,selMonth);showToast("✅ 月報表已下載");}}>
            <span style={{display:"inline-flex",alignItems:"center",gap:7}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下載月報表
            </span>
          </Btn>
        </div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <div style={{fontSize:13,fontWeight:700,color:"#1A1A1A"}}>個別學員報表</div>
          </div>
          <select value={selStudent} onChange={e=>setSelStudent(e.target.value)}
            style={{width:"100%",padding:"10px 12px",background:"#F5F5F5",border:"1px solid #EEE",borderRadius:10,fontSize:14,outline:"none",color:"#555",marginBottom:12}}>
            <option value="">請選擇學員</option>
            {[...students].sort((a,b)=>a.name.localeCompare(b.name,"zh-TW")).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <Btn full variant="light" disabled={!selStudent} onClick={()=>{const s=students.find(x=>x.id===selStudent);if(!s)return;exportStudentReport(records,s);showToast(`✅ ${s.name} 報表已下載`);}}>
            <span style={{display:"inline-flex",alignItems:"center",gap:7}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下載學員報表
            </span>
          </Btn>
        </div>

        <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,marginBottom:10}}>資料備份</div>
        <div style={{background:"#F7F7F7",border:"1px solid #E8E8E8",borderRadius:14,padding:"14px 16px",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.3A6 6 0 1 0 9 17h9a4 4 0 0 0 0-7z"/></svg>
            <div style={{fontSize:13,fontWeight:700,color:"#555"}}>雲端同步已啟用</div>
          </div>
          <div style={{fontSize:12,color:"#999",lineHeight:1.7,paddingLeft:23}}>每次操作自動同步至 Google Sheet。</div>
        </div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {[{label:"學員",val:students.length},{label:"簽到紀錄",val:records.length}].map(({label,val})=>(
              <div key={label} style={{background:"#F7F7F7",borderRadius:11,padding:"14px 10px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:900,color:"#1A1A1A"}}>{val}</div>
                <div style={{fontSize:11,color:"#AAA",marginTop:3}}>{label}</div>
              </div>
            ))}
          </div>
          <Btn full variant="light" onClick={()=>{exportExcel(students,records);showToast("✅ Excel 已下載");}}>
            <span style={{display:"inline-flex",alignItems:"center",gap:7}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下載完整 Excel 備份
            </span>
          </Btn>
        </div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px",marginBottom:12}}>
          <Btn full variant="light" disabled={reloading} onClick={async()=>{setReloading(true);await onReload();setReloading(false);showToast("✅ 已重新載入");}}>
            {reloading?"載入中…":"⬇ 從雲端重新載入"}
          </Btn>
        </div>

        <div style={{fontSize:12,color:"#AAA",letterSpacing:1.5,fontWeight:600,margin:"20px 0 10px"}}>安全性</div>
        <div style={{background:"#fff",border:"1px solid #EEE",borderRadius:16,padding:"18px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:10,background:"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#1A1A1A"}}>管理密碼</div>
                <div style={{fontSize:11,color:"#AAA",marginTop:2}}>教練管理介面的登入密碼</div>
              </div>
            </div>
            <button onClick={()=>{setChangingPin(true);cpReset();}} style={{padding:"7px 14px",background:"#F5F5F5",border:"none",borderRadius:9,fontSize:12,fontWeight:700,color:"#555",cursor:"pointer"}}>修改</button>
          </div>
        </div>
      </div>
      <BottomTabs active="settings" onChange={onTab}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 簽到成功
// ══════════════════════════════════════════════════════════════
function SuccessScreen({name,remaining,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,4000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:30}}>
      <svg width="72" height="72" viewBox="0 0 64 64" fill="none" style={{marginBottom:24}}>
        <circle cx="32" cy="32" r="28" stroke="#2E7D32" strokeWidth="2.5"/>
        <path d="M20 32l9 9 15-15" stroke="#2E7D32" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <div style={{fontSize:24,fontWeight:900,color:"#1A1A1A"}}>簽到成功！</div>
      <div style={{fontSize:15,color:"#AAA",marginTop:10}}>{name}，今日上課已記錄</div>
      {remaining!=null&&<div style={{marginTop:16,background:remBg(remaining),borderRadius:12,padding:"10px 24px",fontSize:14,fontWeight:700,color:remColor(remaining)}}>剩餘 {remaining} 堂</div>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// Main App
// ══════════════════════════════════════════════════════════════
function App(){
  const [students,setStudents]=useState(()=>lsGet(LS_S,[]));
  const [records,setRecords]=useState(()=>lsGet(LS_R,[]));
  const [workouts,setWorkouts]=useState(()=>lsGet(LS_WORKOUTS,[]));
  const [exercises,setExercises]=useState(()=>{
    const saved=lsGet(LS_EXERCISES,null);
    return saved||DEFAULT_EXERCISES;
  });
  const [templates,setTemplates]=useState(()=>lsGet(LS_TEMPLATES,[]));
  const [categories,setCategories]=useState(()=>lsGet(LS_CATEGORIES,null)||DEFAULT_CATEGORIES);
  const [syncing,setSyncing]=useState(true);
  const [screen,setScreen]=useState("student");
  const [coachTab,setCoachTab]=useState("coach");
  const [editing,setEditing]=useState(null);
  const [successInfo,setSuccessInfo]=useState({name:"",remaining:0});
  const [toast,setToast]=useState(null);
  const [pendingCheckinStudent,setPendingCheckinStudent]=useState(null);
  const showToast=(msg,type="ok")=>setToast({msg,type});

  useEffect(()=>{
    (async()=>{
      try{const s=await gasGet("getStudents");if(s&&Array.isArray(s)){const injected=s.map(injectSigData);setStudents(injected);lsSet(LS_S,injected);}}catch{}
      setSyncing(false);
      try{
        const r=await gasGet("getRecords");
        if(r&&Array.isArray(r)){
          const localRecs=lsGet(LS_R,[]);
          const localMap={};
          localRecs.forEach(rec=>{if(rec.sigData)localMap[rec.timestamp+"|"+rec.studentId]=rec.sigData;});
          const n=r.map(rec=>{
            const normalized={...rec,timestamp:normalizeTimestamp(rec.timestamp)};
            const key=normalized.timestamp+"|"+String(normalized.studentId);
            if(localMap[key])normalized.sigData=localMap[key];
            return normalized;
          });
          setRecords(n);lsSet(LS_R,n);
        }
      }catch{}
      // 訓練紀錄從 GAS 拉取（若有實作）
      // try{const w=await gasGet("getWorkouts");if(w&&Array.isArray(w)){setWorkouts(w);lsSet(LS_WORKOUTS,w);}}catch{}
    })();
  },[]);

  const setS=next=>{setStudents(next);lsSet(LS_S,next);};
  const setR=next=>{setRecords(next);lsSet(LS_R,next);};
  const setW=next=>{setWorkouts(next);lsSet(LS_WORKOUTS,next);};
  const setEx=next=>{setExercises(next);lsSet(LS_EXERCISES,next);gasSyncExercises(next);};
  const setTpl=next=>{setTemplates(next);lsSet(LS_TEMPLATES,next);gasSyncTemplates(next);};
  const setCats=next=>{setCategories(next);lsSet(LS_CATEGORIES,next);gasSync({action:"syncCategories",categories:next});};

  const handleSaveWorkout=sets=>{
    const next=[...workouts,...sets];
    setW(next);
    gasSyncWorkouts(sets);
  };

  const handleSignContractFromStudent=(student,contractId,sigData)=>{
    sigSave(contractId,sigData);
    const updated={...student,contracts:student.contracts.map(c=>c.id===contractId?{...c,signed:true,sigData,signedAt:getTaiwanTime()}:c)};
    setS(students.map(s=>s.id===student.id?updated:s));
    gasSync({action:"saveStudent",student:updated});
    showToast("✅ 合約簽署完成");
  };

  const handleCheckinDone=(student,checkinSigData)=>{
    const timestamp=getTaiwanTime();
    const nextStudents=students.map(s=>{
      if(s.id!==student.id)return s;
      let done=false;
      return{...s,contracts:s.contracts.map(c=>{if(!done&&c.total>0&&c.total-c.used>0){done=true;return{...c,used:c.used+1};}return c;})};
    });
    const recId=String(Date.now());
    const newRec={id:recId,studentId:student.id,studentName:student.name,timestamp,sigData:checkinSigData||null};
    setS(nextStudents);setR([...records,newRec]);
    const upd=nextStudents.find(s=>s.id===student.id);
    setSuccessInfo({name:student.name,remaining:upd?getTotalRemaining(upd):0});
    setScreen("success");
    gasSync({action:"saveStudent",student:upd});
    gasSync({action:"checkin",studentId:student.id,studentName:student.name,timestamp});
  };

  const handleRegisterStudent=s=>{
    persistSigData(s);
    const next=[...students,s];
    setS(next);gasSync({action:"saveStudent",student:s});
    showToast("✅ 登錄完成");
  };
  const handleCheckinAfterRegister=s=>{setScreen("student");setPendingCheckinStudent(s);};
  const handleUpdateStudent=updated=>{
    persistSigData(updated);
    setS(students.map(s=>s.id===updated.id?updated:s));
    gasSync({action:"saveStudent",student:updated});
    showToast("✅ 已儲存");
  };
  const handleDeleteStudent=id=>{setS(students.filter(s=>s.id!==id));gasSync({action:"deleteStudent",id});};
  const handleAddStudent=s=>{
    persistSigData(s);
    const next=[...students,s];
    setS(next);gasSync({action:"saveStudent",student:s});
    showToast("✅ 學員已新增");setScreen("coach");
  };
  const handleReload=async()=>{
    const [s,r]=await Promise.all([gasGet("getStudents"),gasGet("getRecords")]);
    if(s&&Array.isArray(s)){const injected=s.map(injectSigData);setStudents(injected);lsSet(LS_S,injected);}
    if(r&&Array.isArray(r)){const n=r.map(rec=>({...rec,timestamp:normalizeTimestamp(rec.timestamp)}));setRecords(n);lsSet(LS_R,n);}
  };

  const [coachUnlocked,setCoachUnlocked]=useState(false);
  useEffect(()=>{fetchCoachPin();},[]);

  const handleTab=t=>{
    setCoachTab(t);
    if(t==="student"){setScreen("student");setCoachUnlocked(false);}
    else if(t==="coach"){setScreen("coachGate");}
    else if(t==="workout"){setScreen("coachGate");}
    else if(t==="records"){setScreen("coachGate");}
    else if(t==="settings"){setScreen("coachGate");}
  };

  const handleCoachUnlock=()=>{
    setCoachUnlocked(true);
    const dest=coachTab==="student"?"coach":coachTab;
    setScreen(dest);
  };

  const handleCoachTab=t=>{
    setCoachTab(t);
    if(t==="student"){setScreen("student");setCoachUnlocked(false);}
    else{setScreen(t);}
  };

  const editingStudent=editing?students.find(s=>s.id===editing.id):null;

  return(
    <div style={{position:"relative"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      {screen==="student"&&<StudentHome students={students} records={records} onCheckinDone={handleCheckinDone} onGoCoach={()=>{setCoachTab("coach");setScreen("coachGate");}} onRegister={()=>setScreen("register")} syncing={syncing} onSignContract={handleSignContractFromStudent} pendingCheckinStudent={pendingCheckinStudent} onClearPending={()=>setPendingCheckinStudent(null)}/>}
      {screen==="register"&&<StudentRegister onDone={handleRegisterStudent} onBack={()=>setScreen("student")} onCheckinNow={handleCheckinAfterRegister} existingNames={students.map(s=>s.name)} existingStudents={students}/>}
      {screen==="success"&&<SuccessScreen name={successInfo.name} remaining={successInfo.remaining} onDone={()=>setScreen("student")}/>}

      {screen==="coachGate"&&<CoachPinGate onSuccess={handleCoachUnlock} onBack={()=>setScreen("student")}/>}
      {screen==="coach"&&<CoachHome students={students} onEdit={s=>{setEditing(s);setScreen("coachDetail");}} onAdd={()=>setScreen("coachAdd")} onTab={handleCoachTab} syncing={syncing}/>}
      {screen==="coachDetail"&&editingStudent&&<CoachDetail student={editingStudent} records={records} onBack={()=>{setScreen("coach");setEditing(null);}} onUpdate={handleUpdateStudent} onDelete={handleDeleteStudent} showToast={showToast}/>}
      {screen==="coachAdd"&&<CoachAddStudent onSave={handleAddStudent} onBack={()=>setScreen("coach")} existingNames={students.map(s=>s.name)}/>}
      {screen==="workout"&&<WorkoutScreen students={students} workouts={workouts} exercises={exercises} templates={templates} categories={categories} onSaveWorkout={handleSaveWorkout} onUpdateExercises={setEx} onUpdateTemplates={setTpl} onUpdateCategories={setCats} onTab={handleCoachTab} showToast={showToast}/>}
      {screen==="records"&&<RecordsScreen records={records} students={students} onTab={handleCoachTab}/>}
      {screen==="settings"&&<SettingsScreen students={students} records={records} onReload={handleReload} showToast={showToast} onTab={handleCoachTab}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
